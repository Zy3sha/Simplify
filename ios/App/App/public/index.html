<!DOCTYPE html>
<html lang="en" style="background:#FFFEFD">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>

  <!-- SEO Essentials -->
  <title>OBubba — Smart Baby Tracker | Feed, Sleep, Nap & Milestone Tracking</title>
  <meta name="description" content="Track your baby's feeds, sleep, naps, growth and milestones with smart predictions. OBubba learns your baby's unique rhythm using NHS and WHO guidance. Free for iPhone and Android."/>
  <meta name="keywords" content="baby tracker, baby app, feeding tracker, sleep tracker, nap timer, breastfeed timer, milestone tracker, growth chart, NHS baby, newborn tracker, baby schedule, baby routine, nap prediction, bedtime prediction"/>
  <link rel="canonical" href="https://obubba.com/"/>

  <!-- Open Graph (Facebook, WhatsApp, iMessage link previews) -->
  <meta property="og:type" content="website"/>
  <meta property="og:url" content="https://obubba.com/"/>
  <meta property="og:title" content="OBubba — Smart Baby Tracker"/>
  <meta property="og:description" content="Track feeds, sleep, naps, milestones & growth with personalised predictions powered by NHS guidance + your baby's unique rhythm."/>
  <meta property="og:image" content="https://obubba.com/og-image.png"/>
  <meta property="og:image:width" content="1200"/>
  <meta property="og:image:height" content="630"/>
  <meta property="og:site_name" content="OBubba"/>
  <meta property="og:locale" content="en_GB"/>

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image"/>
  <meta name="twitter:title" content="OBubba — Smart Baby Tracker"/>
  <meta name="twitter:description" content="The baby app that learns your baby's rhythm. Track feeds, sleep, naps, milestones & growth with personalised predictions."/>
  <meta name="twitter:image" content="https://obubba.com/og-image.png"/>

  <!-- PWA / Mobile -->
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="default"/>
  <meta name="apple-mobile-web-app-title" content="OBubba"/>
  <meta name="application-name" content="OBubba"/>
  <meta name="theme-color" content="#f0ddd6"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <link rel="manifest" href="manifest.json"/>
  <link rel="apple-touch-icon" sizes="180x180" href="icon.png">

  <!-- Structured Data — tells Google this is an app -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "SoftwareApplication",
    "name": "OBubba — Smart Baby Tracker",
    "description": "Smart baby tracker that learns your baby's unique rhythm. Track feeds, sleep, naps, growth and milestones with personalised predictions based on NHS and WHO guidance.",
    "applicationCategory": "HealthApplication",
    "operatingSystem": "iOS, Android, Web",
    "offers": {
      "@type": "Offer",
      "price": "0",
      "priceCurrency": "GBP"
    },
    "author": {
      "@type": "Organization",
      "name": "OBubba",
      "url": "https://obubba.com"
    },
    "url": "https://obubba.com",
    "image": "https://obubba.com/obubba-happy.png"
  }
  </script>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>

  <!-- External libraries -->
  <script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>

  <!-- Firebase -->
  <script type="module" src="firebase.js"></script>

  <!-- Native Plugin Bridge (Capacitor + platform features) -->
  <script src="native-plugins.js" defer></script>

  <!-- Styles -->
  <link rel="stylesheet" href="styles.css"/>
</head>
<body style="background:#FFFEFD;margin:0">
<div id="ob-splash" style="position:fixed;inset:0;z-index:99999;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(135deg,#FFFEFD 0%,#FDFAF9 40%,#FBF9F8 100%);padding:40px 24px;text-align:center">
  <style>
    #ob-splash .baby{animation:babyBreathe 3.5s ease-in-out infinite;filter:drop-shadow(0 16px 32px rgba(217,207,243,0.35))}
    @keyframes babyBreathe{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-3px) scale(1.008)}}
    #ob-splash .z1{position:absolute;top:8px;right:-5px;font-size:18px;font-weight:700;color:#D9CFF3;font-family:Georgia,serif;font-style:italic;animation:zzz1 2.8s ease-in-out infinite}
    #ob-splash .z2{position:absolute;top:-8px;right:12px;font-size:24px;font-weight:700;color:#D9CFF3;font-family:Georgia,serif;font-style:italic;animation:zzz2 2.8s ease-in-out 0.5s infinite}
    #ob-splash .z3{position:absolute;top:-28px;right:28px;font-size:16px;font-weight:700;color:#D9CFF3;font-family:Georgia,serif;font-style:italic;animation:zzz3 2.8s ease-in-out 1s infinite}
    @keyframes zzz1{0%{opacity:0;transform:translate(0,0) scale(0.6)}30%{opacity:1}100%{opacity:0;transform:translate(15px,-60px) scale(1.2)}}
    @keyframes zzz2{0%{opacity:0;transform:translate(0,0) scale(0.5)}35%{opacity:1}100%{opacity:0;transform:translate(25px,-75px) scale(1.1)}}
    @keyframes zzz3{0%{opacity:0;transform:translate(0,0) scale(0.4)}40%{opacity:1}100%{opacity:0;transform:translate(10px,-90px) scale(1)}}
  </style>
  <div style="position:relative;margin-bottom:28px">
    <img class="baby" src="obubba-loading.png" alt="" width="180" height="270" style="object-fit:contain">
    <span class="z1">z</span><span class="z2">z</span><span class="z3">z</span>
  </div>
  <div style="font-family:Georgia,serif;font-size:22px;font-weight:700;color:#5B4F5F;margin-bottom:8px">OBubba</div>
  <div style="font-size:13px;color:#A89898;line-height:1.6">Getting everything ready...</div>
</div>
<div id="root"></div>
<button id="theme-toggle" aria-label="Toggle theme" onclick="toggleTheme()">🌙</button>

<!-- Theme system (must run immediately for no flash) -->
<script src="theme.js"></script>

<!-- App loader (fetches app.jsx, compiles, + utilities) -->
<script src="loader.js"></script>
</body>
</html>
