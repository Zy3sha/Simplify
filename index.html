                            <button onClick={()=>openEdit(e)} style={{background:"rgba(255,255,255,0.07)",border:"none",borderRadius:"50%",width:21,height:21,color:"#a898c8",cursor:"pointer",fontSize:15}}>✎</button>
                            <button onClick={()=>delEntry(e.id)} style={{background:"rgba(255,255,255,0.07)",border:"none",borderRadius:"50%",width:21,height:21,color:"#8878a8",cursor:"pointer",fontSize:14}}>✕</button>
                          </div>
                        </div>
                      </div>
                    );
                  });
                })()}
              </div>

              {/* ══ 4. FEEDS ══════════════════════════════════════ */}
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}>
                <div style={{width:3,height:16,background:C.ter,borderRadius:99}}/>
                <div style={{fontSize:14,fontFamily:"monospace",color:C.lt,textTransform:"uppercase",letterSpacing:"0.12em",fontWeight:700}}>Feeds</div>
              </div>

              {/* Unified Feed Card */}
              {(()=>{
                const fc = feedCard();
                if (!fc) return (
                  <div style={{background:C.warm,borderRadius:14,padding:"16px",marginBottom:10,border:`1px dashed ${C.blush}`,textAlign:"center"}}>
                    <div style={{fontSize:22,marginBottom:6}}>🍼</div>
                    <div style={{fontSize:14,fontWeight:600,color:C.mid,marginBottom:3}}>No feeds logged yet</div>
                    <div style={{fontSize:13,color:C.lt}}>Log a bottle or breast feed to see intake tracking and NHS guidance here.</div>
                  </div>
                );
                return (
                  <div style={{background:fc.bg,border:`1px solid ${fc.color}30`,borderLeft:`4px solid ${fc.color}`,borderRadius:16,padding:"14px 16px",marginBottom:10}}>
                    <div style={{fontSize:14,fontFamily:"monospace",color:fc.color,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:10}}>Today's Milk Intake</div>

                    {/* Day vs Night split */}
                    <div style={{display:"flex",gap:10,marginBottom:12}}>
                      <div style={{flex:1,background:"rgba(255,255,255,0.7)",borderRadius:12,padding:"10px 12px"}}>
                        <div style={{fontSize:12,fontFamily:"monospace",color:C.lt,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:3}}>Daytime</div>
                        <div style={{fontFamily:"'Playfair Display',serif",fontSize:24,fontWeight:700,color:fc.color,lineHeight:1}}>{fc.dayMl}ml</div>
                        <div style={{fontSize:12,color:C.lt,marginTop:2}}>goal ~{fc.dayTarget}ml</div>
                      </div>
                      {fc.nightMl > 0 && (
                        <div style={{flex:1,background:"rgba(42,31,58,0.07)",borderRadius:12,padding:"10px 12px"}}>
                          <div style={{fontSize:12,fontFamily:"monospace",color:"#8878a8",textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:3}}>Night feeds</div>
                          <div style={{fontFamily:"'Playfair Display',serif",fontSize:24,fontWeight:700,color:"#7a6898",lineHeight:1}}>{fc.nightMl}ml</div>
                          <div style={{fontSize:12,color:"#9888b8",marginTop:2}}>total {fc.totalMl}ml</div>
                        </div>
                      )}
                      {fc.nightMl === 0 && (
                        <div style={{flex:1,background:"rgba(255,255,255,0.5)",borderRadius:12,padding:"10px 12px",display:"flex",flexDirection:"column",justifyContent:"center"}}>
                          <div style={{fontSize:12,fontFamily:"monospace",color:C.lt,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:2}}>NHS range</div>
                          <div style={{fontSize:14,fontWeight:600,color:C.mid}}>{fc.totalLabel}</div>
                        </div>
                      )}
                    </div>

                    {/* Status message */}
                    <div style={{display:"flex",alignItems:"flex-start",gap:8,background:"white",borderRadius:10,padding:"10px 12px",marginBottom:(fc.sleepLink||fc.suggestions.length)?8:0}}>
                      <span style={{fontSize:16,flexShrink:0}}>{fc.icon}</span>
                      <div style={{fontSize:15,color:C.mid,lineHeight:1.6}}>{fc.statusMsg}</div>
                    </div>

                    {/* Sleep link insight */}
                    {fc.sleepLink && (
                      <div style={{display:"flex",alignItems:"flex-start",gap:8,background:"#f0ecff",border:"1px solid #d4c8f8",borderRadius:10,padding:"10px 12px",marginBottom:fc.suggestions.length?8:0}}>
                        <span style={{fontSize:15,flexShrink:0}}>{fc.sleepLink.icon}</span>
                        <div>
                          {fc.sleepLink.title && <div style={{fontSize:14,fontWeight:700,color:"#6040c0",marginBottom:3}}>{fc.sleepLink.title}</div>}
                          <div style={{fontSize:14,color:"#5030a0",lineHeight:1.6}}>{fc.sleepLink.body}</div>
                        </div>
                      </div>
                    )}

                    {/* Timing suggestions */}
                    {fc.suggestions.map((s,i)=>(
                      <div key={i} style={{display:"flex",alignItems:"flex-start",gap:8,background:"rgba(255,255,255,0.6)",borderRadius:10,padding:"9px 12px",marginTop:6}}>
                        <span style={{fontSize:15,flexShrink:0}}>{s.icon}</span>
                        <div style={{fontSize:14,color:C.mid,lineHeight:1.6}}>{s.body}</div>
                      </div>
                    ))}

                    {/* NHS note — shown when night-heavy or low */}
                    {(fc.status==="night-heavy"||fc.status==="low") && (
                      <div style={{fontSize:13,color:C.lt,marginTop:10,paddingTop:8,borderTop:`1px solid ${fc.color}20`,lineHeight:1.5}}>
                        ℹ️ {fc.nhsNote}
                      </div>
                    )}
                  </div>
                );
              })()}

              {/* ══ 5. SLEEP ══════════════════════════════════════ */}
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12,marginTop:8}}>
                <div style={{width:3,height:16,background:C.mint,borderRadius:99}}/>
                <div style={{fontSize:14,fontFamily:"monospace",color:C.lt,textTransform:"uppercase",letterSpacing:"0.12em",fontWeight:700}}>Sleep</div>
              </div>

              {/* Sleep Analytics */}
              {(()=>{
                const score = sleepScore();
                const scoreColor = sleepScoreColor(score);
                const scoreLabel = sleepScoreLabel(score);
                const advice = sleepAdvice();
                const tired = tiredDetection();
                const suggestedBed = bedtimePrediction();
                const hasNap = (days[selDay]||[]).some(e=>e.type==="nap");
                const actualBedEntry = dayE.find(e=>e.type==="sleep");
                const pred = predictNextNap();
                const minsAway = pred ? minutesUntil(pred.napStart_min) : null;
                if (!hasNap) return null;
                const radius = 22;
                const circumference = 2 * Math.PI * radius;
                const strokeDash = (score / 100) * circumference;
                return (
                  <div style={{background:"white",border:`1px solid ${C.blush}`,borderRadius:20,padding:"16px",marginBottom:10,boxShadow:"0 2px 12px rgba(201,112,90,0.06)"}}>
                    <div style={{fontSize:15,fontFamily:"monospace",color:C.lt,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:12}}>🧠 Sleep Analytics</div>
                    <div style={{display:"flex",alignItems:"center",gap:16,marginBottom:12}}>
                      <div style={{position:"relative",flexShrink:0}}>
                        <svg width={60} height={60} viewBox="0 0 60 60">
                          <circle cx={30} cy={30} r={radius} fill="none" stroke={C.blush} strokeWidth={5}/>
                          <circle cx={30} cy={30} r={radius} fill="none" stroke={scoreColor} strokeWidth={5} strokeDasharray={`${strokeDash} ${circumference}`} strokeLinecap="round" transform="rotate(-90 30 30)"/>
                        </svg>
                        <div style={{position:"absolute",top:"50%",left:"50%",transform:"translate(-50%,-50%)",fontFamily:"monospace",fontSize:15,fontWeight:700,color:scoreColor}}>{score}</div>
                      </div>
                      <div>
                        <div style={{fontFamily:"'Playfair Display',serif",fontSize:20,fontWeight:700,color:scoreColor,marginBottom:4}}>{scoreLabel}</div>
                        <div style={{fontSize:15,color:C.mid,lineHeight:1.5}}>{advice}</div>
                      </div>
                    </div>
                    {tired&&<div style={{display:"inline-block",fontSize:15,fontFamily:"monospace",padding:"4px 12px",borderRadius:99,background:tired.startsWith("⚠️")||tired.startsWith("💤")?`${C.ter}18`:`${C.mint}18`,color:tired.startsWith("✓")?C.mint:C.ter,marginBottom:12}}>{tired}</div>}
                    {actualBedEntry ? (
                      <div style={{background:"linear-gradient(135deg,#ede8f5,#f5f0fa)",borderRadius:14,padding:"12px 14px"}}>
                        <div style={{fontSize:14,fontFamily:"monospace",color:"#8878a8",textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:2}}>Bedtime Logged 🌙</div>
                        <div style={{fontSize:15,color:"#a898c8"}}>Sleep tight!</div>
                      </div>
                    ) : pred ? (
                      <div style={{background:"linear-gradient(135deg,#e8f5ef,#f0faf6)",borderRadius:14,padding:"12px 14px"}}>
                        <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",marginBottom:suggestedBed?8:0}}>
                          <div>
                            <div style={{fontSize:14,fontFamily:"monospace",color:C.mint,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:2}}>😴 Next Nap Window</div>
                            <div style={{fontFamily:"'Playfair Display',serif",fontSize:22,fontWeight:700,color:C.mint}}>{minsAway!==null&&minsAway<=0?"Now!":fmtCountdown(napCountdown||0)}</div>
                            <div style={{fontSize:14,color:C.lt,marginTop:2}}>{pred.sourceLabel}</div>
                          </div>
                          <div style={{textAlign:"right"}}>
                            <div style={{fontFamily:"monospace",fontSize:15,fontWeight:700,color:C.mint}}>{fmt12(pred.napStart_min)}</div>
                            <div style={{fontSize:15,color:C.lt}}>– {fmt12(pred.napStart_max)}</div>
                          </div>
                        </div>
                        {suggestedBed&&(
                          <div style={{borderTop:`1px solid ${C.mint}22`,paddingTop:8,marginTop:4}}>
                            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                              <div>
                                <div style={{fontSize:14,fontFamily:"monospace",color:C.sky,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:2}}>{suggestedBed.bedSource==="avg"?"Predicted Bedtime":"Suggested Bedtime"}</div>
                                <div style={{fontSize:14,color:C.mid,lineHeight:1.4,maxWidth:160}}>{suggestedBed.adjustReason||(suggestedBed.bedSource==="avg"?"Based on your recent routine":"Based on last nap + wake window")}</div>
                              </div>
                              <div style={{fontFamily:"'Playfair Display',serif",fontSize:22,fontWeight:700,color:C.sky}}>{fmt12(suggestedBed.time)}</div>
                            </div>
                          </div>
                        )}
                      </div>
                    ) : suggestedBed ? (
                      <div style={{background:"linear-gradient(135deg,#d5e7f2,#e8f3fa)",borderRadius:14,padding:"12px 14px",marginTop:4}}>
                        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:suggestedBed.adjustReason?6:0}}>
                          <div>
                            <div style={{fontSize:14,fontFamily:"monospace",color:C.sky,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:2}}>{suggestedBed.bedSource==="avg"?"Predicted Bedtime":"Suggested Bedtime"}</div>
                            <div style={{fontSize:14,color:C.mid}}>{suggestedBed.bedSource==="avg"?"Based on your recent routine":"Based on last nap + wake window"}</div>
                          </div>
                          <div style={{fontFamily:"'Playfair Display',serif",fontSize:26,fontWeight:700,color:C.sky}}>{fmt12(suggestedBed.time)}</div>
                        </div>
                        {suggestedBed.adjustReason&&<div style={{fontSize:15,color:C.sky,background:"rgba(122,171,196,0.15)",borderRadius:8,padding:"5px 9px",lineHeight:1.4}}>&#9888; {suggestedBed.adjustReason}</div>}
                      </div>
                    ) : null}
                  </div>
                );
              })()}

              {/* Is This Normal - Sleep */}
              {(()=>{
                const sc = sleepNormalCard();
                if (!sc) return (
                  <div style={{background:C.warm,borderRadius:14,padding:"16px",marginBottom:10,border:`1px dashed ${C.blush}`,textAlign:"center"}}>
                    <div style={{fontSize:22,marginBottom:6}}>😴</div>
                    <div style={{fontSize:14,fontWeight:600,color:C.mid,marginBottom:3}}>No naps logged yet</div>
                    <div style={{fontSize:13,color:C.lt}}>Tap <strong>Start Nap</strong> in the header or log a nap to see age-based sleep guidance.</div>
                  </div>
                );
                return (
                  <div style={{background:sc.bg,border:`1px solid ${sc.color}30`,borderLeft:`4px solid ${sc.color}`,borderRadius:16,padding:"14px 16px",marginBottom:10}}>
                    <div style={{fontSize:14,fontFamily:"monospace",color:sc.color,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:8}}>Is This Normal? Today's Sleep</div>
                    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
                      <div>
                        <div style={{fontFamily:"'Playfair Display',serif",fontSize:22,fontWeight:700,color:sc.color}}>{hm(sc.totalMins)}</div>
                        <div style={{fontSize:14,fontFamily:"monospace",color:C.lt,marginTop:2}}>today's naps</div>
                      </div>
                      <div style={{textAlign:"right"}}>
                        <div style={{fontSize:15,fontFamily:"monospace",color:C.mid}}>Typical for this age</div>
                        <div style={{fontSize:15,fontWeight:600,color:C.mid}}>{sc.range.label}</div>
                      </div>
                    </div>
                    <div style={{display:"flex",alignItems:"flex-start",gap:8,background:"white",borderRadius:10,padding:"9px 12px"}}>
                      <span style={{fontSize:16,flexShrink:0}}>{sc.icon}</span>
                      <div style={{fontSize:14,color:C.mid,lineHeight:1.5}}>{sc.message}</div>
                    </div>
                  </div>
                );
              })()}

              {/* Awake Windows */}
              {(()=>{
                const nightWins = getNightWindows(entries);
                if (wins.length === 0 && nightWins.length === 0) return null;
                return (
                  <div style={{...card,marginBottom:10}}>
                    <div style={{fontSize:15,fontFamily:"monospace",color:C.lt,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:8}}>Wake Windows & Night Stretches</div>
                    {wins.length>0&&(
                      <div style={{marginBottom:nightWins.length?10:0}}>
                        <div style={{fontSize:12,fontFamily:"monospace",color:C.lt,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:5}}>Wake Windows</div>
                        <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                          {wins.map((w,i)=>(
                            <div key={i} style={{background:w.bed?"#d5e7f2":"#f5eccb",borderRadius:10,padding:"5px 10px",fontSize:14,color:w.bed?C.sky:"#b88a20",fontFamily:"monospace"}}>
                              {fmt12(w.from)} → {fmt12(w.to)} <strong>{hm(w.mins)}</strong>
                              {w.bed&&<span style={{fontSize:12,marginLeft:4,opacity:0.7}}>🌙</span>}
                            </div>
                          ))}
                        </div>
                      </div>
                    )}
                    {nightWins.length>0&&(
                      <div>
                        <div style={{fontSize:12,fontFamily:"monospace",color:"#8878a8",textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:5}}>Night Stretches</div>
                        <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                          {nightWins.map((w,i)=>(
                            <div key={i} style={{background:"#2a1f3a",borderRadius:10,padding:"5px 10px",fontSize:14,color:"#c8b8e8",fontFamily:"monospace"}}>
                              {fmt12(w.from)} → {fmt12(w.to)} <strong>{hm(w.mins)}</strong>
                            </div>
                          ))}
                        </div>
                      </div>
                    )}
                  </div>
                );
              })()}

              {/* Sleep Regression */}
              {(()=>{
                const alerts = regressionCheck();
                if (!alerts) return null;
                return (
                  <div style={{marginBottom:10}}>
                    {alerts.map((a,i)=>(
                      <div key={i} style={{background:"#fff8f0",border:"1px solid #f0d8b0",borderLeft:"4px solid #d4a855",borderRadius:16,padding:"14px 16px",marginBottom:8}}>
                        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
                          <span style={{fontSize:18}}>{a.icon}</span>
                          <div style={{fontSize:14,fontWeight:700,color:"#8a6020"}}>Sleep Pattern Change Detected</div>
                        </div>
                        <div style={{fontSize:15,fontWeight:600,color:C.mid,marginBottom:5}}>{a.title}</div>
                        <div style={{fontSize:14,color:C.mid,lineHeight:1.6}}>{a.body}</div>
                      </div>
                    ))}
                  </div>
                );
              })()}

              {/* ══ 6. END OF DAY ══════════════════════════════════ */}
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12,marginTop:8}}>
                <div style={{width:3,height:16,background:C.sky,borderRadius:99}}/>
                <div style={{fontSize:14,fontFamily:"monospace",color:C.lt,textTransform:"uppercase",letterSpacing:"0.12em",fontWeight:700}}>End of Day</div>
              </div>

              {/* Tomorrow's Schedule */}
              {(()=>{
                const sched = tomorrowSchedule();
                if (!sched) return null;
                return (
                  <div style={{background:"white",border:`1px solid ${C.blush}`,borderRadius:16,padding:"16px",marginBottom:14,boxShadow:"0 2px 12px rgba(201,112,90,0.06)"}}>
                    <div style={{fontSize:14,fontFamily:"monospace",color:C.lt,textTransform:"uppercase",letterSpacing:"0.12em",fontWeight:700,marginBottom:14}}>📅 Tomorrow's Suggested Schedule</div>
                    <div style={{display:"flex",flexDirection:"column",gap:0}}>
                      {sched.map((item,i)=>(
                        <div key={i} style={{display:"flex",alignItems:"center",gap:0}}>
                          <div style={{display:"flex",flexDirection:"column",alignItems:"center",width:28,flexShrink:0}}>
                            <div style={{width:9,height:9,borderRadius:"50%",background:item.label==="Bedtime"?C.sky:item.label.startsWith("Nap")?C.mint:C.gold,flexShrink:0}}/>
                            {i<sched.length-1&&<div style={{width:2,height:24,background:C.blush}}/>}
                          </div>
                          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",flex:1,padding:"5px 0 5px 6px"}}>
                            <div style={{display:"flex",alignItems:"center",gap:6}}>
                              <span style={{fontSize:15}}>{item.icon}</span>
                              <span style={{fontSize:15,color:C.mid,fontWeight:500}}>{item.label}</span>
                            </div>
                            <span style={{fontFamily:"monospace",fontSize:15,fontWeight:700,color:C.deep}}>{fmt12(item.time.includes("–")?item.time.split("–")[0].trim():item.time)}{item.time.includes("–")?" – "+fmt12(item.time.split("–")[1].trim()):""}</span>
                          </div>
                        </div>
                      ))}
                    </div>
                    <div style={{fontSize:14,fontFamily:"monospace",color:C.lt,marginTop:12,borderTop:`1px solid ${C.blush}`,paddingTop:8}}>
                      Based on recent sleep patterns and age-appropriate wake windows
                    </div>
                  </div>
                );
              })()}

              {/* Insights prompt */}
              {Object.keys(days).length >= 7 && !insightDismissed && !showInsights && (
                <div style={{background:"linear-gradient(135deg,#fdf4f0,#f8ede8)",border:`1px solid ${C.rose}`,borderRadius:18,padding:"14px 15px",marginBottom:12}}>
                  <div style={{fontSize:15,fontWeight:600,color:C.ter,marginBottom:4}}>✨ You have 7 days of data!</div>
                  <div style={{fontSize:14,color:C.mid,marginBottom:10,lineHeight:1.5}}>Want to see personalised sleep & feeding insights based on {possessive(babyName||"Baby")} patterns?</div>
                  <div style={{display:"flex",gap:8}}>
                    <button onClick={()=>setShowInsights(true)} style={{flex:1,background:`linear-gradient(135deg,#c9705a,#a85a44)`,border:"none",borderRadius:99,padding:"9px",color:"white",fontSize:14,fontWeight:700,cursor:"pointer"}}>Yes, show me →</button>
                    <button onClick={()=>{setInsightDismissed(true);try{localStorage.setItem("ins_v1","1");}catch{}}} style={{background:"none",border:`1px solid ${C.blush}`,borderRadius:99,padding:"9px 14px",color:C.lt,fontSize:14,cursor:"pointer"}}>Maybe later</button>
                  </div>
                </div>
              )}

              {/* Insights panel */}
              {showInsights && (()=>{
                const t = analyseTrends();
                if (!t) return null;
                return (
                  <div style={{...card, marginBottom:12}}>
                    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
                      <div style={{fontFamily:"'Playfair Display',serif",fontStyle:"italic",fontSize:16,color:C.mid}}>✨ Sleep & Feed Insights</div>
                      <button onClick={()=>setShowInsights(false)} style={{background:"none",border:"none",color:C.lt,fontSize:18,cursor:"pointer"}}>✕</button>
                    </div>
                    <div style={{fontSize:15,fontFamily:"monospace",color:C.lt,marginBottom:12}}>Based on {t.days} days of data</div>
                    {t.insights.map((ins,i)=>(
                      <div key={i} style={{marginBottom:12,padding:"11px 13px",borderRadius:14,background:ins.type==="warn"?"#fff8f5":ins.type==="good"?"#f0faf6":"#f5f8ff",border:`1px solid ${ins.type==="warn"?C.rose:ins.type==="good"?"#b8e8d4":"#c8d8f0"}`}}>
                        <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:5}}>
                          <span style={{fontSize:16}}>{ins.icon}</span>
                          <span style={{fontWeight:700,fontSize:15,color:ins.type==="warn"?C.ter:ins.type==="good"?C.mint:C.sky}}>{ins.title}</span>
                        </div>
                        <div style={{fontSize:14,color:C.mid,lineHeight:1.6}}>{ins.body}</div>
                      </div>
                    ))}
                    <div style={{fontSize:14,color:C.lt,fontFamily:"monospace",marginTop:4,lineHeight:1.5}}>⚠️ These are general observations based on logged data, not medical advice. Always consult your health visitor or GP if you have concerns.</div>
                  </div>
                );
              })()}

              {/* Action buttons */}
              <div style={{display:"flex",gap:8,marginTop:4}}>
                <button onClick={copySummary} style={{flex:1,padding:"13px",borderRadius:14,border:`1.5px solid ${C.rose}`,background:"white",color:C.ter,fontSize:15,cursor:"pointer",fontFamily:"inherit",fontWeight:600,boxShadow:"0 2px 8px rgba(201,112,90,0.08)"}}>
                  {copied?"✓ Copied!":"📋 Copy Day"}
                </button>
                <button onClick={()=>setModal("report")} style={{flex:1,padding:"13px",borderRadius:14,border:"none",background:`linear-gradient(135deg,#c9705a,#a85a44)`,color:"white",fontSize:15,cursor:"pointer",fontFamily:"inherit",fontWeight:600,boxShadow:"0 4px 14px rgba(201,112,90,0.3)"}}>
                  📊 Day Report
                </button>
              </div>
            </div>
          )
        )}

        {/* WEEK TAB */}
        {tab==="week"&&(
          <div>
            <div style={card}>
              <div style={{fontSize:15,fontFamily:"monospace",color:C.lt,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:4}}>Avg Daily Feed (last 7 days)</div>
              <div style={{fontFamily:"'Playfair Display',serif",fontSize:30,fontWeight:700,color:C.ter}}>{avgMl}<span style={{fontSize:15,color:C.lt,fontWeight:400}}> ml</span></div>
            </div>
            <div style={card}>
              <div style={{fontSize:15,fontFamily:"monospace",color:C.lt,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:10}}>Feed Total by Day</div>
              <div style={{display:"flex",alignItems:"flex-end",gap:6,height:80}}>
                {wStats.map((s,i)=>(
                  <div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
                    <div style={{fontSize:9,fontFamily:"monospace",color:C.lt}}>{s.ml||""}</div>
                    <div style={{width:"100%",background:`${C.ter}${s.date===selDay?"ff":"88"}`,borderRadius:"4px 4px 0 0",height:`${Math.max(4,(s.ml/maxMl)*60)}px`}}/>
                    <div style={{fontSize:9,fontFamily:"monospace",color:s.date===selDay?C.ter:C.lt,fontWeight:s.date===selDay?700:400}}>{fmtDate(s.date).slice(0,5)}</div>
                  </div>
                ))}
              </div>
            </div>
            <div style={card}>
              <div style={{fontSize:15,fontFamily:"monospace",color:C.lt,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:10}}>Nap Time by Day (mins)</div>
              <div style={{display:"flex",alignItems:"flex-end",gap:6,height:80}}>
                {wStats.map((s,i)=>(
                  <div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
                    <div style={{fontSize:9,fontFamily:"monospace",color:C.lt}}>{s.napM||""}</div>
                    <div style={{width:"100%",background:`${C.mint}${s.date===selDay?"ff":"88"}`,borderRadius:"4px 4px 0 0",height:`${Math.max(4,(s.napM/maxNapBar)*60)}px`}}/>
                    <div style={{fontSize:9,fontFamily:"monospace",color:s.date===selDay?C.mint:C.lt,fontWeight:s.date===selDay?700:400}}>{fmtDate(s.date).slice(0,5)}</div>
                  </div>
                ))}
              </div>
            </div>
            <div style={card}>
              <div style={{fontSize:15,fontFamily:"monospace",color:C.lt,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:10}}>Day Summary</div>
              {wStats.map((s,i)=>(
                <div key={i} onClick={()=>{setSelDay(s.date);setTab("day");}} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"9px 0",borderBottom:i<wStats.length-1?`1px solid ${C.blush}`:"none",cursor:"pointer"}}>
                  <span style={{fontSize:15,color:s.date===selDay?C.ter:C.deep,fontWeight:s.date===selDay?600:400}}>{fmtLong(s.date)}</span>
                  <div style={{display:"flex",gap:8}}>
                    <span style={{fontSize:14,fontFamily:"monospace",color:C.ter}}>{s.ml}ml</span>
                    <span style={{fontSize:14,fontFamily:"monospace",color:C.mint}}>{s.naps} naps</span>
                    <span style={{fontSize:14,fontFamily:"monospace",color:C.lt}}>{s.nightW}🌙</span>
                  </div>
                </div>
              ))}
            </div>
          </div>
        )}

        {/* TRENDS TAB */}
        {tab==="trends"&&(
          dayKeys.length<3?(
            <div style={{textAlign:"center",padding:"48px 20px",color:C.lt}}>
              <div style={{fontFamily:"'Playfair Display',serif",fontSize:20,color:C.mid,marginBottom:8}}>Not enough data yet</div>
              <div style={{fontSize:15,fontFamily:"monospace"}}>Add at least 3 days to see trends</div>
            </div>
          ):(
            <div>
              {tLast&&tPrev&&(
                <div style={card}>
                  <div style={{fontSize:15,fontFamily:"monospace",color:C.lt,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:12}}>This Week vs Last Week</div>
                  {[
                    {label:"Avg Daily Feed",curr:tLast.avgMl,prev:tPrev.avgMl,unit:"ml"},
                    {label:"Avg Nap Time",curr:tLast.avgNap,prev:tPrev.avgNap,unit:"min"},
                    {label:"Avg Night Wakes",curr:tLast.avgNight,prev:tPrev.avgNight,unit:""},
                  ].map((row,i)=>{
                    const t=arrow(row.curr,row.prev);
                    return(
                      <div key={i} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 0",borderBottom:i<2?`1px solid ${C.blush}`:"none"}}>
                        <div>
                          <div style={{fontSize:15,fontWeight:500}}>{row.label}</div>
                          <div style={{fontSize:15,fontFamily:"monospace",color:C.lt,marginTop:2}}>Last week: {row.prev}{row.unit}</div>
                        </div>
                        <div style={{textAlign:"right"}}>
                          <div style={{fontFamily:"'Playfair Display',serif",fontSize:22,fontWeight:700,color:C.ter}}>{row.curr}<span style={{fontSize:14,color:C.lt}}>{row.unit}</span></div>
                          {t&&<div style={{fontSize:16,color:t.color,lineHeight:1}}>{t.icon}</div>}
                        </div>
                      </div>
                    );
                  })}
                </div>
              )}
              <div style={card}>
                <div style={{fontSize:15,fontFamily:"monospace",color:C.lt,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:10}}>Daily Feed (ml)</div>
                <TrendLine vals={mlVals} keys={dayKeys} color={C.ter}/>
              </div>
              <div style={card}>
                <div style={{fontSize:15,fontFamily:"monospace",color:C.lt,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:10}}>Daily Nap Time</div>
                <TrendLine vals={napVals} keys={dayKeys} color={C.mint} unit="m"/>
              </div>
              {weekAvgs.length>1&&(
                <div style={card}>
                  <div style={{fontSize:15,fontFamily:"monospace",color:C.lt,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:10}}>Weekly Averages</div>
                  {weekAvgs.map((wk,i)=>(
                    <div key={i} style={{padding:"9px 0",borderBottom:i<weekAvgs.length-1?`1px solid ${C.blush}`:"none"}}>
                      <div style={{fontSize:15,fontFamily:"monospace",color:C.lt,marginBottom:5}}>{wk.label} · {wk.days} days</div>
                      <div style={{display:"flex",gap:7,flexWrap:"wrap"}}>
                        <span style={{background:"#f5e0d8",color:C.ter,fontFamily:"monospace",fontSize:15,padding:"2px 8px",borderRadius:99}}>~{wk.avgMl}ml/day</span>
                        <span style={{background:"#d4ede6",color:C.mint,fontFamily:"monospace",fontSize:15,padding:"2px 8px",borderRadius:99}}>~{hm(wk.avgNap)} naps</span>
                        <span style={{background:"#f5eccb",color:"#b88a20",fontFamily:"monospace",fontSize:15,padding:"2px 8px",borderRadius:99}}>~{wk.avgNight} night wakes</span>
                      </div>
                    </div>
                  ))}
                </div>
              )}
            </div>
          )
        )}

        {/* GROWTH TAB */}
        {tab==="growth"&&(()=>{
          const ageMonths = babyDob ? Math.floor((new Date() - new Date(babyDob)) / (1000*60*60*24*30.44)) : null;
          const sortedW = [...weights].sort((a,b)=>a.date.localeCompare(b.date));
          const wWithPct = sortedW.map(w => {
            if(!babyDob) return {...w, pct: null};
            const ageMo = Math.floor((new Date(w.date) - new Date(babyDob)) / (1000*60*60*24*30.44));
            if(ageMo < 0 || ageMo > 24) return {...w, pct: null};
            return {...w, pct: getPercentile(w.kg, ageMo, babySex), ageMo};
          });
          const latest = wWithPct.filter(w=>w.pct!==null).slice(-1)[0];
          const W=280,H=80;
          const kgs = sortedW.map(w=>w.kg);
          const maxKg = Math.max(...kgs,1);
          const minKg = Math.min(...kgs,0)*0.95;
          const pts = sortedW.map((w,i)=>({
            x: sortedW.length===1?W/2:(i/(sortedW.length-1))*W,
            y: H-((w.kg-minKg)/(maxKg-minKg||1))*H,
            kg:w.kg, date:w.date
          }));
          const path = pts.map((p,i)=>`${i===0?"M":"L"}${p.x},${p.y}`).join(" ");

          return(
            <div>
              <div style={{...card}}>
                <div style={{fontSize:15,fontFamily:"monospace",color:C.lt,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:10}}>Baby Info</div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:8}}>
                  <div>
                    <label style={{fontSize:15,fontFamily:"monospace",color:C.mid,textTransform:"uppercase",letterSpacing:"0.08em",display:"block",marginBottom:4}}>{babyUnborn ? "Due Date" : "Date of Birth"}</label>
                    <input type="date" value={babyDob} onChange={e=>setBabyDob(e.target.value)} style={{width:"100%",padding:"9px 12px",borderRadius:12,border:`1.5px solid ${C.blush}`,background:C.warm,fontSize:15,fontFamily:"inherit",outline:"none",boxSizing:"border-box"}}/>
                    <div style={{display:"flex",gap:6,marginTop:6}}>
                      {[["born","Born 🎉"],["unborn","Due 🤰"]].map(([v,l])=>(
                        <div key={v} onClick={()=>setBabyUnborn(v==="unborn")} style={{flex:1,padding:"5px 8px",borderRadius:10,border:`1.5px solid ${(v==="unborn"?babyUnborn:!babyUnborn)?C.ter:C.blush}`,background:(v==="unborn"?babyUnborn:!babyUnborn)?"#fdf0eb":"white",textAlign:"center",cursor:"pointer",fontSize:14,fontWeight:600,color:(v==="unborn"?babyUnborn:!babyUnborn)?C.ter:C.mid,transition:"all 0.2s"}}>
                          {l}
                        </div>
                      ))}
                    </div>
                  </div>
                  <div>
                    <label style={{fontSize:15,fontFamily:"monospace",color:C.mid,textTransform:"uppercase",letterSpacing:"0.08em",display:"block",marginBottom:4}}>Sex</label>
                    <select value={babySex} onChange={e=>setBabySex(e.target.value)} style={{width:"100%",padding:"9px 12px",borderRadius:12,border:`1.5px solid ${C.blush}`,background:C.warm,fontSize:15,fontFamily:"inherit",outline:"none",boxSizing:"border-box"}}>
                      <option value="boy">Boy</option>
                      <option value="girl">Girl</option>
                    </select>
                  </div>
                </div>
                {ageMonths!==null&&<div style={{fontSize:14,color:C.mid,fontFamily:"monospace",textAlign:"center",marginTop:4}}>
                  {babyUnborn
                    ? (()=>{
                        const daysUntil = Math.ceil((new Date(babyDob) - new Date()) / (1000*60*60*24));
                        return daysUntil > 0
                          ? <span>{babyName||"Baby"} is due in <strong style={{color:C.ter}}>{daysUntil} day{daysUntil!==1?"s":""}</strong> 🤰</span>
                          : <span>Due date has passed — update to date of birth!</span>;
                      })()
                    : <span>{babyName||"Baby"} is <strong style={{color:C.ter}}>{ageMonths} month{ageMonths!==1?"s":""}</strong> old</span>
                  }
                </div>}
              </div>

              {latest&&(
                <div style={{...card,textAlign:"center",padding:"20px 16px"}}>
                  <div style={{fontSize:15,fontFamily:"monospace",color:C.lt,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:8}}>Latest Weight Percentile</div>
                  <div style={{fontFamily:"'Playfair Display',serif",fontSize:52,fontWeight:700,color:percentileColor(latest.pct),lineHeight:1}}>{ordinal(latest.pct)}</div>
                  <div style={{fontSize:15,color:C.mid,marginTop:6}}>{latest.kg}kg at {latest.ageMo} months · {babySex}</div>
                  <div style={{fontSize:14,marginTop:6,padding:"6px 12px",borderRadius:99,display:"inline-block",background:percentileColor(latest.pct)+"22",color:percentileColor(latest.pct),fontFamily:"monospace",fontWeight:600}}>
                    {percentileNote(latest.pct)}
                  </div>
                </div>
              )}

              <div style={{...card}}>
                <div style={{fontSize:15,fontFamily:"monospace",color:C.lt,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:10}}>Log Weight</div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:8}}>
                  <Inp label="Date" type="date" value={growthForm.date} onChange={e=>setGrowthForm(f=>({...f,date:e.target.value}))} style={{marginBottom:0}}/>
                  <Inp label="Weight (kg)" type="number" step="0.01" placeholder="e.g. 5.2" value={growthForm.kg} onChange={e=>setGrowthForm(f=>({...f,kg:e.target.value}))} style={{marginBottom:0}}/>
                </div>
                <PBtn onClick={()=>{
                  if(!growthForm.kg)return;
                  const updated=[...weights.filter(x=>x.date!==growthForm.date),{date:growthForm.date,kg:parseFloat(growthForm.kg)}].sort((a,b)=>a.date.localeCompare(b.date));
                  setWeights(updated);setGrowthForm({date:todayStr(),kg:""});
                }}>Save Weight</PBtn>
              </div>

              {sortedW.length>=2&&(
                <div style={{...card}}>
                  <div style={{fontSize:15,fontFamily:"monospace",color:C.lt,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:10}}>Weight Over Time</div>
                  <svg width="100%" viewBox={`0 0 ${W} ${H+20}`} style={{overflow:"visible"}}>
                    <path d={path} fill="none" stroke={C.ter} strokeWidth={2} strokeLinejoin="round"/>
                    {pts.map((p,i)=>(
                      <g key={i}>
                        <circle cx={p.x} cy={p.y} r={4} fill={C.ter}/>
                        <text x={p.x} y={p.y-9} textAnchor="middle" fontSize={9} fill={C.mid} fontFamily="monospace">{p.kg}kg</text>
                        <text x={p.x} y={H+16} textAnchor="middle" fontSize={8} fill={C.lt} fontFamily="monospace">{fmtDate(p.date).slice(0,5)}</text>
                      </g>
                    ))}
                  </svg>
                </div>
              )}

              {wWithPct.filter(w=>w.pct!==null).length>0&&(
                <div style={{...card}}>
                  <div style={{fontSize:15,fontFamily:"monospace",color:C.lt,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:10}}>Percentile History</div>
                  {wWithPct.filter(w=>w.pct!==null).reverse().map((w,i)=>(
                    <div key={i} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"9px 0",borderBottom:i<wWithPct.filter(x=>x.pct!==null).length-1?`1px solid ${C.blush}`:"none"}}>
                      <div>
                        <div style={{fontSize:15,fontWeight:500}}>{fmtLong(w.date)}</div>
                        <div style={{fontSize:15,fontFamily:"monospace",color:C.lt,marginTop:2}}>{w.ageMo} months · {w.kg}kg</div>
                      </div>
                      <span style={{fontFamily:"'Playfair Display',serif",fontSize:22,fontWeight:700,color:percentileColor(w.pct)}}>{ordinal(w.pct)}</span>
                    </div>
                  ))}
                </div>
              )}

              {weights.length>0&&(
                <div style={{display:"flex",flexDirection:"column",gap:7}}>
                  {[...weights].sort((a,b)=>b.date.localeCompare(a.date)).map((w,i)=>(
                    <div key={i} style={{background:C.warm,border:`1px solid ${C.blush}`,borderRadius:14,padding:"11px 12px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                      <span style={{fontSize:15,fontWeight:500}}>{fmtLong(w.date)}</span>
                      <div style={{display:"flex",gap:8,alignItems:"center"}}>
                        <span style={{background:"#f5e0d8",color:C.ter,fontFamily:"monospace",fontSize:15,padding:"3px 10px",borderRadius:99,fontWeight:600}}>{w.kg} kg</span>
                        <button onClick={()=>setWeights(ws=>ws.filter(x=>x.date!==w.date))} style={{background:"#f0e5e0",border:"none",borderRadius:"50%",width:23,height:23,color:C.lt,cursor:"pointer",fontSize:14}}>✕</button>
                      </div>
                    </div>
                  ))}
                </div>
              )}
              {weights.length===0&&<div style={{textAlign:"center",color:C.lt,fontSize:15,fontFamily:"monospace",padding:"20px 0"}}>No weights logged yet</div>}
            </div>
          );
        })()}

        {/* MILESTONES TAB */}
        {tab==="milestones"&&(()=>{
          const ageWeeks = age ? age.totalWeeks : null;
          const currentMonth = babyUnborn ? -1 : (age ? age.months : null);
          const doneCount = MILESTONES.filter(m=>milestones[m.id]&&milestones[m.id].date).length;

          if (!babyDob) return (
            <div style={{...card,textAlign:"center",padding:"36px 20px"}}>
              <div style={{fontSize:40,marginBottom:14}}>🎂</div>
              <div style={{fontFamily:"'Playfair Display',serif",fontSize:20,color:C.mid,marginBottom:8}}>Add your baby's date of birth</div>
              <div style={{fontSize:15,color:C.lt,marginBottom:20,lineHeight:1.7}}>We'll show milestones organised by month, tailored to exactly how old {babyName||"your baby"} is today.</div>
              <button onClick={()=>setTab("growth")} style={{background:`linear-gradient(135deg,#c9705a,#a85a44)`,border:"none",borderRadius:99,padding:"12px 28px",color:"white",fontSize:14,cursor:"pointer",fontWeight:700}}>Set Date of Birth →</button>
            </div>
          );

          // Unborn baby — show all milestones greyed out with a banner
          if (babyUnborn) {
            const daysUntil = babyDob ? Math.ceil((new Date(babyDob) - new Date()) / (1000*60*60*24)) : null;
            return (
              <div>
                <div style={{background:"linear-gradient(135deg,#fdeee8,#fad8d0)",border:`1px solid ${C.rose}`,borderRadius:16,padding:"16px 18px",marginBottom:16,textAlign:"center"}}>
                  <div style={{fontSize:28,marginBottom:8}}>🤰</div>
                  <div style={{fontFamily:"'Playfair Display',serif",fontSize:18,color:C.deep,fontWeight:700,marginBottom:4}}>
                    {daysUntil > 0 ? `Due in ${daysUntil} day${daysUntil!==1?"s":""}` : "Almost here!"}
                  </div>
                  <div style={{fontSize:15,color:C.mid,lineHeight:1.6}}>Milestones are ready and waiting. They'll unlock once {babyName||"your baby"} arrives!</div>
                </div>
                {[0,1,2,3,4,5,6].map(mo => {
                  const ms = MILESTONES.filter(m => {
                    const startMo = Math.floor(m.earliest / 4.33);
                    const endMo = Math.floor(m.latest / 4.33);
                    return mo >= startMo && mo <= endMo;
                  });
                  if (!ms.length) return null;
                  const monthLabel = mo === 0 ? "Newborn" : `Month ${mo}`;
                  return (
                    <div key={mo} style={{...card, padding:0, overflow:"hidden", marginBottom:12, opacity:0.45}}>
                      <div style={{background:"#f0ece8", padding:"12px 16px", display:"flex", alignItems:"center", justifyContent:"space-between"}}>
                        <div style={{fontFamily:"'Playfair Display',serif", fontSize:17, fontWeight:700, color:"#b0a8a4"}}>{monthLabel}</div>
                        <span style={{fontSize:14,color:"#c0b8b4",fontFamily:"monospace"}}>🔒 {ms.length} milestones</span>
                      </div>
                      <div style={{padding:"4px 16px 6px"}}>
                        {ms.map(m => (
                          <div key={m.id} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 0",borderBottom:`1px solid ${C.blush}`}}>
                            <div style={{width:22,height:22,borderRadius:"50%",border:"2px solid #ddd",background:"transparent",flexShrink:0}}/>
                            <div style={{fontSize:15,color:"#c8bdb8"}}>{m.label}</div>
                          </div>
                        ))}
                      </div>
                    </div>
                  );
                })}
              </div>
            );
          }

          const msMonths = (m) => {
            const startMo = Math.floor(m.earliest / 4.33);
            const endMo = Math.floor(m.latest / 4.33);
            return { startMo, endMo };
          };

          const maxMonth = Math.max((currentMonth||0) + 1, 12);
          const months = Array.from({length: maxMonth + 1}, (_, i) => i);

          const msForMonth = (mo) => MILESTONES.filter(m => {
            const { startMo, endMo } = msMonths(m);
            return mo >= startMo && mo <= endMo;
          });

          const MilestoneRow = ({m, monthIdx}) => {
            const done = milestones[m.id] && milestones[m.id].date;
            const isCurrent = currentMonth !== null && monthIdx === currentMonth;
            const isPast = currentMonth !== null && monthIdx < currentMonth;
            const isFuture = currentMonth !== null && monthIdx > currentMonth + 1;
            const checkBorder = done ? C.mint : isCurrent ? C.ter : isFuture ? "#ddd" : C.blush;
            const checkBg = done ? C.mint : "transparent";
            const textColor = done ? C.mint : isFuture ? "#c8bdb8" : C.deep;

            return (
              <div onClick={()=>{
                if(isFuture) return;
                if(done){
                  if(window.confirm(`Remove "${m.label}"?`)) setMilestones(ms=>({...ms,[m.id]:{}}));
                } else {
                  setMilestones(ms=>({...ms,[m.id]:{date:todayStr()}}));
                }
              }} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 0",borderBottom:`1px solid ${C.blush}`,cursor:isFuture?"default":"pointer",opacity:isFuture?0.45:1}}>
                <div style={{width:22,height:22,borderRadius:"50%",border:`2px solid ${checkBorder}`,background:checkBg,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                  {done&&<span style={{color:"white",fontSize:15,fontWeight:700}}>✓</span>}
                </div>
                <div style={{flex:1}}>
                  <div style={{fontSize:15,fontWeight:done?600:400,color:textColor}}>{m.label}</div>
                  {done&&<div style={{fontSize:14,fontFamily:"monospace",color:C.lt,marginTop:1}}>✓ {fmtLong(milestones[m.id].date)}</div>}
                </div>
                {!done && isCurrent && <span style={{fontSize:14,background:"#fdeee8",color:C.ter,borderRadius:99,padding:"3px 8px",fontWeight:700,flexShrink:0}}>Now</span>}
                {!done && isPast && !isFuture && <span style={{fontSize:14,background:"#fdf4f0",color:C.lt,borderRadius:99,padding:"3px 8px",flexShrink:0}}>Tap to log</span>}
              </div>
            );
          };

          const MonthBlock = ({mo}) => {
            const ms = msForMonth(mo);
            if (!ms.length) return null;
            const isCurrent = currentMonth !== null && mo === currentMonth;
            const isNext = currentMonth !== null && mo === currentMonth + 1;
            const isPast = currentMonth !== null && mo < currentMonth;
            const isFuture = currentMonth !== null && mo > currentMonth + 1;
            const doneMsInBlock = ms.filter(m => milestones[m.id] && milestones[m.id].date);
            const headerBg = isCurrent
              ? `linear-gradient(135deg,#c9705a,#a85a44)`
              : isNext ? `linear-gradient(135deg,#e8a898,#d49080)`
              : isPast ? "white"
              : "#f5f2ef";
            const headerText = (isCurrent || isNext) ? "white" : isPast ? C.mid : "#b0a8a4";
            const monthLabel = mo === 0 ? "Newborn" : `Month ${mo}`;
            const monthRange = mo === 0 ? "0–4 weeks" : `${mo}–${mo+1} months`;

            return (
              <div style={{...card, padding:0, overflow:"hidden", marginBottom:12}}>
                <div style={{background:headerBg, padding:"12px 16px", display:"flex", alignItems:"center", justifyContent:"space-between"}}>
                  <div>
                    <div style={{fontFamily:"'Playfair Display',serif", fontSize:17, fontWeight:700, color:headerText, lineHeight:1}}>{monthLabel}</div>
                    <div style={{fontSize:14, fontFamily:"monospace", color: (isCurrent||isNext) ? "rgba(255,255,255,0.7)" : C.lt, marginTop:3}}>{monthRange}</div>
                  </div>
                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                    {isCurrent && <span style={{fontSize:15,background:"rgba(255,255,255,0.25)",color:"white",borderRadius:99,padding:"3px 10px",fontWeight:700}}>👶 Right now</span>}
                    {isNext && <span style={{fontSize:15,background:"rgba(255,255,255,0.25)",color:"white",borderRadius:99,padding:"3px 10px",fontWeight:700}}>🔜 Up next</span>}
                    {isPast && <span style={{fontSize:15,color:C.lt,fontFamily:"monospace"}}>{doneMsInBlock.length}/{ms.length} done</span>}
                    {isFuture && <span style={{fontSize:15,color:"#c0b8b4",fontFamily:"monospace"}}>{ms.length} milestones</span>}
                  </div>
                </div>
                <div style={{padding:"4px 16px 6px"}}>
                  {ms.map(m => <MilestoneRow key={m.id} m={m} monthIdx={mo}/>)}
                </div>
              </div>
            );
          };

          const ageParts = [];
          if (age.months > 0) ageParts.push(`${age.months} month${age.months!==1?"s":""}`);
          if (age.weeksAfterMonths > 0) ageParts.push(`${age.weeksAfterMonths} week${age.weeksAfterMonths!==1?"s":""}`);
          if (age.remainingDays > 0 || ageParts.length===0) ageParts.push(`${age.remainingDays} day${age.remainingDays!==1?"s":""}`);

          return (
            <div>
              <div style={{...card, background:`linear-gradient(135deg,#fdf4f0,#fff8f4)`, marginBottom:16}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                  <div>
                    <div style={{fontSize:14,fontFamily:"monospace",color:C.lt,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:5}}>{possessive(babyName||"Baby")} age today</div>
                    <div style={{fontFamily:"'Playfair Display',serif",fontSize:24,fontWeight:700,color:C.ter,lineHeight:1.1}}>{ageParts.join(", ")}</div>
                    <div style={{fontSize:15,fontFamily:"monospace",color:C.lt,marginTop:4}}>{age.totalDays} days · week {age.totalWeeks}</div>
                  </div>
                  <div style={{textAlign:"right"}}>
                    <div style={{fontFamily:"'Playfair Display',serif",fontSize:26,fontWeight:700,color:C.mint}}>{doneCount}</div>
                    <div style={{fontSize:14,fontFamily:"monospace",color:C.lt}}>achieved</div>
                  </div>
                </div>
                <div style={{marginTop:12,background:C.blush,borderRadius:99,height:5,overflow:"hidden"}}>
                  <div style={{height:"100%",borderRadius:99,background:`linear-gradient(90deg,${C.ter},${C.mint})`,width:`${Math.round(doneCount/MILESTONES.length*100)}%`}}/>
                </div>
                <div style={{fontSize:14,fontFamily:"monospace",color:C.lt,marginTop:3,textAlign:"right"}}>{doneCount} of {MILESTONES.length}</div>
              </div>
              {months.map(mo => <MonthBlock key={mo} mo={mo}/>)}
            </div>
          );
        })()}

      </div>

      {/* BOTTOM NAV */}
      <div style={{position:"fixed",bottom:0,left:0,right:0,zIndex:50,background:"white",borderTop:`1px solid ${C.blush}`,display:"flex",alignItems:"stretch",boxShadow:"0 -4px 20px rgba(44,31,26,0.08)",maxWidth:520,margin:"0 auto"}}>

              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>

                    <input type="number" inputMode="numeric" min="0" max="60" placeholder="mins" value={logForm[k]||""} onChange={e=>setLogForm(f=>({...f,[k]:e.target.value}))}
                      style={{width:"100%",padding:"9px 11px",borderRadius:12,border:`1.5px solid ${C.blush}`,background:C.warm,fontSize:15,fontFamily:"inherit",outline:"none",boxSizing:"border-box",textAlign:"center"}}/>

                </div>
              ))}
            </div>

          {logForm.sleepType==="bed"&&(

              <label style={{fontSize:15,fontFamily:"monospace",color:C.mid,textTransform:"uppercase",letterSpacing:"0.08em",display:"block",marginBottom:4}}>Bedtime</label>
              <input type="time" value={logForm.bedTime} onChange={e=>setLogForm(f=>({...f,bedTime:e.target.value}))}
                style={{width:"100%",padding:"9px 11px",borderRadius:12,border:`1.5px solid ${C.blush}`,background:C.warm,fontSize:15,fontFamily:"inherit",outline:"none",boxSizing:"border-box"}}/>

      {modal==="entry"&&(

                <div style={{fontSize:20}}>{ICONS[t]}</div>
                <div style={{fontSize:14,fontWeight:500,color:eType===t?C.ter:C.mid,marginTop:3}}>{NAMES[t]}</div>

          {eType==="feed"&&<>
            {/* Milk / Breast / Solids toggle */}

              <div style={{marginBottom:12}}>

                    </div>
