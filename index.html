          {!parsedEntries ? (
            <>
              <div style={{fontSize:15,color:C.mid,marginBottom:4,lineHeight:1.6}}>
                Paste your notes in any format — the app will read them and sort them into the right categories.
              </div>
              <div style={{fontSize:15,fontFamily:"monospace",color:C.lt,marginBottom:12,padding:"10px",background:C.cream,borderRadius:10,lineHeight:1.8}}>
                e.g. "Woke up 7am · Feed 8am 180ml · Nap 10:15-11:30 · Feed 1pm 150ml · Asleep 7pm · Wake1 10:30pm 60ml"
              </div>
              <textarea
                value={pasteText}
                onChange={e=>setPasteText(e.target.value)}
                placeholder={"Paste your notes here...\n\nWoke up 9am\nFeed 9am 210ml\nNap 11:15-12:35\nFeed 1pm 150ml\nNap 2:25-2:50\nAsleep 7pm\nWake1 8:30pm 70ml"}
                style={{width:"100%",minHeight:180,padding:"12px",borderRadius:14,border:`1.5px solid ${C.blush}`,background:C.cream,fontSize:15,fontFamily:"inherit",outline:"none",resize:"vertical",lineHeight:1.7,boxSizing:"border-box",marginBottom:8}}
              />
              {parseError&&<div style={{fontSize:14,color:C.ter,background:"#fdf0eb",borderRadius:10,padding:"8px 12px",marginBottom:10}}>{parseError}</div>}
              <PBtn onClick={runParse}>Parse Notes →</PBtn>
            </>
          ) : (
            <>
              {parsedEntries.detectedDate&&(
                <div style={{fontSize:14,fontFamily:"monospace",color:C.mint,background:"#f0faf6",borderRadius:10,padding:"7px 12px",marginBottom:12}}>
                  📅 Detected date: <strong>{fmtLong(parsedEntries.detectedDate)}</strong> — entries will be added to this day
                </div>
              )}
              {!parsedEntries.detectedDate&&(
                <div style={{fontSize:14,fontFamily:"monospace",color:C.gold,background:"#fffbf0",borderRadius:10,padding:"7px 12px",marginBottom:12}}>
                  📅 No date found — entries will be added to <strong>{fmtLong(selDay||todayStr())}</strong>
                </div>
              )}
              <div style={{fontSize:15,fontFamily:"monospace",color:C.lt,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:8}}>
                Found {parsedEntries.entries.length} entr{parsedEntries.entries.length===1?"y":"ies"}
              </div>
              <div style={{display:"flex",flexDirection:"column",gap:6,marginBottom:12,maxHeight:280,overflowY:"auto"}}>
                {parsedEntries.entries.map((e,i)=>(
                  <div key={i} style={{display:"flex",alignItems:"center",gap:10,padding:"9px 11px",borderRadius:12,background:C.cream,border:`1px solid ${C.blush}`,borderLeft:`3px solid ${e.type==="feed"?C.ter:e.type==="nap"?C.mint:e.type==="sleep"?C.sky:C.gold}`}}>
                    <span style={{fontSize:16}}>{ICONS[e.type]}</span>
                    <div style={{flex:1}}>
                      <div style={{fontSize:15,fontWeight:500}}>{NAMES[e.type]}{e.night?" (night)":""}</div>
                      <div style={{fontSize:15,fontFamily:"monospace",color:C.lt}}>
                        {e.type==="nap"?`${fmt12(e.start)} – ${fmt12(e.end)} (${minDiff(e.start,e.end)}min)`:`${fmt12(e.time)}${e.amount?` · ${e.amount}ml`:""}`}
                        {e.note?` · ${e.note}`:""}
                      </div>
                    </div>
                  </div>
                ))}
              </div>
              {parsedEntries.warnings.length>0&&(
                <div style={{marginBottom:12}}>
                  <div style={{fontSize:15,fontFamily:"monospace",color:C.gold,marginBottom:5}}>⚠️ Couldn't parse {parsedEntries.warnings.length} line{parsedEntries.warnings.length>1?"s":""}:</div>
                  {parsedEntries.warnings.map((w,i)=>(
                    <div key={i} style={{fontSize:15,color:C.mid,fontFamily:"monospace",padding:"4px 8px",background:"#fffbf0",borderRadius:8,marginBottom:3}}>{w}</div>
                  ))}
                </div>
              )}
              <PBtn onClick={confirmPaste}>✓ Add {parsedEntries.entries.length} {parsedEntries.entries.length===1?"Entry":"Entries"}</PBtn>
              <button onClick={()=>setParsedEntries(null)} style={{width:"100%",marginTop:8,padding:"10px",borderRadius:12,border:`1px solid ${C.blush}`,background:"none",color:C.mid,fontSize:15,cursor:"pointer",fontFamily:"inherit"}}>← Edit notes</button>
            </>
          )}
        </Sheet>
      )}

      {/* DAY REPORT MODAL */}
      {modal==="report"&&(()=>{
        const es=days[selDay]||[];
        const dEs=es.filter(e=>!e.night).sort((a,b)=>timeVal(a)-timeVal(b));
        const nEs=es.filter(e=>e.night).sort((a,b)=>timeVal(a)-timeVal(b));
        const wakeEv=dEs.find(e=>e.type==="wake");
        const sleepEv=dEs.find(e=>e.type==="sleep");
        const dayFeeds=dEs.filter(e=>e.type==="feed");
        const dayNaps=dEs.filter(e=>e.type==="nap");
        const totalFeedMl=es.filter(e=>e.type==="feed").reduce((s,f)=>s+(f.amount||0),0);
        const nightFeedMl=nEs.filter(e=>e.type==="feed").reduce((s,f)=>s+(f.amount||0),0);
        const totalNapM=dayNaps.reduce((s,n)=>s+minDiff(n.start,n.end),0);
        const nightPoints=[];
        if(sleepEv) nightPoints.push({label:"Bedtime",time:sleepEv.time});
        nEs.forEach((e,i)=>nightPoints.push({label:`Wake ${i+1}`,time:e.time,feed:e.amount||0}));
        const stretches=[];
        for(let i=0;i<nightPoints.length-1;i++){
          const from=nightPoints[i];const to=nightPoints[i+1];
          let mins=minDiff(from.time,to.time);
          if(mins<=0) mins+=720;
          stretches.push({from:from.label,to:to.label,mins,toTime:to.time,feed:to.feed});
        }
        function copyReport(){
          const ln=[`📋 ${fmtLong(selDay)} — ${babyName||"Baby"}'s Day Report`,``];
          ln.push(`☀️ Wake up: ${wakeEv?fmt12(wakeEv.time):"—"}`);
          ln.push(`🌙 Bedtime: ${sleepEv?fmt12(sleepEv.time):"—"}`);
          ln.push(``);
          ln.push(`🍼 Total feed: ${totalFeedMl}ml`);
          ln.push(`   Daytime: ${totalFeedMl-nightFeedMl}ml over ${dayFeeds.length} feed${dayFeeds.length!==1?"s":""}`);
          if(nEs.length) ln.push(`   Night: ${nightFeedMl}ml over ${nEs.filter(e=>e.type==="feed").length} feed${nEs.filter(e=>e.type==="feed").length!==1?"s":""}`);
          ln.push(``);
          ln.push(`😴 Naps: ${dayNaps.length} nap${dayNaps.length!==1?"s":""} (${hm(totalNapM)} total)`);
          ln.push(``);
          ln.push(`🌟 Night: ${nEs.length} wake${nEs.length!==1?"s":""}`);
          if(stretches.length){
            ln.push(`   Stretches between wakes:`);
            stretches.forEach(s=>ln.push(`   ${s.from} → ${s.to} (${fmt12(s.toTime)}): ${hm(s.mins)}${s.feed?` · ${s.feed}ml`:""}`));
          }
          navigator.clipboard.writeText(ln.join("\n")).then(()=>{setCopied(true);setTimeout(()=>setCopied(false),2000);});
        }
        return(
          <Sheet onClose={()=>setModal(null)} title="">
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:18}}>
              <div style={{width:36,height:36,borderRadius:"50%",background:"linear-gradient(135deg,#c9705a,#7a5c52)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,flexShrink:0}}>📊</div>
              <div>
                <div style={{fontFamily:"'Playfair Display',serif",fontSize:18}}>Day Report</div>
                <div style={{fontSize:15,fontFamily:"monospace",color:C.lt}}>{fmtLong(selDay)}</div>
              </div>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:12}}>
              <div style={{background:C.warm,border:`1px solid ${C.blush}`,borderRadius:14,padding:"12px 10px",textAlign:"center"}}>
                <div style={{fontSize:14,fontFamily:"monospace",color:C.lt,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:4}}>Wake Up</div>
                <div style={{fontFamily:"'Playfair Display',serif",fontSize:20,color:C.gold}}>{wakeEv?fmt12(wakeEv.time):"—"}</div>
              </div>
              <div style={{background:C.warm,border:`1px solid ${C.blush}`,borderRadius:14,padding:"12px 10px",textAlign:"center"}}>
                <div style={{fontSize:14,fontFamily:"monospace",color:C.lt,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:4}}>Bedtime</div>
                <div style={{fontFamily:"'Playfair Display',serif",fontSize:20,color:C.sky}}>{sleepEv?fmt12(sleepEv.time):"—"}</div>
              </div>
            </div>
            <div style={{background:C.warm,border:`1px solid ${C.blush}`,borderLeft:`3px solid ${C.ter}`,borderRadius:14,padding:"12px",marginBottom:10}}>
              <div style={{fontSize:15,fontFamily:"monospace",color:C.lt,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:8}}>🍼 Feeding</div>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                <span style={{fontSize:15,color:C.deep}}>Total</span>
                <span style={{fontFamily:"'Playfair Display',serif",fontSize:20,fontWeight:700,color:C.ter}}>{totalFeedMl}<span style={{fontSize:14,color:C.lt,fontWeight:400}}>ml</span></span>
              </div>
              <div style={{display:"flex",justifyContent:"space-between",fontSize:14,color:C.mid,borderTop:`1px solid ${C.blush}`,paddingTop:6}}>
                <span>Daytime · {dayFeeds.length} feeds</span>
                <span style={{fontFamily:"monospace"}}>{totalFeedMl-nightFeedMl}ml</span>
              </div>
              {nEs.length>0&&<div style={{display:"flex",justifyContent:"space-between",fontSize:14,color:C.mid,marginTop:4}}>
                <span>Night · {nEs.filter(e=>e.type==="feed").length} feeds</span>
                <span style={{fontFamily:"monospace"}}>{nightFeedMl}ml</span>
              </div>}
            </div>
            <div style={{background:C.warm,border:`1px solid ${C.blush}`,borderLeft:`3px solid ${C.mint}`,borderRadius:14,padding:"12px",marginBottom:10}}>
              <div style={{fontSize:15,fontFamily:"monospace",color:C.lt,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:8}}>😴 Naps</div>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <span style={{fontSize:15,color:C.deep}}>{dayNaps.length} nap{dayNaps.length!==1?"s":""}</span>
                <span style={{fontFamily:"'Playfair Display',serif",fontSize:20,fontWeight:700,color:C.mint}}>{hm(totalNapM)}</span>
              </div>
              {dayNaps.map((n,i)=>(
                <div key={i} style={{display:"flex",justifyContent:"space-between",fontSize:15,color:C.lt,fontFamily:"monospace",marginTop:4,borderTop:i===0?`1px solid ${C.blush}`:"none",paddingTop:i===0?6:0}}>
                  <span>{fmt12(n.start)} – {fmt12(n.end)}</span>
                  <span>{minDiff(n.start,n.end)}min</span>
                </div>
              ))}
            </div>
            <div style={{background:"#1a1228",borderRadius:14,padding:"12px",marginBottom:10}}>
              <div style={{fontSize:15,fontFamily:"monospace",color:"#6a5880",textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:8}}>🌟 Night Wakes</div>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:stretches.length?10:0}}>
                <span style={{fontSize:15,color:"#d8cce8"}}>{nEs.length} wake{nEs.length!==1?"s":""}</span>
                {nightFeedMl>0&&<span style={{background:"rgba(212,168,85,0.2)",color:C.gold,fontFamily:"monospace",fontSize:14,padding:"2px 8px",borderRadius:99}}>{nightFeedMl}ml total</span>}
              </div>
              {stretches.length>0&&(
                <>
                  <div style={{fontSize:14,fontFamily:"monospace",color:"#6a5880",textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:6}}>Stretches between wakes</div>
                  {stretches.map((s,i)=>(
                    <div key={i} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"7px 10px",background:"rgba(255,255,255,0.04)",borderRadius:10,border:"1px solid #3a2e50",marginBottom:5}}>
                      <div>
                        <div style={{fontSize:14,color:"#d8cce8"}}>{s.from} → {s.to}</div>
                        <div style={{fontSize:14,fontFamily:"monospace",color:"#6a5880",marginTop:2}}>{fmt12(s.toTime)}{s.feed?` · ${s.feed}ml`:""}</div>
                      </div>
                      <span style={{fontFamily:"'Playfair Display',serif",fontSize:18,color:s.mins>=180?"#6fa898":s.mins>=120?"#d4a855":"#c9705a",fontWeight:700}}>{hm(s.mins)}</span>
                    </div>
                  ))}
                </>
              )}
              {stretches.length===0&&nEs.length===0&&<div style={{fontSize:14,color:"#6a5880",fontFamily:"monospace",textAlign:"center",padding:"4px 0"}}>No night wakes logged</div>}
            </div>
            <div style={{display:"flex",gap:8}}>
              <button onClick={copyReport} style={{flex:1,padding:"11px",borderRadius:99,border:`1px dashed ${C.rose}`,background:"none",color:C.ter,fontSize:15,cursor:"pointer",fontFamily:"inherit",fontWeight:500}}>{copied?"✓ Copied!":"📋 Copy Report"}</button>
              <button onClick={()=>setModal(null)} style={{flex:1,padding:"11px",borderRadius:99,border:"none",background:C.blush,color:C.mid,fontSize:15,cursor:"pointer",fontFamily:"inherit",fontWeight:600}}>Done</button>
            </div>
          </Sheet>
        );
      })()}

      {/* ── ADD CHILD MODAL ── */}
      {showAddChild && (
        <div style={{position:"fixed",inset:0,background:"rgba(44,31,26,0.5)",zIndex:200,display:"flex",alignItems:"flex-end"}} onClick={()=>setShowAddChild(false)}>
          <div onClick={e=>e.stopPropagation()} style={{background:"#faf6f0",borderRadius:"24px 24px 0 0",padding:"28px 24px 40px",width:"100%"}}>
            <div style={{width:40,height:4,background:"#f2d9cc",borderRadius:99,margin:"0 auto 20px"}}/>
            <div style={{fontFamily:"'Playfair Display',serif",fontSize:24,fontWeight:700,color:"#2c1f1a",marginBottom:20}}>Add a child</div>

            <div style={{fontSize:14,color:"#b89890",marginBottom:6,fontWeight:600}}>Name</div>
            <input value={newChildName} onChange={e=>setNewChildName(e.target.value)}
              placeholder="Baby's name" autoFocus
              style={{width:"100%",fontSize:18,padding:"12px 14px",borderRadius:12,border:"1.5px solid #f2d9cc",background:"white",color:"#2c1f1a",outline:"none",fontFamily:"inherit",marginBottom:14}}/>

            <div style={{fontSize:14,color:"#b89890",marginBottom:6,fontWeight:600}}>
              {newChildUnborn ? "Due date" : "Date of birth"}
            </div>
            <input type="date" value={newChildDob} onChange={e=>setNewChildDob(e.target.value)}
              style={{width:"100%",fontSize:16,padding:"12px 14px",borderRadius:12,border:"1.5px solid #f2d9cc",background:"white",color:"#2c1f1a",outline:"none",fontFamily:"inherit",marginBottom:14}}/>

            <div style={{display:"flex",gap:8,marginBottom:14}}>
              {["","girl","boy"].map(s=>(
                <button key={s} onClick={()=>setNewChildSex(s)} style={{
                  flex:1,padding:"10px",borderRadius:12,border:"none",cursor:"pointer",fontSize:14,fontWeight:600,
                  background: newChildSex===s ? "#c9705a" : "#f2d9cc",
                  color: newChildSex===s ? "white" : "#7a5c52"
                }}>{s===""?"Any":s==="girl"?"👧 Girl":"👦 Boy"}</button>
              ))}
            </div>

            <button onClick={()=>setNewChildUnborn(v=>!v)} style={{
              width:"100%",padding:"11px",borderRadius:99,border:"1.5px solid #f2d9cc",
              background: newChildUnborn?"#fff3f0":"white",color:"#7a5c52",fontSize:14,
              cursor:"pointer",fontFamily:"inherit",fontWeight:600,marginBottom:16
            }}>{newChildUnborn ? "🤰 Not born yet" : "🎂 Already born"}</button>

            <button onClick={()=>{
              if(!newChildName.trim()) return;
              addChild(newChildName.trim(), newChildDob, newChildSex, newChildUnborn);
              setNewChildName(""); setNewChildDob(""); setNewChildSex(""); setNewChildUnborn(false);
              setShowAddChild(false);
              setTab("day"); setSelDay(todayStr());
            }} style={{
              width:"100%",padding:"15px",borderRadius:99,border:"none",
              background: newChildName.trim() ? "#c9705a" : "#f2d9cc",
              color: newChildName.trim() ? "white" : "#b89890",
              fontSize:16,fontWeight:700,cursor:"pointer",fontFamily:"inherit"
            }}>Add {newChildName||"child"} ✦</button>
          </div>
        </div>
      )}

      {/* ── FAMILY SYNC MODAL ── */}
      {showFamilyModal && (()=>{
        const[restoreMode,setRestoreMode]=React.useState(false);
        const[restoreInput,setRestoreInput]=React.useState("");
        const[restoreStatus,setRestoreStatus]=React.useState(""); // "" | "loading" | "ok" | "fail"
        return (
        <div style={{position:"fixed",inset:0,background:"rgba(44,31,26,0.5)",zIndex:200,display:"flex",alignItems:"flex-end"}} onClick={()=>setShowFamilyModal(false)}>
          <div onClick={e=>e.stopPropagation()} style={{background:"#faf6f0",borderRadius:"24px 24px 0 0",padding:"28px 24px 40px",width:"100%",maxHeight:"85vh",overflowY:"auto"}}>

            <div style={{width:40,height:4,background:C.blush,borderRadius:99,margin:"0 auto 20px"}}/>
            <div style={{fontFamily:"'Playfair Display',serif",fontSize:24,fontWeight:700,color:C.deep,marginBottom:6}}>Data & Sync</div>

            {/* Auto-backup status banner */}
            <div style={{background: backupCode?"#e8f7f0":"#fff8e8",borderRadius:12,padding:"12px 14px",marginBottom:20,display:"flex",alignItems:"center",gap:10,border:`1px solid ${backupCode?"#b0e8cc":"#f0d890"}`}}>
              <span style={{fontSize:20}}>{backupCode?"🛡️":"⏳"}</span>
              <div>
                <div style={{fontSize:13,fontWeight:700,color:backupCode?"#2a7a50":"#8a6a10"}}>{backupCode?"Auto-backup active":"Setting up backup…"}</div>
                <div style={{fontSize:12,color:backupCode?"#4a9a70":"#9a7a20",marginTop:1}}>{backupCode?"Your data saves to the cloud automatically — even without a family code":"Firebase is connecting, backup will begin shortly"}</div>
              </div>
            </div>

            {/* Username display / set */}
            {familyUsername ? (
              <div style={{background:"white",borderRadius:12,padding:"12px 14px",marginBottom:16,border:`1px solid ${C.blush}`,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                <div>
                  <div style={{fontSize:12,fontFamily:"monospace",color:C.lt,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:3}}>Your family username</div>
                  <div style={{fontSize:20,fontWeight:700,color:C.ter}}>{familyUsername}</div>
                </div>
                <span style={{fontSize:22}}>👨‍👩‍👧</span>
              </div>
            ) : (
              <div style={{background:"#fff8e8",borderRadius:12,padding:"12px 14px",marginBottom:16,border:"1px solid #f0d890"}}>
                <div style={{fontSize:13,fontWeight:700,color:"#8a6a10",marginBottom:4}}>No username set</div>
                <div style={{fontSize:13,color:"#9a7a20",marginBottom:8}}>Set a family username so your partner can find you easily.</div>
                {(()=>{
                  const[u,setU]=React.useState("");
                  const[st,setSt]=React.useState("idle");
                  const ref=React.useRef(null);
                  return (
                    <div>
                      <div style={{position:"relative",marginBottom:6}}>
                        <input value={u} onChange={e=>{
                          setU(e.target.value); setSt("checking");
                          clearTimeout(ref.current);
                          if(e.target.value.trim().length<3){setSt("invalid");return;}
                          ref.current=setTimeout(async()=>{
                            if(!window._fb){setSt("idle");return;}
                            const {db,doc,getDoc}=window._fb;
                            const snap=await getDoc(doc(db,"usernames",normaliseUsername(e.target.value)));
                            setSt(snap.exists()?"taken":"available");
                          },600);
                        }} placeholder="e.g. TeamSmith"
                        style={{width:"100%",padding:"9px 36px 9px 12px",borderRadius:10,border:`1.5px solid ${st==="available"?"#50c878":st==="taken"?C.ter:C.blush}`,fontSize:15,fontFamily:"inherit",outline:"none",boxSizing:"border-box"}}/>
                        <span style={{position:"absolute",right:10,top:"50%",transform:"translateY(-50%)",fontSize:14}}>
                          {st==="checking"?"⏳":st==="available"?"✅":st==="taken"?"❌":""}
                        </span>
                      </div>
                      {st==="taken"&&<div style={{fontSize:12,color:C.ter,marginBottom:6}}>That username is taken — try another</div>}
                      <button onClick={async()=>{
                        if(st!=="available"||!u.trim()) return;
                        const ok = await reserveUsername(u);
                        if(!ok) setSt("taken");
                      }} disabled={st!=="available"} style={{width:"100%",padding:"9px",borderRadius:99,border:"none",background:st==="available"?C.ter:"#f2d9cc",color:st==="available"?"white":"#b89890",fontSize:14,fontWeight:700,cursor:st==="available"?"pointer":"not-allowed",fontFamily:"inherit"}}>
                        Save username
                      </button>
                    </div>
                  );
                })()}
              </div>
            )}

            <div style={{width:"100%",height:1,background:C.blush,marginBottom:16}}/>

            {/* ── PER-CHILD SHARING ── */}
            <div style={{fontFamily:"monospace",fontSize:12,color:C.lt,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:10}}>Share children individually</div>

            {/* Each child gets its own code */}
            <div style={{display:"flex",flexDirection:"column",gap:10,marginBottom:16}}>
              {Object.values(children).map(child => {
                const cid = child.id;
                const code = childSyncCodes[cid];
                const isShared = !!code;
                return (
                  <div key={cid} style={{background:"white",borderRadius:14,padding:"12px 14px",border:`1px solid ${isShared?C.mint+"40":C.blush}`}}>
                    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:isShared?8:0}}>
                      <div>
                        <div style={{fontWeight:700,fontSize:15,color:C.deep}}>{child.name||"Unnamed child"}</div>
                        <div style={{fontSize:12,color:C.lt}}>{isShared?"Sharing enabled":"Not shared yet"}</div>
                      </div>
                      {!isShared ? (
                        <button onClick={async()=>{await createChildSyncCode(cid);}} style={{padding:"7px 14px",borderRadius:99,border:"none",background:C.ter,color:"white",fontSize:13,fontWeight:700,cursor:"pointer",fontFamily:"inherit",flexShrink:0}}>
                          Get code
                        </button>
                      ) : (
                        <span style={{fontSize:18}}>🔗</span>
                      )}
                    </div>
                    {isShared && (
                      <>
                        <div style={{background:"#f0faf5",borderRadius:10,padding:"10px 12px",display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:6,border:"1px solid #b0e8cc"}}>
                          <div>
                            <div style={{fontSize:11,fontFamily:"monospace",color:"#4a8a6a",textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:2}}>Sync code</div>
                            <div style={{fontFamily:"monospace",fontSize:24,fontWeight:700,color:C.ter,letterSpacing:"0.18em"}}>{code}</div>
                          </div>
                          <button onClick={()=>{try{navigator.clipboard.writeText(code);}catch{}}} style={{padding:"6px 12px",borderRadius:99,border:`1px solid ${C.blush}`,background:"white",fontSize:12,fontWeight:600,color:C.mid,cursor:"pointer",fontFamily:"inherit"}}>
                            Copy
                          </button>
                        </div>
                        <div style={{fontSize:12,color:C.lt,marginBottom:6}}>Share this code with the co-parent — they tap "Link a child" below and enter it.</div>
                        <button onClick={()=>unlinkChild(cid)} style={{fontSize:12,color:C.lt,background:"none",border:"none",cursor:"pointer",padding:0,fontFamily:"inherit",textDecoration:"underline"}}>
                          Remove from my app
                        </button>
                      </>
                    )}
                  </div>
                );
              })}
            </div>

            {/* Link a child from another parent */}
            {(()=>{
              const[linkCode,setLinkCode]=React.useState("");
              const[linkStatus,setLinkStatus]=React.useState(""); // "" | "loading" | "ok" | "error"
              const[linkError,setLinkError]=React.useState("");
              const[linkName,setLinkName]=React.useState("");
              return (
                <div style={{background:"white",borderRadius:14,padding:"14px",border:`1px solid ${C.blush}`,marginBottom:16}}>
                  <div style={{fontSize:14,fontWeight:700,color:C.mid,marginBottom:4}}>Link a child</div>
                  <div style={{fontSize:13,color:C.lt,marginBottom:10}}>Enter a sync code from another parent to add their child to your app.</div>
                  <input value={linkCode} onChange={e=>setLinkCode(e.target.value.toUpperCase())}
                    placeholder="e.g. AB3X7Y" maxLength={6}
                    style={{width:"100%",fontSize:22,fontFamily:"monospace",fontWeight:700,letterSpacing:"0.18em",textAlign:"center",padding:"11px",borderRadius:10,border:`1.5px solid ${linkStatus==="error"?C.ter:C.blush}`,background:"#faf6f0",color:C.ter,outline:"none",marginBottom:8,boxSizing:"border-box"}}/>
                  {linkStatus==="error" && <div style={{fontSize:13,color:C.ter,marginBottom:8,textAlign:"center"}}>{linkError}</div>}
                  {linkStatus==="ok" && <div style={{fontSize:13,color:C.mint,marginBottom:8,textAlign:"center"}}>✓ {linkName} added to your app!</div>}
                  <button onClick={async()=>{
                    setLinkStatus("loading");
                    const result = await joinChildByCode(linkCode);
                    if(result.ok) { setLinkStatus("ok"); setLinkName(result.childName); setLinkCode(""); setTimeout(()=>setLinkStatus(""),2500); }
                    else { setLinkStatus("error"); setLinkError(result.error); }
                  }} disabled={linkCode.length<6||linkStatus==="loading"} style={{width:"100%",padding:"12px",borderRadius:99,border:"none",background:linkCode.length===6?C.mint:"#e0f0ea",color:linkCode.length===6?"white":"#a0c8b0",fontSize:15,fontWeight:700,cursor:linkCode.length===6?"pointer":"not-allowed",fontFamily:"inherit",transition:"all 0.2s"}}>
                    {linkStatus==="loading"?"⏳ Linking…":"Link child"}
                  </button>
                </div>
              );
            })()}

            {/* Restore data section */}
            <div style={{borderRadius:12,border:`1px dashed ${C.blush}`,overflow:"hidden"}}>
              <button onClick={()=>setRestoreMode(m=>!m)} style={{width:"100%",padding:"12px 16px",background:"none",border:"none",textAlign:"left",cursor:"pointer",fontSize:14,color:C.lt,fontFamily:"inherit",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <span>🔄 Restore data from backup</span>
                <span style={{fontSize:12}}>{restoreMode?"▲":"▼"}</span>
              </button>
              {restoreMode && (
                <div style={{padding:"0 16px 16px"}}>
                  <div style={{fontSize:13,color:C.lt,marginBottom:8}}>Enter your backup code or family code from another device to restore all data.</div>
                  <input value={restoreInput} onChange={e=>setRestoreInput(e.target.value.toUpperCase())}
                    placeholder="Enter backup or family code"
                    style={{width:"100%",fontSize:16,fontFamily:"monospace",fontWeight:700,letterSpacing:"0.1em",textAlign:"center",padding:"10px",borderRadius:10,border:`1.5px solid ${C.blush}`,background:"#faf6f0",color:C.ter,outline:"none",marginBottom:8}}/>
                  {restoreStatus==="fail" && <div style={{fontSize:13,color:C.ter,marginBottom:8,textAlign:"center"}}>Code not found — check and try again</div>}
                  {restoreStatus==="ok" && <div style={{fontSize:13,color:C.mint,marginBottom:8,textAlign:"center"}}>✓ Data restored successfully!</div>}
                  <button onClick={async()=>{
                    setRestoreStatus("loading");
                    const ok = await restoreFromBackup(restoreInput);
                    setRestoreStatus(ok?"ok":"fail");
                    if(ok) setTimeout(()=>setShowFamilyModal(false),1200);
                  }} style={{width:"100%",padding:"12px",borderRadius:99,border:"none",background:C.ter,color:"white",fontSize:14,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>
                    {restoreStatus==="loading"?"⏳ Restoring…":"Restore data"}
                  </button>
                </div>
              )}
            </div>

            {/* Sign out */}
            {familyUsername && (
              <div style={{borderTop:`1px solid ${C.blush}`,marginTop:16,paddingTop:16}}>
                <button onClick={()=>{setShowFamilyModal(false);logout();}}
                  style={{width:"100%",padding:"12px",borderRadius:99,border:`1.5px solid ${C.blush}`,background:"white",color:C.lt,fontSize:14,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>
                  Sign out of {familyUsername}
                </button>
              </div>
            )}

          </div>
        </div>
        );
      })()}

    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>

<script>
window.onerror = function(msg, src, line, col, err) {
  document.getElementById('root').innerHTML = '<div style="padding:30px;font-family:monospace;font-size:13px;background:#fff;color:#333;word-break:break-all"><b>Error:</b> ' + msg + '<br><b>Line:</b> ' + line + '<br><b>Detail:</b> ' + (err&&err.stack?err.stack:'') + '</div>';
};
(function() {
  try {
    if (typeof Babel === 'undefined') throw new Error('Babel not loaded');
    if (typeof React === 'undefined') throw new Error('React not loaded');
    var src = document.getElementById('jsx-src').textContent;
    var result = Babel.transform(src, { presets: ['react'] });
    var blob = new Blob([result.code], { type: 'application/javascript' });
    var url = URL.createObjectURL(blob);
    var s = document.createElement('script');
    s.src = url;
    s.onload = function() { URL.revokeObjectURL(url); };
    s.onerror = function(e) { console.error('JSX load error', e); };
    document.body.appendChild(s);
  } catch(e) {
    document.getElementById('root').innerHTML = '<div style="padding:30px;font-family:monospace;font-size:13px;background:#fff;color:#333;word-break:break-all"><b>Loader error:</b> ' + e.message + '<br>' + e.stack + '</div>';
  }
})();
</script>

<script>
// Register service worker for offline support
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    // Inline service worker as blob URL so it works from any path
    const swCode = `
const CACHE = 'obubba-v1';
const ASSETS = [
  self.registration.scope,
  'https://cdn.jsdelivr.net/npm/react@18/umd/react.development.js',
  'https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.development.js',
  'https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js',
  'https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:wght@400;500;600&display=swap',
];

self.addEventListener('install', e => {
  e.waitUntil(
    caches.open(CACHE).then(cache => {
      // Cache what we can, ignore failures (CDN assets)
      return Promise.allSettled(ASSETS.map(url => cache.add(url).catch(()=>{})));
    }).then(() => self.skipWaiting())
  );
});

self.addEventListener('activate', e => {
  e.waitUntil(
    caches.keys().then(keys =>
      Promise.all(keys.filter(k => k !== CACHE).map(k => caches.delete(k)))
    ).then(() => self.clients.claim())
  );
});

self.addEventListener('fetch', e => {
  // Always serve the app shell from cache if available (offline-first for navigation)
  if (e.request.mode === 'navigate') {
    e.respondWith(
      caches.match(self.registration.scope)
        .then(cached => cached || fetch(e.request))
        .catch(() => caches.match(self.registration.scope))
    );
    return;
  }
  // For other requests: network first, fallback to cache
  e.respondWith(
    fetch(e.request)
      .then(resp => {
        if (resp && resp.status === 200 && resp.type !== 'opaque') {
          const clone = resp.clone();
          caches.open(CACHE).then(c => c.put(e.request, clone));
        }
        return resp;
      })
      .catch(() => caches.match(e.request))
  );
});
`;
    const blob = new Blob([swCode], {type: 'application/javascript'});
    const swUrl = URL.createObjectURL(blob);
    navigator.serviceWorker.register(swUrl, {scope: '/'})
      .then(reg => {
        window._swReg = reg;
        console.log('SW registered');
      })
      .catch(e => console.warn('SW reg failed:', e));
  });
}
</script>
