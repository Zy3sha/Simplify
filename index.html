  <meta name="apple-mobile-web-app-status-bar-style" content="default"/>
  <meta name="apple-mobile-web-app-title" content="OBubba"/>

  <title>OBubba</title>
  <link rel="manifest" href="manifest.json"/>
  <link rel="apple-touch-icon" sizes="180x180" href="icon.png">

  <!-- Inline splash styles — renders before ANY external resource loads -->
  <style>
    #splash{position:fixed;inset:0;z-index:99999;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:-apple-system,'SF Pro Display',system-ui,sans-serif;text-align:center;transition:opacity 0.5s ease,visibility 0.5s ease}
    #splash.light-splash{background:linear-gradient(135deg,#FFFDFC 0%,#FBF5F3 40%,#F9F3F1 100%)}
    #splash.dark-splash{background:linear-gradient(170deg,#080e1c 0%,#0c1628 30%,#101d35 55%,#0c1628 100%)}
    #splash.hide{opacity:0;visibility:hidden;pointer-events:none}
    @keyframes splashBreathe{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-5px) scale(1.02)}}
    @keyframes splashGlow{0%,100%{opacity:0.5}50%{opacity:1}}
    .splash-img{width:160px;height:160px;object-fit:contain;animation:splashBreathe 2.5s ease-in-out infinite}
    .light-splash .splash-img{filter:drop-shadow(0 12px 28px rgba(217,207,243,0.35))}
    .dark-splash .splash-img{filter:drop-shadow(0 12px 28px rgba(255,180,70,0.20))}
    .splash-title{font-size:28px;font-weight:700;letter-spacing:-0.02em;margin-top:20px}
    .light-splash .splash-title{color:#5B4F5F}
    .dark-splash .splash-title{color:#F0F2F5}
    .splash-sub{font-size:14px;margin-top:8px;animation:splashGlow 2s ease-in-out infinite}
    .light-splash .splash-sub{color:#A898AC}
    .dark-splash .splash-sub{color:#7E8FA0}
    .splash-bar{width:120px;height:3px;border-radius:99px;overflow:hidden;margin-top:20px}
    .light-splash .splash-bar{background:rgba(240,210,200,0.30)}
    .dark-splash .splash-bar{background:rgba(255,180,70,0.12)}
    .splash-bar-fill{height:100%;border-radius:99px;width:30%}
    .light-splash .splash-bar-fill{background:linear-gradient(90deg,#F0E4E0,#E8D4D0,#F0E4E0);background-size:300% 100%;animation:splashShimmer 1.8s ease-in-out infinite,splashWidth 2.5s ease-in-out infinite}
    .dark-splash .splash-bar-fill{background:linear-gradient(90deg,rgba(255,180,70,0.3),rgba(255,150,40,0.6),rgba(255,180,70,0.3));background-size:300% 100%;animation:splashShimmer 1.8s ease-in-out infinite,splashWidth 2.5s ease-in-out infinite}
    @keyframes splashWidth{0%{width:10%}50%{width:80%}100%{width:10%}}
    @keyframes splashShimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
  </style>

  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>

  <!-- Firebase -->
  <script type="module" src="firebase.js"></script>

  <!-- Styles -->
  <link rel="stylesheet" href="styles.css"/>
</head>

<script>
  // Apply correct theme to splash instantly from localStorage
  (function(){
    var t;try{t=localStorage.getItem("theme_v1")}catch(e){}
    var s=document.getElementById("splash");
    if(s) s.className=(t==="dark")?"dark-splash":"light-splash";
  })();
</script>

<button id="theme-toggle" aria-label="Toggle theme" onclick="toggleTheme()">🌙</button>
