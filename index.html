                if (!t) return null;
                return (
                  <div style={{...card, marginBottom:12}}>
                    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
                      <div style={{fontFamily:"'Playfair Display',serif",fontStyle:"italic",fontSize:16,color:C.mid}}>✨ Sleep & Feed Insights</div>
                      <button onClick={()=>setShowInsights(false)} style={{background:"none",border:"none",color:C.lt,fontSize:18,cursor:"pointer"}}>✕</button>
                    </div>
                    <div style={{fontSize:11,fontFamily:"monospace",color:C.lt,marginBottom:12}}>Based on {t.days} days of data</div>
                    {t.insights.map((ins,i)=>(
                      <div key={i} style={{marginBottom:12,padding:"11px 13px",borderRadius:14,background:ins.type==="warn"?"#fff8f5":ins.type==="good"?"#f0faf6":"#f5f8ff",border:`1px solid ${ins.type==="warn"?C.rose:ins.type==="good"?"#b8e8d4":"#c8d8f0"}`}}>
                        <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:5}}>
                          <span style={{fontSize:16}}>{ins.icon}</span>
                          <span style={{fontWeight:700,fontSize:13,color:ins.type==="warn"?C.ter:ins.type==="good"?C.mint:C.sky}}>{ins.title}</span>
                        </div>
                        <div style={{fontSize:12,color:C.mid,lineHeight:1.6}}>{ins.body}</div>
                      </div>
                    ))}
                    <div style={{fontSize:10,color:C.lt,fontFamily:"monospace",marginTop:4,lineHeight:1.5}}>⚠️ These are general observations based on logged data, not medical advice. Always consult your health visitor or GP if you have concerns.</div>
                  </div>
                );
              })()}

              {/* Action buttons */}
              <div style={{display:"flex",gap:8,marginTop:4}}>
                <button onClick={copySummary} style={{flex:1,padding:"13px",borderRadius:14,border:`1.5px solid ${C.rose}`,background:"white",color:C.ter,fontSize:13,cursor:"pointer",fontFamily:"inherit",fontWeight:600,boxShadow:"0 2px 8px rgba(201,112,90,0.08)"}}>
                  {copied?"✓ Copied!":"📋 Copy Day"}
                </button>
                <button onClick={()=>setModal("report")} style={{flex:1,padding:"13px",borderRadius:14,border:"none",background:`linear-gradient(135deg,#c9705a,#a85a44)`,color:"white",fontSize:13,cursor:"pointer",fontFamily:"inherit",fontWeight:600,boxShadow:"0 4px 14px rgba(201,112,90,0.3)"}}>
                  📊 Day Report
                </button>
              </div>
            </div>
          )
        )}

        {/* WEEK TAB */}
        {tab==="week"&&(
          <div>
            <div style={card}>
              <div style={{fontSize:11,fontFamily:"monospace",color:C.lt,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:4}}>Avg Daily Feed (last 7 days)</div>
              <div style={{fontFamily:"'Playfair Display',serif",fontSize:30,fontWeight:700,color:C.ter}}>{avgMl}<span style={{fontSize:13,color:C.lt,fontWeight:400}}> ml</span></div>
            </div>
            <div style={card}>
              <div style={{fontSize:11,fontFamily:"monospace",color:C.lt,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:10}}>Feed Total by Day</div>
              <div style={{display:"flex",alignItems:"flex-end",gap:6,height:80}}>
                {wStats.map((s,i)=>(
                  <div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
                    <div style={{fontSize:9,fontFamily:"monospace",color:C.lt}}>{s.ml||""}</div>
                    <div style={{width:"100%",background:`${C.ter}${s.date===selDay?"ff":"88"}`,borderRadius:"4px 4px 0 0",height:`${Math.max(4,(s.ml/maxMl)*60)}px`}}/>
                    <div style={{fontSize:9,fontFamily:"monospace",color:s.date===selDay?C.ter:C.lt,fontWeight:s.date===selDay?700:400}}>{fmtDate(s.date).slice(0,5)}</div>
                  </div>
                ))}
              </div>
            </div>
            <div style={card}>
              <div style={{fontSize:11,fontFamily:"monospace",color:C.lt,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:10}}>Nap Time by Day (mins)</div>
              <div style={{display:"flex",alignItems:"flex-end",gap:6,height:80}}>
                {wStats.map((s,i)=>(
                  <div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
                    <div style={{fontSize:9,fontFamily:"monospace",color:C.lt}}>{s.napM||""}</div>
                    <div style={{width:"100%",background:`${C.mint}${s.date===selDay?"ff":"88"}`,borderRadius:"4px 4px 0 0",height:`${Math.max(4,(s.napM/maxNapBar)*60)}px`}}/>
                    <div style={{fontSize:9,fontFamily:"monospace",color:s.date===selDay?C.mint:C.lt,fontWeight:s.date===selDay?700:400}}>{fmtDate(s.date).slice(0,5)}</div>
                  </div>
                ))}
              </div>
            </div>
            <div style={card}>
              <div style={{fontSize:11,fontFamily:"monospace",color:C.lt,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:10}}>Day Summary</div>
              {wStats.map((s,i)=>(
                <div key={i} onClick={()=>{setSelDay(s.date);setTab("day");}} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"9px 0",borderBottom:i<wStats.length-1?`1px solid ${C.blush}`:"none",cursor:"pointer"}}>
                  <span style={{fontSize:13,color:s.date===selDay?C.ter:C.deep,fontWeight:s.date===selDay?600:400}}>{fmtLong(s.date)}</span>
                  <div style={{display:"flex",gap:8}}>
                    <span style={{fontSize:12,fontFamily:"monospace",color:C.ter}}>{s.ml}ml</span>
                    <span style={{fontSize:12,fontFamily:"monospace",color:C.mint}}>{s.naps} naps</span>
                    <span style={{fontSize:12,fontFamily:"monospace",color:C.lt}}>{s.nightW}🌙</span>
                  </div>
                </div>
              ))}
            </div>
          </div>
        )}

        {/* TRENDS TAB */}
        {tab==="trends"&&(
          dayKeys.length<3?(
            <div style={{textAlign:"center",padding:"48px 20px",color:C.lt}}>
              <div style={{fontFamily:"'Playfair Display',serif",fontSize:20,color:C.mid,marginBottom:8}}>Not enough data yet</div>
              <div style={{fontSize:13,fontFamily:"monospace"}}>Add at least 3 days to see trends</div>
            </div>
          ):(
            <div>
              {tLast&&tPrev&&(
                <div style={card}>
                  <div style={{fontSize:11,fontFamily:"monospace",color:C.lt,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:12}}>This Week vs Last Week</div>
                  {[
                    {label:"Avg Daily Feed",curr:tLast.avgMl,prev:tPrev.avgMl,unit:"ml"},
                    {label:"Avg Nap Time",curr:tLast.avgNap,prev:tPrev.avgNap,unit:"min"},
                    {label:"Avg Night Wakes",curr:tLast.avgNight,prev:tPrev.avgNight,unit:""},
                  ].map((row,i)=>{
                    const t=arrow(row.curr,row.prev);
                    return(
                      <div key={i} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 0",borderBottom:i<2?`1px solid ${C.blush}`:"none"}}>
                        <div>
                          <div style={{fontSize:13,fontWeight:500}}>{row.label}</div>
                          <div style={{fontSize:11,fontFamily:"monospace",color:C.lt,marginTop:2}}>Last week: {row.prev}{row.unit}</div>
                        </div>
                        <div style={{textAlign:"right"}}>
                          <div style={{fontFamily:"'Playfair Display',serif",fontSize:22,fontWeight:700,color:C.ter}}>{row.curr}<span style={{fontSize:12,color:C.lt}}>{row.unit}</span></div>
                          {t&&<div style={{fontSize:16,color:t.color,lineHeight:1}}>{t.icon}</div>}
                        </div>
                      </div>
                    );
                  })}
                </div>
              )}
              <div style={card}>
                <div style={{fontSize:11,fontFamily:"monospace",color:C.lt,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:10}}>Daily Feed (ml)</div>
                <TrendLine vals={mlVals} keys={dayKeys} color={C.ter}/>
              </div>
              <div style={card}>
                <div style={{fontSize:11,fontFamily:"monospace",color:C.lt,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:10}}>Daily Nap Time</div>
                <TrendLine vals={napVals} keys={dayKeys} color={C.mint} unit="m"/>
              </div>
              {weekAvgs.length>1&&(
                <div style={card}>
                  <div style={{fontSize:11,fontFamily:"monospace",color:C.lt,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:10}}>Weekly Averages</div>
                  {weekAvgs.map((wk,i)=>(
                    <div key={i} style={{padding:"9px 0",borderBottom:i<weekAvgs.length-1?`1px solid ${C.blush}`:"none"}}>
                      <div style={{fontSize:11,fontFamily:"monospace",color:C.lt,marginBottom:5}}>{wk.label} · {wk.days} days</div>
                      <div style={{display:"flex",gap:7,flexWrap:"wrap"}}>
                        <span style={{background:"#f5e0d8",color:C.ter,fontFamily:"monospace",fontSize:11,padding:"2px 8px",borderRadius:99}}>~{wk.avgMl}ml/day</span>
                        <span style={{background:"#d4ede6",color:C.mint,fontFamily:"monospace",fontSize:11,padding:"2px 8px",borderRadius:99}}>~{hm(wk.avgNap)} naps</span>
                        <span style={{background:"#f5eccb",color:"#b88a20",fontFamily:"monospace",fontSize:11,padding:"2px 8px",borderRadius:99}}>~{wk.avgNight} night wakes</span>
                      </div>
                    </div>
                  ))}
                </div>
              )}
            </div>
          )
        )}

        {/* GROWTH TAB */}
        {tab==="growth"&&(()=>{
          const ageMonths = babyDob ? Math.floor((new Date() - new Date(babyDob)) / (1000*60*60*24*30.44)) : null;
          const sortedW = [...weights].sort((a,b)=>a.date.localeCompare(b.date));
          const wWithPct = sortedW.map(w => {
            if(!babyDob) return {...w, pct: null};
            const ageMo = Math.floor((new Date(w.date) - new Date(babyDob)) / (1000*60*60*24*30.44));
            if(ageMo < 0 || ageMo > 24) return {...w, pct: null};
            return {...w, pct: getPercentile(w.kg, ageMo, babySex), ageMo};
          });
          const latest = wWithPct.filter(w=>w.pct!==null).slice(-1)[0];
          const W=280,H=80;
          const kgs = sortedW.map(w=>w.kg);
          const maxKg = Math.max(...kgs,1);
          const minKg = Math.min(...kgs,0)*0.95;
          const pts = sortedW.map((w,i)=>({
            x: sortedW.length===1?W/2:(i/(sortedW.length-1))*W,
            y: H-((w.kg-minKg)/(maxKg-minKg||1))*H,
            kg:w.kg, date:w.date
          }));
          const path = pts.map((p,i)=>`${i===0?"M":"L"}${p.x},${p.y}`).join(" ");

          return(
            <div>
              <div style={{...card}}>
                <div style={{fontSize:11,fontFamily:"monospace",color:C.lt,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:10}}>Baby Info</div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:8}}>
                  <div>
                    <label style={{fontSize:11,fontFamily:"monospace",color:C.mid,textTransform:"uppercase",letterSpacing:"0.08em",display:"block",marginBottom:4}}>Date of Birth</label>
                    <input type="date" value={babyDob} onChange={e=>setBabyDob(e.target.value)} style={{width:"100%",padding:"9px 12px",borderRadius:12,border:`1.5px solid ${C.blush}`,background:C.warm,fontSize:15,fontFamily:"inherit",outline:"none",boxSizing:"border-box"}}/>
                  </div>
                  <div>
                    <label style={{fontSize:11,fontFamily:"monospace",color:C.mid,textTransform:"uppercase",letterSpacing:"0.08em",display:"block",marginBottom:4}}>Sex</label>
                    <select value={babySex} onChange={e=>setBabySex(e.target.value)} style={{width:"100%",padding:"9px 12px",borderRadius:12,border:`1.5px solid ${C.blush}`,background:C.warm,fontSize:15,fontFamily:"inherit",outline:"none",boxSizing:"border-box"}}>
                      <option value="boy">Boy</option>
                      <option value="girl">Girl</option>
                    </select>
                  </div>
                </div>
                {ageMonths!==null&&<div style={{fontSize:12,color:C.mid,fontFamily:"monospace",textAlign:"center",marginTop:4}}>
                  {babyName||"Baby"} is <strong style={{color:C.ter}}>{ageMonths} month{ageMonths!==1?"s":""}</strong> old
                </div>}
              </div>

              {latest&&(
                <div style={{...card,textAlign:"center",padding:"20px 16px"}}>
                  <div style={{fontSize:11,fontFamily:"monospace",color:C.lt,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:8}}>Latest Weight Percentile</div>
                  <div style={{fontFamily:"'Playfair Display',serif",fontSize:52,fontWeight:700,color:percentileColor(latest.pct),lineHeight:1}}>{ordinal(latest.pct)}</div>
                  <div style={{fontSize:13,color:C.mid,marginTop:6}}>{latest.kg}kg at {latest.ageMo} months · {babySex}</div>
                  <div style={{fontSize:12,marginTop:6,padding:"6px 12px",borderRadius:99,display:"inline-block",background:percentileColor(latest.pct)+"22",color:percentileColor(latest.pct),fontFamily:"monospace",fontWeight:600}}>
                    {percentileNote(latest.pct)}
                  </div>
                </div>
              )}

              <div style={{...card}}>
                <div style={{fontSize:11,fontFamily:"monospace",color:C.lt,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:10}}>Log Weight</div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:8}}>
                  <Inp label="Date" type="date" value={growthForm.date} onChange={e=>setGrowthForm(f=>({...f,date:e.target.value}))} style={{marginBottom:0}}/>
                  <Inp label="Weight (kg)" type="number" step="0.01" placeholder="e.g. 5.2" value={growthForm.kg} onChange={e=>setGrowthForm(f=>({...f,kg:e.target.value}))} style={{marginBottom:0}}/>
                </div>
                <PBtn onClick={()=>{
                  if(!growthForm.kg)return;
                  const updated=[...weights.filter(x=>x.date!==growthForm.date),{date:growthForm.date,kg:parseFloat(growthForm.kg)}].sort((a,b)=>a.date.localeCompare(b.date));
                  setWeights(updated);setGrowthForm({date:todayStr(),kg:""});
                }}>Save Weight</PBtn>
              </div>

              {sortedW.length>=2&&(
                <div style={{...card}}>
                  <div style={{fontSize:11,fontFamily:"monospace",color:C.lt,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:10}}>Weight Over Time</div>
                  <svg width="100%" viewBox={`0 0 ${W} ${H+20}`} style={{overflow:"visible"}}>
                    <path d={path} fill="none" stroke={C.ter} strokeWidth={2} strokeLinejoin="round"/>
                    {pts.map((p,i)=>(
                      <g key={i}>
                        <circle cx={p.x} cy={p.y} r={4} fill={C.ter}/>
                        <text x={p.x} y={p.y-9} textAnchor="middle" fontSize={9} fill={C.mid} fontFamily="monospace">{p.kg}kg</text>
                        <text x={p.x} y={H+16} textAnchor="middle" fontSize={8} fill={C.lt} fontFamily="monospace">{fmtDate(p.date).slice(0,5)}</text>
                      </g>
                    ))}
                  </svg>
                </div>
              )}

              {wWithPct.filter(w=>w.pct!==null).length>0&&(
                <div style={{...card}}>
                  <div style={{fontSize:11,fontFamily:"monospace",color:C.lt,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:10}}>Percentile History</div>
                  {wWithPct.filter(w=>w.pct!==null).reverse().map((w,i)=>(
                    <div key={i} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"9px 0",borderBottom:i<wWithPct.filter(x=>x.pct!==null).length-1?`1px solid ${C.blush}`:"none"}}>
                      <div>
                        <div style={{fontSize:13,fontWeight:500}}>{fmtLong(w.date)}</div>
                        <div style={{fontSize:11,fontFamily:"monospace",color:C.lt,marginTop:2}}>{w.ageMo} months · {w.kg}kg</div>
                      </div>
                      <span style={{fontFamily:"'Playfair Display',serif",fontSize:22,fontWeight:700,color:percentileColor(w.pct)}}>{ordinal(w.pct)}</span>
                    </div>
                  ))}
                </div>
              )}

              {weights.length>0&&(
                <div style={{display:"flex",flexDirection:"column",gap:7}}>
                  {[...weights].sort((a,b)=>b.date.localeCompare(a.date)).map((w,i)=>(
                    <div key={i} style={{background:C.warm,border:`1px solid ${C.blush}`,borderRadius:14,padding:"11px 12px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                      <span style={{fontSize:13,fontWeight:500}}>{fmtLong(w.date)}</span>
                      <div style={{display:"flex",gap:8,alignItems:"center"}}>
                        <span style={{background:"#f5e0d8",color:C.ter,fontFamily:"monospace",fontSize:13,padding:"3px 10px",borderRadius:99,fontWeight:600}}>{w.kg} kg</span>
                        <button onClick={()=>setWeights(ws=>ws.filter(x=>x.date!==w.date))} style={{background:"#f0e5e0",border:"none",borderRadius:"50%",width:23,height:23,color:C.lt,cursor:"pointer",fontSize:10}}>✕</button>
                      </div>
                    </div>
                  ))}
                </div>
              )}
              {weights.length===0&&<div style={{textAlign:"center",color:C.lt,fontSize:13,fontFamily:"monospace",padding:"20px 0"}}>No weights logged yet</div>}
            </div>
          );
        })()}

        {/* MILESTONES TAB */}
        {tab==="milestones"&&(()=>{
          const age = calcAge(babyDob);
          const ageWeeks = age ? age.totalWeeks : null;
          const currentMonth = age ? age.months : null;
          const doneCount = MILESTONES.filter(m=>milestones[m.id]&&milestones[m.id].date).length;

          if (!babyDob) return (
            <div style={{...card,textAlign:"center",padding:"36px 20px"}}>
              <div style={{fontSize:40,marginBottom:14}}>🎂</div>
              <div style={{fontFamily:"'Playfair Display',serif",fontSize:20,color:C.mid,marginBottom:8}}>Add your baby's date of birth</div>
              <div style={{fontSize:13,color:C.lt,marginBottom:20,lineHeight:1.7}}>We'll show milestones organised by month, tailored to exactly how old {babyName||"your baby"} is today.</div>
              <button onClick={()=>setTab("growth")} style={{background:`linear-gradient(135deg,#c9705a,#a85a44)`,border:"none",borderRadius:99,padding:"12px 28px",color:"white",fontSize:14,cursor:"pointer",fontWeight:700}}>Set Date of Birth →</button>
            </div>
          );

          const msMonths = (m) => {
            const startMo = Math.floor(m.earliest / 4.33);
            const endMo = Math.floor(m.latest / 4.33);
            return { startMo, endMo };
          };

          const maxMonth = Math.max((currentMonth||0) + 1, 12);
          const months = Array.from({length: maxMonth + 1}, (_, i) => i);

          const msForMonth = (mo) => MILESTONES.filter(m => {
            const { startMo, endMo } = msMonths(m);
            return mo >= startMo && mo <= endMo;
          });

          const MilestoneRow = ({m, monthIdx}) => {
            const done = milestones[m.id] && milestones[m.id].date;
            const isCurrent = currentMonth !== null && monthIdx === currentMonth;
            const isPast = currentMonth !== null && monthIdx < currentMonth;
            const isFuture = currentMonth !== null && monthIdx > currentMonth + 1;
            const checkBorder = done ? C.mint : isCurrent ? C.ter : isFuture ? "#ddd" : C.blush;
            const checkBg = done ? C.mint : "transparent";
            const textColor = done ? C.mint : isFuture ? "#c8bdb8" : C.deep;

            return (
              <div onClick={()=>{
                if(isFuture) return;
                if(done){
                  if(window.confirm(`Remove "${m.label}"?`)) setMilestones(ms=>({...ms,[m.id]:{}}));
                } else {
                  setMilestones(ms=>({...ms,[m.id]:{date:todayStr()}}));
                }
              }} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 0",borderBottom:`1px solid ${C.blush}`,cursor:isFuture?"default":"pointer",opacity:isFuture?0.45:1}}>
                <div style={{width:22,height:22,borderRadius:"50%",border:`2px solid ${checkBorder}`,background:checkBg,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                  {done&&<span style={{color:"white",fontSize:11,fontWeight:700}}>✓</span>}
                </div>
                <div style={{flex:1}}>
                  <div style={{fontSize:13,fontWeight:done?600:400,color:textColor}}>{m.label}</div>
                  {done&&<div style={{fontSize:10,fontFamily:"monospace",color:C.lt,marginTop:1}}>✓ {fmtLong(milestones[m.id].date)}</div>}
                </div>
                {!done && isCurrent && <span style={{fontSize:10,background:"#fdeee8",color:C.ter,borderRadius:99,padding:"3px 8px",fontWeight:700,flexShrink:0}}>Now</span>}
                {!done && isPast && !isFuture && <span style={{fontSize:10,background:"#fdf4f0",color:C.lt,borderRadius:99,padding:"3px 8px",flexShrink:0}}>Tap to log</span>}
              </div>
            );
          };

          const MonthBlock = ({mo}) => {
            const ms = msForMonth(mo);
            if (!ms.length) return null;
            const isCurrent = currentMonth !== null && mo === currentMonth;
            const isNext = currentMonth !== null && mo === currentMonth + 1;
            const isPast = currentMonth !== null && mo < currentMonth;
            const isFuture = currentMonth !== null && mo > currentMonth + 1;
            const doneMsInBlock = ms.filter(m => milestones[m.id] && milestones[m.id].date);
            const headerBg = isCurrent
              ? `linear-gradient(135deg,#c9705a,#a85a44)`
              : isNext ? `linear-gradient(135deg,#e8a898,#d49080)`
              : isPast ? "white"
              : "#f5f2ef";
            const headerText = (isCurrent || isNext) ? "white" : isPast ? C.mid : "#b0a8a4";
            const monthLabel = mo === 0 ? "Newborn" : `Month ${mo}`;
            const monthRange = mo === 0 ? "0–4 weeks" : `${mo}–${mo+1} months`;

            return (
              <div style={{...card, padding:0, overflow:"hidden", marginBottom:12}}>
                <div style={{background:headerBg, padding:"12px 16px", display:"flex", alignItems:"center", justifyContent:"space-between"}}>
                  <div>
                    <div style={{fontFamily:"'Playfair Display',serif", fontSize:17, fontWeight:700, color:headerText, lineHeight:1}}>{monthLabel}</div>
                    <div style={{fontSize:10, fontFamily:"monospace", color: (isCurrent||isNext) ? "rgba(255,255,255,0.7)" : C.lt, marginTop:3}}>{monthRange}</div>
                  </div>
                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                    {isCurrent && <span style={{fontSize:11,background:"rgba(255,255,255,0.25)",color:"white",borderRadius:99,padding:"3px 10px",fontWeight:700}}>👶 Right now</span>}
                    {isNext && <span style={{fontSize:11,background:"rgba(255,255,255,0.25)",color:"white",borderRadius:99,padding:"3px 10px",fontWeight:700}}>🔜 Up next</span>}
                    {isPast && <span style={{fontSize:11,color:C.lt,fontFamily:"monospace"}}>{doneMsInBlock.length}/{ms.length} done</span>}
                    {isFuture && <span style={{fontSize:11,color:"#c0b8b4",fontFamily:"monospace"}}>{ms.length} milestones</span>}
                  </div>
                </div>
                <div style={{padding:"4px 16px 6px"}}>
                  {ms.map(m => <MilestoneRow key={m.id} m={m} monthIdx={mo}/>)}
                </div>
              </div>
            );
          };

          const ageParts = [];
          if (age.months > 0) ageParts.push(`${age.months} month${age.months!==1?"s":""}`);
          if (age.weeksAfterMonths > 0) ageParts.push(`${age.weeksAfterMonths} week${age.weeksAfterMonths!==1?"s":""}`);
          if (age.remainingDays > 0 || ageParts.length===0) ageParts.push(`${age.remainingDays} day${age.remainingDays!==1?"s":""}`);

          return (
            <div>
              <div style={{...card, background:`linear-gradient(135deg,#fdf4f0,#fff8f4)`, marginBottom:16}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                  <div>
                    <div style={{fontSize:10,fontFamily:"monospace",color:C.lt,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:5}}>{possessive(babyName||"Baby")} age today</div>
                    <div style={{fontFamily:"'Playfair Display',serif",fontSize:24,fontWeight:700,color:C.ter,lineHeight:1.1}}>{ageParts.join(", ")}</div>
                    <div style={{fontSize:11,fontFamily:"monospace",color:C.lt,marginTop:4}}>{age.totalDays} days · week {age.totalWeeks}</div>
                  </div>
                  <div style={{textAlign:"right"}}>
                    <div style={{fontFamily:"'Playfair Display',serif",fontSize:26,fontWeight:700,color:C.mint}}>{doneCount}</div>
                    <div style={{fontSize:10,fontFamily:"monospace",color:C.lt}}>achieved</div>
                  </div>
                </div>
                <div style={{marginTop:12,background:C.blush,borderRadius:99,height:5,overflow:"hidden"}}>
                  <div style={{height:"100%",borderRadius:99,background:`linear-gradient(90deg,${C.ter},${C.mint})`,width:`${Math.round(doneCount/MILESTONES.length*100)}%`}}/>
                </div>
                <div style={{fontSize:10,fontFamily:"monospace",color:C.lt,marginTop:3,textAlign:"right"}}>{doneCount} of {MILESTONES.length}</div>
              </div>
              {months.map(mo => <MonthBlock key={mo} mo={mo}/>)}
            </div>
          );
        })()}

      </div>

      {/* BOTTOM NAV */}
      <div style={{position:"fixed",bottom:0,left:0,right:0,zIndex:50,background:"white",borderTop:`1px solid ${C.blush}`,display:"flex",alignItems:"stretch",boxShadow:"0 -4px 20px rgba(44,31,26,0.08)",maxWidth:520,margin:"0 auto"}}>
        {["day","week","trends","growth","milestones"].map(t=>(
          <button key={t} onClick={()=>setTab(t)} style={tabSt(t)}>
            <span style={{fontSize:18}}>{tabIcons[t]}</span>
            <span>{tabLabels[t]}</span>
          </button>
        ))}
      </div>

      {/* FABs */}
      <div style={{position:"fixed",bottom:70,right:18,display:"flex",flexDirection:"column",gap:10,alignItems:"center",zIndex:49}}>
        <button onClick={openPaste} style={{width:44,height:44,borderRadius:"50%",background:"white",border:`2px solid ${C.blush}`,color:C.ter,fontSize:20,cursor:"pointer",boxShadow:"0 2px 12px rgba(201,112,90,0.2)",display:"flex",alignItems:"center",justifyContent:"center"}} title="Paste day notes">📋</button>
        <button onClick={()=>openEntry(false)} style={{width:56,height:56,borderRadius:"50%",background:`linear-gradient(135deg,#c9705a,#a85a44)`,border:"none",color:"white",fontSize:28,cursor:"pointer",boxShadow:"0 4px 20px rgba(201,112,90,0.5)",display:"flex",alignItems:"center",justifyContent:"center"}}>+</button>
      </div>

      {/* ENTRY MODAL */}
      {modal==="entry"&&(
        <Sheet onClose={()=>{setModal(null);setEditEntry(null);}} title={editEntry?"Edit Entry":"Add Entry"}>
          {/* Type selector — feed/nap/wake/sleep/poop */}
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:15}}>
            {["feed","nap","wake","sleep","poop"].map(t=>(
              <div key={t} onClick={()=>setEType(t)} style={{padding:"10px 6px",borderRadius:14,border:`2px solid ${eType===t?C.ter:C.blush}`,background:eType===t?"#fdf0eb":C.warm,textAlign:"center",cursor:"pointer"}}>
                <div style={{fontSize:20}}>{ICONS[t]}</div>
                <div style={{fontSize:12,fontWeight:500,color:eType===t?C.ter:C.mid,marginTop:3}}>{NAMES[t]}</div>
              </div>
            ))}
          </div>

          {eType==="feed"&&<>
            {/* Milk / Breast / Solids toggle */}
            <div style={{display:"flex",gap:6,marginBottom:12}}>
              {["milk","breast","solids"].map(ft=>(
                <button key={ft} onClick={()=>setFeedType(ft)} style={{flex:1,padding:"7px 4px",borderRadius:12,border:`2px solid ${feedType===ft?C.ter:C.blush}`,background:feedType===ft?"#fdf0eb":C.warm,fontSize:12,fontWeight:600,color:feedType===ft?C.ter:C.mid,cursor:"pointer",fontFamily:"inherit"}}>
                  {ft==="milk"?"🍼 Bottle":ft==="breast"?"🤱 Breast":"🥣 Solids"}
                </button>
              ))}
            </div>
            {feedType==="milk"&&<Inp label="Amount (ml)" type="number" inputMode="numeric" placeholder="e.g. 180" value={form.amount} onChange={e=>setForm(f=>({...f,amount:e.target.value}))}/>}
            {feedType==="breast"&&(
              <div style={{marginBottom:12}}>
                <label style={{fontSize:11,fontFamily:"monospace",color:C.mid,textTransform:"uppercase",letterSpacing:"0.08em",display:"block",marginBottom:6}}>Minutes each side</label>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                  {[["breastL","Left (L)"],["breastR","Right (R)"]].map(([k,lbl])=>(
                    <div key={k}>
                      <label style={{fontSize:10,fontFamily:"monospace",color:C.lt,display:"block",marginBottom:3}}>{lbl}</label>
                      <input type="number" inputMode="numeric" min="0" max="60" placeholder="mins" value={form[k]||""} onChange={e=>setForm(f=>({...f,[k]:e.target.value}))}
                        style={{width:"100%",padding:"9px 11px",borderRadius:12,border:`1.5px solid ${C.blush}`,background:C.warm,fontSize:15,fontFamily:"inherit",outline:"none",boxSizing:"border-box",textAlign:"center"}}/>
                    </div>
                  ))}
                </div>
                <div style={{fontSize:11,color:C.lt,fontFamily:"monospace",marginTop:6,textAlign:"center"}}>
                  Total: {((parseInt(form.breastL)||0)+(parseInt(form.breastR)||0))} min
                </div>
              </div>
            )}
            {feedType==="solids"&&<Inp label="Description / amount" type="text" placeholder="e.g. porridge, half jar" value={form.note} onChange={e=>setForm(f=>({...f,note:e.target.value}))}/>}
            <Inp label="Time" type="time" value={form.time} onChange={e=>setForm(f=>({...f,time:e.target.value}))}/>
            {!nightMode&&(
              <div style={{marginBottom:12}}>
                <label style={{fontSize:11,fontFamily:"monospace",color:C.mid,textTransform:"uppercase",letterSpacing:"0.08em",display:"block",marginBottom:4}}>Night feed?</label>
                <select value={form.night} onChange={e=>setForm(f=>({...f,night:e.target.value}))} style={{width:"100%",padding:"9px 12px",borderRadius:12,border:`1.5px solid ${C.blush}`,background:C.warm,fontSize:15,fontFamily:"inherit",outline:"none",boxSizing:"border-box"}}>
                  <option value="no">No — daytime</option>
                  <option value="yes">Yes — night wake</option>
                </select>
              </div>
            )}
            {(feedType==="milk"||feedType==="breast")&&<Inp label="Note (optional)" type="text" placeholder="e.g. fussy, didn't finish…" value={form.note} onChange={e=>setForm(f=>({...f,note:e.target.value}))}/>}
          </>}

          {eType==="nap"&&(
            <>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}}>
                {["start","end"].map(k=>(
                  <div key={k}>
                    <label style={{fontSize:11,fontFamily:"monospace",color:C.mid,textTransform:"uppercase",letterSpacing:"0.08em",display:"block",marginBottom:4}}>{k}</label>
                    <input type="time" value={form[k]} onChange={e=>setForm(f=>({...f,[k]:e.target.value}))} style={{width:"100%",padding:"9px 11px",borderRadius:12,border:`1.5px solid ${C.blush}`,background:C.warm,fontSize:15,fontFamily:"inherit",outline:"none",boxSizing:"border-box"}}/>
                  </div>
                ))}
              </div>
              <Inp label="Note (optional)" type="text" placeholder="e.g. fussy, didn't finish…" value={form.note} onChange={e=>setForm(f=>({...f,note:e.target.value}))}/>
            </>
          )}

          {(eType==="wake"||eType==="sleep")&&(
            <>
              <Inp label="Time" type="time" value={form.time} onChange={e=>setForm(f=>({...f,time:e.target.value}))}/>
              <Inp label="Note (optional)" type="text" placeholder="e.g. fussy, didn't finish…" value={form.note} onChange={e=>setForm(f=>({...f,note:e.target.value}))}/>
            </>
          )}

          {eType==="poop"&&(
            <>
              <Inp label="Time" type="time" value={form.time} onChange={e=>setForm(f=>({...f,time:e.target.value}))}/>
              <div style={{marginBottom:12}}>
                <label style={{fontSize:11,fontFamily:"monospace",color:C.mid,textTransform:"uppercase",letterSpacing:"0.08em",display:"block",marginBottom:6}}>Colour / type</label>
                <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                  {POOP_TYPES.map(pt=>(
                    <button key={pt} onClick={()=>setForm(f=>({...f,poopType:pt}))} style={{padding:"6px 12px",borderRadius:99,border:`1.5px solid ${form.poopType===pt?"#8a7060":C.blush}`,background:form.poopType===pt?"#e8e0d4":C.warm,fontSize:12,color:form.poopType===pt?"#5a4030":C.mid,cursor:"pointer",fontFamily:"inherit",fontWeight:form.poopType===pt?600:400}}>
                      {pt}
                    </button>
                  ))}
                </div>
              </div>
              <Inp label="Note (optional)" type="text" placeholder="e.g. explosive, small…" value={form.note} onChange={e=>setForm(f=>({...f,note:e.target.value}))}/>
            </>
          )}

          <PBtn onClick={saveEntry}>{editEntry?"Update Entry":"Save Entry"}</PBtn>
        </Sheet>
      )}

      {modal==="addDay"&&(
        <Sheet onClose={()=>setModal(null)} title="Add New Day">
          <Inp label="Date" type="date" value={newDate} onChange={e=>setNewDate(e.target.value)}/>
          <PBtn onClick={addDay}>Add Day</PBtn>
        </Sheet>
      )}

      {modal==="dayMenu"&&menuDay&&(
        <Sheet onClose={()=>setModal(null)} title={`Edit · ${fmtDate(menuDay)}`}>
          <Inp label="Change Date To" type="date" value={editDate} onChange={e=>setEditDate(e.target.value)}/>
          <PBtn onClick={saveEditDay}>Save New Date</PBtn>
          <PBtn v="ghost" onClick={()=>setModal(null)} style={{marginTop:8}}>Cancel</PBtn>
          <div style={{borderTop:`1px solid ${C.blush}`,margin:"12px 0"}}/>
          <PBtn v="danger" onClick={delDay}>🗑 Delete This Day</PBtn>
        </Sheet>
      )}

      {/* SMART PASTE MODAL */}
      {modal==="paste"&&(
        <Sheet onClose={()=>{setModal(null);setParsedEntries(null);setPasteText("");}} title="📋 Paste Day Notes">
          {!parsedEntries ? (
            <>
              <div style={{fontSize:13,color:C.mid,marginBottom:4,lineHeight:1.6}}>
                Paste your notes in any format — the app will read them and sort them into the right categories.
              </div>
              <div style={{fontSize:11,fontFamily:"monospace",color:C.lt,marginBottom:12,padding:"10px",background:C.cream,borderRadius:10,lineHeight:1.8}}>
                e.g. "Woke up 7am · Feed 8am 180ml · Nap 10:15-11:30 · Feed 1pm 150ml · Asleep 7pm · Wake1 10:30pm 60ml"
              </div>
              <textarea
                value={pasteText}
                onChange={e=>setPasteText(e.target.value)}
                placeholder={"Paste your notes here...\n\nWoke up 9am\nFeed 9am 210ml\nNap 11:15-12:35\nFeed 1pm 150ml\nNap 2:25-2:50\nAsleep 7pm\nWake1 8:30pm 70ml"}
                style={{width:"100%",minHeight:180,padding:"12px",borderRadius:14,border:`1.5px solid ${C.blush}`,background:C.cream,fontSize:13,fontFamily:"inherit",outline:"none",resize:"vertical",lineHeight:1.7,boxSizing:"border-box",marginBottom:8}}
              />
              {parseError&&<div style={{fontSize:12,color:C.ter,background:"#fdf0eb",borderRadius:10,padding:"8px 12px",marginBottom:10}}>{parseError}</div>}
              <PBtn onClick={runParse}>Parse Notes →</PBtn>
            </>
          ) : (
            <>
              {parsedEntries.detectedDate&&(
                <div style={{fontSize:12,fontFamily:"monospace",color:C.mint,background:"#f0faf6",borderRadius:10,padding:"7px 12px",marginBottom:12}}>
                  📅 Detected date: <strong>{fmtLong(parsedEntries.detectedDate)}</strong> — entries will be added to this day
                </div>
              )}
              {!parsedEntries.detectedDate&&(
                <div style={{fontSize:12,fontFamily:"monospace",color:C.gold,background:"#fffbf0",borderRadius:10,padding:"7px 12px",marginBottom:12}}>
                  📅 No date found — entries will be added to <strong>{fmtLong(selDay||todayStr())}</strong>
                </div>
              )}
              <div style={{fontSize:11,fontFamily:"monospace",color:C.lt,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:8}}>
                Found {parsedEntries.entries.length} entr{parsedEntries.entries.length===1?"y":"ies"}
              </div>
              <div style={{display:"flex",flexDirection:"column",gap:6,marginBottom:12,maxHeight:280,overflowY:"auto"}}>
                {parsedEntries.entries.map((e,i)=>(
                  <div key={i} style={{display:"flex",alignItems:"center",gap:10,padding:"9px 11px",borderRadius:12,background:C.cream,border:`1px solid ${C.blush}`,borderLeft:`3px solid ${e.type==="feed"?C.ter:e.type==="nap"?C.mint:e.type==="sleep"?C.sky:C.gold}`}}>
                    <span style={{fontSize:16}}>{ICONS[e.type]}</span>
                    <div style={{flex:1}}>
                      <div style={{fontSize:13,fontWeight:500}}>{NAMES[e.type]}{e.night?" (night)":""}</div>
                      <div style={{fontSize:11,fontFamily:"monospace",color:C.lt}}>
                        {e.type==="nap"?`${fmt12(e.start)} – ${fmt12(e.end)} (${minDiff(e.start,e.end)}min)`:`${fmt12(e.time)}${e.amount?` · ${e.amount}ml`:""}`}
                        {e.note?` · ${e.note}`:""}
                      </div>
                    </div>
                  </div>
                ))}
              </div>
              {parsedEntries.warnings.length>0&&(
                <div style={{marginBottom:12}}>
                  <div style={{fontSize:11,fontFamily:"monospace",color:C.gold,marginBottom:5}}>⚠️ Couldn't parse {parsedEntries.warnings.length} line{parsedEntries.warnings.length>1?"s":""}:</div>
                  {parsedEntries.warnings.map((w,i)=>(
                    <div key={i} style={{fontSize:11,color:C.mid,fontFamily:"monospace",padding:"4px 8px",background:"#fffbf0",borderRadius:8,marginBottom:3}}>{w}</div>
                  ))}
                </div>
              )}
              <PBtn onClick={confirmPaste}>✓ Add {parsedEntries.entries.length} {parsedEntries.entries.length===1?"Entry":"Entries"}</PBtn>
              <button onClick={()=>setParsedEntries(null)} style={{width:"100%",marginTop:8,padding:"10px",borderRadius:12,border:`1px solid ${C.blush}`,background:"none",color:C.mid,fontSize:13,cursor:"pointer",fontFamily:"inherit"}}>← Edit notes</button>
            </>
          )}
        </Sheet>
      )}

      {/* DAY REPORT MODAL */}
      {modal==="report"&&(()=>{
        const es=days[selDay]||[];
        const dEs=es.filter(e=>!e.night).sort((a,b)=>timeVal(a)-timeVal(b));
        const nEs=es.filter(e=>e.night).sort((a,b)=>timeVal(a)-timeVal(b));
        const wakeEv=dEs.find(e=>e.type==="wake");
        const sleepEv=dEs.find(e=>e.type==="sleep");
        const dayFeeds=dEs.filter(e=>e.type==="feed");
        const dayNaps=dEs.filter(e=>e.type==="nap");
        const totalFeedMl=es.filter(e=>e.type==="feed").reduce((s,f)=>s+(f.amount||0),0);
        const nightFeedMl=nEs.filter(e=>e.type==="feed").reduce((s,f)=>s+(f.amount||0),0);
        const totalNapM=dayNaps.reduce((s,n)=>s+minDiff(n.start,n.end),0);
        const nightPoints=[];
        if(sleepEv) nightPoints.push({label:"Bedtime",time:sleepEv.time});
        nEs.forEach((e,i)=>nightPoints.push({label:`Wake ${i+1}`,time:e.time,feed:e.amount||0}));
        const stretches=[];
        for(let i=0;i<nightPoints.length-1;i++){
          const from=nightPoints[i];const to=nightPoints[i+1];
          let mins=minDiff(from.time,to.time);
          if(mins<=0) mins+=720;
          stretches.push({from:from.label,to:to.label,mins,toTime:to.time,feed:to.feed});
        }
        function copyReport(){
          const ln=[`📋 ${fmtLong(selDay)} — ${babyName||"Baby"}'s Day Report`,``];
          ln.push(`☀️ Wake up: ${wakeEv?fmt12(wakeEv.time):"—"}`);
          ln.push(`🌙 Bedtime: ${sleepEv?fmt12(sleepEv.time):"—"}`);
          ln.push(``);
          ln.push(`🍼 Total feed: ${totalFeedMl}ml`);
          ln.push(`   Daytime: ${totalFeedMl-nightFeedMl}ml over ${dayFeeds.length} feed${dayFeeds.length!==1?"s":""}`);
          if(nEs.length) ln.push(`   Night: ${nightFeedMl}ml over ${nEs.filter(e=>e.type==="feed").length} feed${nEs.filter(e=>e.type==="feed").length!==1?"s":""}`);
          ln.push(``);
          ln.push(`😴 Naps: ${dayNaps.length} nap${dayNaps.length!==1?"s":""} (${hm(totalNapM)} total)`);
          ln.push(``);
          ln.push(`🌟 Night: ${nEs.length} wake${nEs.length!==1?"s":""}`);
          if(stretches.length){
            ln.push(`   Stretches between wakes:`);
            stretches.forEach(s=>ln.push(`   ${s.from} → ${s.to} (${fmt12(s.toTime)}): ${hm(s.mins)}${s.feed?` · ${s.feed}ml`:""}`));
          }
          navigator.clipboard.writeText(ln.join("\n")).then(()=>{setCopied(true);setTimeout(()=>setCopied(false),2000);});
        }
        return(
          <Sheet onClose={()=>setModal(null)} title="">
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:18}}>
              <div style={{width:36,height:36,borderRadius:"50%",background:"linear-gradient(135deg,#c9705a,#7a5c52)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,flexShrink:0}}>📊</div>
              <div>
                <div style={{fontFamily:"'Playfair Display',serif",fontSize:18}}>Day Report</div>
                <div style={{fontSize:11,fontFamily:"monospace",color:C.lt}}>{fmtLong(selDay)}</div>
              </div>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:12}}>
              <div style={{background:C.warm,border:`1px solid ${C.blush}`,borderRadius:14,padding:"12px 10px",textAlign:"center"}}>
                <div style={{fontSize:10,fontFamily:"monospace",color:C.lt,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:4}}>Wake Up</div>
                <div style={{fontFamily:"'Playfair Display',serif",fontSize:20,color:C.gold}}>{wakeEv?fmt12(wakeEv.time):"—"}</div>
              </div>
              <div style={{background:C.warm,border:`1px solid ${C.blush}`,borderRadius:14,padding:"12px 10px",textAlign:"center"}}>
                <div style={{fontSize:10,fontFamily:"monospace",color:C.lt,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:4}}>Bedtime</div>
                <div style={{fontFamily:"'Playfair Display',serif",fontSize:20,color:C.sky}}>{sleepEv?fmt12(sleepEv.time):"—"}</div>
              </div>
            </div>
            <div style={{background:C.warm,border:`1px solid ${C.blush}`,borderLeft:`3px solid ${C.ter}`,borderRadius:14,padding:"12px",marginBottom:10}}>
              <div style={{fontSize:11,fontFamily:"monospace",color:C.lt,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:8}}>🍼 Feeding</div>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                <span style={{fontSize:13,color:C.deep}}>Total</span>
                <span style={{fontFamily:"'Playfair Display',serif",fontSize:20,fontWeight:700,color:C.ter}}>{totalFeedMl}<span style={{fontSize:12,color:C.lt,fontWeight:400}}>ml</span></span>
              </div>
              <div style={{display:"flex",justifyContent:"space-between",fontSize:12,color:C.mid,borderTop:`1px solid ${C.blush}`,paddingTop:6}}>
                <span>Daytime · {dayFeeds.length} feeds</span>
                <span style={{fontFamily:"monospace"}}>{totalFeedMl-nightFeedMl}ml</span>
              </div>
              {nEs.length>0&&<div style={{display:"flex",justifyContent:"space-between",fontSize:12,color:C.mid,marginTop:4}}>
                <span>Night · {nEs.filter(e=>e.type==="feed").length} feeds</span>
                <span style={{fontFamily:"monospace"}}>{nightFeedMl}ml</span>
              </div>}
            </div>
            <div style={{background:C.warm,border:`1px solid ${C.blush}`,borderLeft:`3px solid ${C.mint}`,borderRadius:14,padding:"12px",marginBottom:10}}>
              <div style={{fontSize:11,fontFamily:"monospace",color:C.lt,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:8}}>😴 Naps</div>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <span style={{fontSize:13,color:C.deep}}>{dayNaps.length} nap{dayNaps.length!==1?"s":""}</span>
                <span style={{fontFamily:"'Playfair Display',serif",fontSize:20,fontWeight:700,color:C.mint}}>{hm(totalNapM)}</span>
              </div>
              {dayNaps.map((n,i)=>(
                <div key={i} style={{display:"flex",justifyContent:"space-between",fontSize:11,color:C.lt,fontFamily:"monospace",marginTop:4,borderTop:i===0?`1px solid ${C.blush}`:"none",paddingTop:i===0?6:0}}>
                  <span>{fmt12(n.start)} – {fmt12(n.end)}</span>
                  <span>{minDiff(n.start,n.end)}min</span>
                </div>
              ))}
            </div>
            <div style={{background:"#1a1228",borderRadius:14,padding:"12px",marginBottom:10}}>
              <div style={{fontSize:11,fontFamily:"monospace",color:"#6a5880",textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:8}}>🌟 Night Wakes</div>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:stretches.length?10:0}}>
                <span style={{fontSize:13,color:"#d8cce8"}}>{nEs.length} wake{nEs.length!==1?"s":""}</span>
                {nightFeedMl>0&&<span style={{background:"rgba(212,168,85,0.2)",color:C.gold,fontFamily:"monospace",fontSize:12,padding:"2px 8px",borderRadius:99}}>{nightFeedMl}ml total</span>}
              </div>
              {stretches.length>0&&(
                <>
                  <div style={{fontSize:10,fontFamily:"monospace",color:"#6a5880",textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:6}}>Stretches between wakes</div>
                  {stretches.map((s,i)=>(
                    <div key={i} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"7px 10px",background:"rgba(255,255,255,0.04)",borderRadius:10,border:"1px solid #3a2e50",marginBottom:5}}>
                      <div>
                        <div style={{fontSize:12,color:"#d8cce8"}}>{s.from} → {s.to}</div>
                        <div style={{fontSize:10,fontFamily:"monospace",color:"#6a5880",marginTop:2}}>{fmt12(s.toTime)}{s.feed?` · ${s.feed}ml`:""}</div>
                      </div>
                      <span style={{fontFamily:"'Playfair Display',serif",fontSize:18,color:s.mins>=180?"#6fa898":s.mins>=120?"#d4a855":"#c9705a",fontWeight:700}}>{hm(s.mins)}</span>
                    </div>
                  ))}
                </>
              )}
              {stretches.length===0&&nEs.length===0&&<div style={{fontSize:12,color:"#6a5880",fontFamily:"monospace",textAlign:"center",padding:"4px 0"}}>No night wakes logged</div>}
            </div>
            <div style={{display:"flex",gap:8}}>
              <button onClick={copyReport} style={{flex:1,padding:"11px",borderRadius:99,border:`1px dashed ${C.rose}`,background:"none",color:C.ter,fontSize:13,cursor:"pointer",fontFamily:"inherit",fontWeight:500}}>{copied?"✓ Copied!":"📋 Copy Report"}</button>
              <button onClick={()=>setModal(null)} style={{flex:1,padding:"11px",borderRadius:99,border:"none",background:C.blush,color:C.mid,fontSize:13,cursor:"pointer",fontFamily:"inherit",fontWeight:600}}>Done</button>
            </div>
          </Sheet>
        );
      })()}

    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
