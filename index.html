const minDiff = (s,e) => { if(!s||!e)return 0; const[sh,sm]=s.split(":").map(Number),[eh,em]=e.split(":").map(Number); return Math.max(0,eh*60+em-sh*60-sm); };
const timeVal = e => { const t=e.time||e.start||"00:00"; const[h,m]=t.split(":").map(Number); return h*60+m; };

function getAwakeWindows(entries) {
  // Daytime wake windows: wake-up → nap1, nap1-end → nap2, nap2-end → bedtime etc.
  const sorted=[...entries].filter(e=>!e.night).sort((a,b)=>timeVal(a)-timeVal(b));
  const wins=[]; let last=null;
  sorted.forEach(e=>{
    if(e.type==="wake") last=e.time; // morning wake always resets seed
    if(e.type==="nap"){
      if(last && e.start) wins.push({from:last,to:e.start,mins:minDiff(last,e.start)});
      // Only advance last if this nap has an end — otherwise stop (nap still in progress)
      if(e.end) last=e.end;
      else last=null;
    }
    if(e.type==="sleep"&&last){wins.push({from:last,to:e.time,mins:minDiff(last,e.time),bed:true});last=null;}
  });
  return wins.filter(w=>w.mins>0);
}

function getNightWindows(entries) {
  // Night stretches: from one wake to the next
  const night=[...entries].filter(e=>e.night).sort((a,b)=>timeVal(a)-timeVal(b));
  const wins=[];
  for(let i=1;i<night.length;i++){
    let mins=minDiff(night[i-1].time,night[i].time);
    if(mins<=0) mins+=720; // cross-midnight
    if(mins>0) wins.push({from:night[i-1].time,to:night[i].time,mins,night:true});
  }
  return wins;
}

function PinPad({value, onChange, onComplete}){
  const digits = [1,2,3,4,5,6,7,8,9,null,0,"⌫"];
  function tap(d){
    if(d==="⌫"){ onChange(value.slice(0,-1)); return; }
    if(d===null) return;
    const next = value + String(d);
    if(next.length > 4) return;
    onChange(next);
    if(next.length===4 && onComplete) onComplete(next);
  }
  return (
    <div>
      <div style={{display:"flex",gap:12,justifyContent:"center",marginBottom:24}}>
        {[0,1,2,3].map(i=>(
          <div key={i} style={{width:18,height:18,borderRadius:"50%",background:value.length>i?C.ter:C.blush,transition:"background 0.15s"}}/>

function normalCDF(z) {
  const t = 1 / (1 + 0.2316419 * Math.abs(z));
  const poly = t*(0.319381530 + t*(-0.356563782 + t*(1.781477937 + t*(-1.821255978 + t*1.330274429))));
  const p = 1 - (1/Math.sqrt(2*Math.PI)) * Math.exp(-0.5*z*z) * poly;
  return z >= 0 ? p : 1 - p;
}

function getPercentile(kg, ageMonths, sex) {
  const table = sex === "girl" ? WHO_LMS_GIRLS : WHO_LMS_BOYS;
  const mo = Math.min(Math.round(ageMonths), 24);
  if (mo < 0) return null;
  const row = table[mo];
  if (!row) return null;
  const [, L, M, S] = row;
  let z;
  if (Math.abs(L) < 0.0001) {
    z = Math.log(kg / M) / S;
  } else {
    z = (Math.pow(kg / M, L) - 1) / (L * S);
  }
  z = Math.max(-3.5, Math.min(3.5, z));
  const pct = normalCDF(z) * 100;
  return Math.round(pct * 10) / 10;
}

function percentileColor(p) {
  if (p == null) return C.lt;
  if (p < 2 || p > 98) return "#e8574a";
  if (p < 9 || p > 91) return C.ter;
  if (p < 25 || p > 75) return C.gold;
  return C.mint;
}

function ordinal(p) {
  if (p == null) return "—";
  const n = Math.round(p);
  const s = ["th","st","nd","rd"], v = n % 100;
  return n + (s[(v-20)%10] || s[v] || s[0]);
}

function percentileNote(p) {
  if (p == null) return "";
  if (p < 2) return "Below 2nd — discuss with your health visitor";
  if (p < 9) return "Between 2nd–9th — monitor with your health visitor";
  if (p > 98) return "Above 98th — discuss with your health visitor";
  if (p > 91) return "Between 91st–98th — mention at next check-up";

}

function calcAge(dob) {
  if (!dob) return null;
  const birth = new Date(dob + "T00:00:00");
  const today = new Date();
  const totalDays = Math.floor((today - birth) / (1000*60*60*24));
  if (totalDays < 0) return null;
  const totalWeeks = Math.floor(totalDays / 7);
  let months = (today.getFullYear() - birth.getFullYear()) * 12 + (today.getMonth() - birth.getMonth());
  let afterMonths = new Date(birth);
  afterMonths.setMonth(afterMonths.getMonth() + months);
  if (afterMonths > today) { months--; afterMonths.setMonth(afterMonths.getMonth() - 1); }
  const daysAfterMonths = Math.floor((today - afterMonths) / (1000*60*60*24));
  const weeksAfterMonths = Math.floor(daysAfterMonths / 7);
  const remainingDays = daysAfterMonths % 7;
  return { months, weeksAfterMonths, remainingDays, totalWeeks, totalDays };
}

  // ── Merge remote children into local — keeps local children, adds/updates remote ones ──
  // Used for blended families: each parent's children are preserved, remote ones merged in
  function mergeChildren(localCh, remoteCh) {
    // Start with all local children
    const merged = {...localCh};
    // Add or update with remote children (remote wins on conflict for same id)
    Object.entries(remoteCh).forEach(([id, child]) => {
      if(!merged[id]) {
        // New child from remote — add it
        merged[id] = child;
      } else {
        // Same child exists locally — merge days (union), keep most recent other fields
        const localDays = merged[id].days || {};
        const remoteDays = child.days || {};
        const mergedDays = {...localDays};
        Object.entries(remoteDays).forEach(([date, entries]) => {
          if(!mergedDays[date] || entries.length > (mergedDays[date]||[]).length) {
            mergedDays[date] = entries;
          }
        });
        merged[id] = {...child, days: mergedDays};
      }
    });
    return merged;
  }

              return {...prev, [childId]: {...remoteChild, id: childId}};
            }
            // Merge days
            const mergedDays = {...(existing.days||{})};
            Object.entries(remoteChild.days||{}).forEach(([date, entries]) => {

                mergedDays[date] = entries;
              }
            });

  // ── Per-child sync: join a child by its code (partner flow) ──
  async function joinChildByCode(code) {
    if(!window._fb) return {ok:false, error:"Not connected"};
    const {db, doc, getDoc} = window._fb;
    const clean = code.trim().toUpperCase();
    if(clean.length !== 6) return {ok:false, error:"Code must be 6 characters"};
    try {
      const snap = await getDoc(doc(db,"child_syncs",clean));
      if(!snap.exists()) return {ok:false, error:"Code not found — ask the other parent to check"};
      const d = snap.data();
      const childId = d.childId;
      if(!childId) return {ok:false, error:"Invalid sync code"};
      // If we don't have this child yet, add it
      setChildren(prev => {
        if(prev[childId]) return prev; // already have it
        let remoteChild = {};
        try{ remoteChild = d.child ? JSON.parse(d.child) : {}; }catch{}
        return {...prev, [childId]: {...remoteChild, id: childId}};
      });
      setChildSyncCodes(prev => ({...prev, [childId]: clean}));
      subscribeToChildSync(childId, clean);
      trackEvent("child_sync_joined");
      return {ok:true, childName: d.childName || "child"};
    } catch(e) { return {ok:false, error:"Something went wrong — please try again"}; }
  }

  function unlinkChild(childId) {

      delete childSubsRef.current[childId];

  // ── AGE-ADAPTIVE STAGE ──
  function getAgeStage(){
    if(!age) return null;

    if(w<6)   return{stage:"newborn",label:"Newborn",weeks:w,feedUnit:"ml",showSolids:false,napGoal:"4-6 naps",feedGoal:"8-12 feeds/day",nightNote:"Wake every 2-3h is normal",tip:"Tiny tummy — feed on demand, log every feed."};

    return      {stage:"toddler",label:"Toddler",weeks:w,feedUnit:"portion",showSolids:true,napGoal:"1 nap",feedGoal:"3 meals + snacks",nightNote:"Should sleep through",tip:"Nap may drop around 2.5–3 years."};
  }
  const ageStage = getAgeStage();

  const dayKeys=Object.keys(days).sort();
  const displayDayKeys=[...dayKeys].reverse();
  const entries=days[selDay]||[];
  // dayE preserves stored array order (respects drag-and-drop reordering)
  // but falls back to time-sort for entries added before drag support
  const dayE=entries.filter(e=>!e.night);
  const nightE=entries.filter(e=>e.night).sort((a,b)=>timeVal(a)-timeVal(b));
  const totalMl=entries.filter(e=>e.type==="feed").reduce((s,f)=>s+(f.amount||0),0);
  const naps=dayE.filter(e=>e.type==="nap");
  const napMins=naps.reduce((s,n)=>s+minDiff(n.start,n.end),0);
  const wins=getAwakeWindows(entries);
  const last7=dayKeys.slice(-7);
  const wStats=last7.map(d=>{
    const es=days[d]||[];
    const ml=es.filter(e=>e.type==="feed").reduce((s,f)=>s+(f.amount||0),0);
    const ns=es.filter(e=>!e.night&&e.type==="nap");
    return{date:d,ml,napM:ns.reduce((s,n)=>s+minDiff(n.start,n.end),0),naps:ns.length,nightW:es.filter(e=>e.night).length};
  });
  const avgMl=last7.length?Math.round(wStats.reduce((s,x)=>s+x.ml,0)/last7.length):0;
  const maxMl=Math.max(...wStats.map(x=>x.ml),1);
  const maxNapBar=Math.max(...wStats.map(x=>x.napM),1);
  const chunk=(arr,n)=>{const r=[];for(let i=0;i<arr.length;i+=n)r.push(arr.slice(i,i+n));return r;};
  const trendWeeks=chunk(dayKeys,7);
  const weekAvgs=trendWeeks.map(wk=>{
    const mlA=wk.map(d=>(days[d]||[]).filter(e=>e.type==="feed").reduce((s,f)=>s+(f.amount||0),0));
    const napA=wk.map(d=>{const ns=(days[d]||[]).filter(e=>e.type==="nap"&&!e.night);return ns.reduce((s,n)=>s+minDiff(n.start,n.end),0);});
    const nightA=wk.map(d=>(days[d]||[]).filter(e=>e.night).length);
    return{label:`${fmtDate(wk[0])}–${fmtDate(wk[wk.length-1])}`,days:wk.length,avgMl:avgArr(mlA),avgNap:avgArr(napA),avgNight:avgArr(nightA)};
  });
  const tLast=weekAvgs[weekAvgs.length-1];
  const tPrev=weekAvgs[weekAvgs.length-2];
  const mlVals=dayKeys.map(d=>(days[d]||[]).filter(e=>e.type==="feed").reduce((s,f)=>s+(f.amount||0),0));
  const napVals=dayKeys.map(d=>{const ns=(days[d]||[]).filter(e=>e.type==="nap"&&!e.night);return ns.reduce((s,n)=>s+minDiff(n.start,n.end),0);});

  function arrow(curr,prev){
    if(prev==null)return null;

  function getWakeWindow(ageWeeks) {
    if (ageWeeks < 6)  return { min:45,  max:60,  label:"45–60 min" };
    if (ageWeeks < 10) return { min:60,  max:90,  label:"1–1.5 hrs" };
    if (ageWeeks < 16) return { min:75,  max:105, label:"1.25–1.75 hrs" };
    if (ageWeeks < 20) return { min:90,  max:120, label:"1.5–2 hrs" };
    if (ageWeeks < 24) return { min:105, max:135, label:"1.75–2.25 hrs" };

    return { min:210, max:270, label:"3.5–4.5 hrs" };
  }

  function addMinutes(time, mins) {
    const [h,m] = time.split(":").map(Number);
    const total = h*60 + m + mins;
    const hh = Math.floor(total/60)%24;
    const mm = total%60;
    return `${String(hh).padStart(2,"0")}:${String(mm).padStart(2,"0")}`;
  }

  function minutesUntil(timeStr) {
    if (!timeStr) return null;
    const now = new Date();
    const [h,m] = timeStr.split(":").map(Number);
    const target = new Date();
    target.setHours(h, m, 0, 0);
    let diff = Math.round((target - now) / 60000);
    if (diff < 0) diff = 0;
    return diff;
  }

  function predictNextNap() {
    const ageWeeks = age ? age.totalWeeks : null;
    if (!ageWeeks || !selDay) return null;

    // Don't predict next nap if bedtime has already been logged
    const hasBedtime = (days[selDay]||[]).some(e => e.type==="sleep" && !e.night);
    if (hasBedtime) return null;

    let wakeWindowMin, wakeWindowMax, sourceLabel;
    const loggedDays = Object.keys(days).filter(d => (days[d]||[]).some(e=>!e.night)).sort();
    // Only use personalised windows from days that actually have nap data
    const napDays = loggedDays.filter(d => (days[d]||[]).some(e => e.type==="nap" && !e.night && e.start && e.end));

    if (napDays.length < 7) {
      const ww = getWakeWindow(ageWeeks);
      wakeWindowMin = ww.min;
      wakeWindowMax = ww.max;
      sourceLabel = `age-appropriate wake windows for ${age.months}mo`;
    } else {
      const recent = napDays.slice(-7);
      let windows = [];
      recent.forEach(d => {
        const ws = getAwakeWindows(days[d]||[]);
        ws.forEach(w => { if (w.mins && w.mins >= 20) windows.push(w.mins); }); // filter out junk <20min windows
      });
      if (windows.length < 3) {
        // Not enough real wake window data, fall back to age defaults
        const ww = getWakeWindow(ageWeeks);
        wakeWindowMin = ww.min;
        wakeWindowMax = ww.max;
        sourceLabel = `age-appropriate wake windows for ${age.months}mo`;
      } else {
        // Trim outliers (top & bottom 10%) for a clean average
        const sorted2 = [...windows].sort((a,b)=>a-b);
        const trim = Math.max(1, Math.floor(sorted2.length * 0.1));
        const trimmed = sorted2.slice(trim, sorted2.length - trim);
        const avgWindow = Math.round(trimmed.reduce((a,b)=>a+b,0) / trimmed.length);
        wakeWindowMin = Math.max(30, Math.round(avgWindow * 0.88));
        wakeWindowMax = Math.max(wakeWindowMin + 15, Math.round(avgWindow * 1.12));
        sourceLabel = `your avg wake window (${avgWindow}min) · last 7 days`;
      }
    }

    const sorted = [...(days[selDay]||[])].filter(e=>!e.night).sort((a,b)=>timeVal(a)-timeVal(b));
    if (!sorted.length) return null;

    let lastAwakeStart = null;
    sorted.forEach(function(e) {
      if (e.type==="wake") lastAwakeStart = e.time;
      if (e.type==="nap" && e.end) lastAwakeStart = e.end;
    });
    if (!lastAwakeStart) return null;

    const napStart_min = addMinutes(lastAwakeStart, wakeWindowMin);
    const napStart_max = addMinutes(lastAwakeStart, wakeWindowMax);

    // If the nap window max has already passed, don't show nap prediction
    const now = new Date();
    const nowMins = now.getHours()*60 + now.getMinutes();
    const [maxH, maxM] = napStart_max.split(":").map(Number);
    const napMaxMins = maxH*60 + maxM;
    if (nowMins > napMaxMins) return null;

    // Suppress nap if it's too close to bedtime — gap must be at least one full wake window max
    const bed = bedtimePrediction();
    if (bed) {
      const [bh, bm] = bed.time.split(":").map(Number);
      const bedMins = bh*60 + bm;
      const [minH, minM] = napStart_min.split(":").map(Number);
      const napMinMins = minH*60 + minM;
      if (bedMins - napMinMins < wakeWindowMax) return null;
    }

    return { napStart_min, napStart_max, wakeWindowMin, wakeWindowMax, sourceLabel, lastAwakeStart };
  }

  // ── SLEEP ANALYTICS (now correctly inside App, with access to state) ──

  function sleepScore() {
    const today = days[selDay] || [];
    const todayNaps = today.filter(e => e.type === "nap" && !e.night);
    const napMinutes = todayNaps.reduce((s, n) => s + minDiff(n.start, n.end), 0);
    const nightWakes = today.filter(e => e.night).length;
    const ageWeeks = age ? age.totalWeeks : null;
    const ww = ageWeeks ? getWakeWindow(ageWeeks) : null;

    let score = 100;
    // Penalise if nap time is too short for age
    const idealNapMin = ww ? Math.min(ww.min * todayNaps.length, 240) : 120;
    if (napMinutes < idealNapMin) score -= 20;
    else if (napMinutes > 240) score -= 10;
    // Night wakes
    if (nightWakes > 3) score -= 20;
    else if (nightWakes === 0 && todayNaps.length > 0) score += 5;
    // Bonus: wake window data exists
    const dayWins = getAwakeWindows(today);
    if (dayWins.length > 0) score += 5;
    return Math.max(0, Math.min(100, score));
  }

  function sleepScoreColor(score) {
    if (score >= 80) return C.mint;
    if (score >= 55) return C.gold;
    return C.ter;
  }

  function sleepScoreLabel(score) {
    if (score >= 80) return "Great day";
    if (score >= 55) return "Good day";
    if (score >= 35) return "Tricky day";
    return "Rough day";
  }

  function bedtimePrediction() {
    const today = days[selDay] || [];
    const todayNaps = today.filter(e => e.type === "nap" && !e.night);
    if (!todayNaps.length) return null;
    if (!age) return null;
    const ww = getWakeWindow(age.totalWeeks);
    const lastNap = todayNaps[todayNaps.length - 1];
    if (!lastNap.end) return null;

    // ── 1. Learn average bedtime from last 14 days of logged data ──
    const pastDays = Object.keys(days).sort().filter(d => d !== selDay).slice(-14);
    const loggedBedtimes = pastDays
      .map(d => (days[d]||[]).find(e => e.type==="sleep" && !e.night))
      .filter(Boolean)
      .map(e => { const [h,m] = e.time.split(":").map(Number); return h*60+m; });

    let baseBedMins;
    let bedSource;
    if (loggedBedtimes.length >= 3) {
      // Use trimmed average (drop outliers)
      const sorted = [...loggedBedtimes].sort((a,b)=>a-b);
      const trim = Math.floor(sorted.length * 0.15);
      const trimmed = sorted.slice(trim, sorted.length - trim);
      baseBedMins = Math.round(trimmed.reduce((a,b)=>a+b,0) / trimmed.length);
      bedSource = "avg";
    } else {
      // Fall back to last nap end + age wake window
      const [lh,lm] = lastNap.end.split(":").map(Number);
      baseBedMins = lh*60+lm + ww.max;
      bedSource = "age";
    }

    // ── 2. Adjust for last nap quality ──
    const lastNapMins = minDiff(lastNap.start, lastNap.end);
    let adjustMins = 0;
    let adjustReason = null;

    if (lastNapMins < 20) {
      // Very short nap — baby is likely overtired, pull bedtime earlier
      adjustMins = -30;
      adjustReason = `Last nap only ${lastNapMins}min — moved earlier to avoid overtiredness`;
    } else if (lastNapMins < 40) {
      adjustMins = -15;
      adjustReason = `Short last nap (${lastNapMins}min) — slightly earlier bedtime`;
    } else if (lastNapMins > 90) {
      // Long late nap — baby may not be tired, push slightly later
      adjustMins = +15;
      adjustReason = `Long last nap (${lastNapMins}min) — bedtime shifted slightly later`;
    }

    // ── 3. Floor: no earlier than last nap end + min wake window
    //    Cap:   no later than last nap end + max wake window (biology wins over history)
    const [lh2,lm2] = lastNap.end.split(":").map(Number);
    const lastNapEndMins = lh2*60+lm2;
    const earliestBed = lastNapEndMins + ww.min;
    const latestBed   = lastNapEndMins + ww.max;
    const finalMins = Math.min(latestBed, Math.max(earliestBed, baseBedMins + adjustMins));

    const hh = Math.floor(finalMins/60)%24;
    const mm = finalMins%60;
    const bedTime = `${String(hh).padStart(2,"0")}:${String(mm).padStart(2,"0")}`;

    return { time: bedTime, adjustReason, bedSource, baseBedMins, adjustMins };
  }

  function sleepAdvice() {
    const today = days[selDay] || [];
    const todayNaps = today.filter(e => e.type === "nap" && !e.night);
    const napMinutes = todayNaps.reduce((s, n) => s + minDiff(n.start, n.end), 0);
    const hrs = (napMinutes / 60).toFixed(1);
    if (napMinutes === 0) return "No naps logged yet today.";
    if (napMinutes < 90) return `Baby napped ${hrs}h today — consider an earlier bedtime to avoid overtiredness.`;
    if (napMinutes > 210) return `Baby napped ${hrs}h today — a slightly later bedtime may help build sleep pressure.`;
    return `Baby napped ${hrs}h today — sleep pressure looks well balanced. ✓`;
  }

  function tiredDetection() {
    const today = days[selDay] || [];
    const todayNaps = today.filter(e => e.type === "nap" && !e.night);

    if (napMinutes < 90) return "⚠️ May be overtired today";

  // ── FEATURE 1: "Is This Normal?" sleep comparison ──
  function napNormalRange() {
    if (!age) return null;
    const w = age.totalWeeks;
    // [min, max] in minutes, label
    if (w < 4)  return { min:480, max:960, label:"8–16 hrs (inc. night)" };
    if (w < 8)  return { min:240, max:480, label:"4–8 hrs" };
    if (w < 13) return { min:180, max:360, label:"3–6 hrs" };
    if (w < 26) return { min:120, max:300, label:"2–5 hrs" };
    if (w < 39) return { min:120, max:240, label:"2–4 hrs" };
    if (w < 52) return { min:90,  max:180, label:"1.5–3 hrs" };
    if (w < 78) return { min:60,  max:120, label:"1–2 hrs" };
    return { min:60, max:90, label:"1–1.5 hrs" };
  }

  function sleepNormalCard() {
    const today = days[selDay] || [];
    const naps = today.filter(e => e.type === "nap" && !e.night);
    if (!naps.length) return null;
    const totalMins = naps.reduce((s,n) => s + minDiff(n.start, n.end), 0);
    const range = napNormalRange();
    if (!range) return null;
    let status, color, bg, icon, message;
    if (totalMins < range.min) {
      status = "below"; color = C.ter; bg = "#fff3f0";
      icon = "⚠️";
      const gap = range.min - totalMins;
      message = gap > 60
        ? "Naps are quite low today. Consider an earlier bedtime to prevent overtiredness."
        : "Naps are a little low today. An earlier bedtime tonight may help.";
    } else if (totalMins > range.max) {
      status = "above"; color = "#b88a20"; bg = "#fffbf0";
      icon = "💤";
      message = "Nap time is higher than typical today. A slightly later bedtime can help build sleep pressure for the night.";
    } else {
      status = "normal"; color = C.mint; bg = "#f0faf6";
      icon = "✓";
      message = "Nap time is within a healthy range for this age. Well done!";
    }
    return { totalMins, range, status, color, bg, icon, message };
  }

  // ── FEATURE 2: Sleep regression / pattern change detection ──
  function regressionCheck() {
    const dk = Object.keys(days).sort();
    if (dk.length < 5) return null;
    const recent3 = dk.slice(-3);
    const prev4 = dk.slice(-7, -3);
    if (!prev4.length) return null;

    const avgNightWakes = arr => arr.reduce((s,d) => s + (days[d]||[]).filter(e=>e.night).length, 0) / arr.length;
    const avgNapMins = arr => arr.reduce((s,d) => {
      const ns = (days[d]||[]).filter(e=>e.type==="nap"&&!e.night);
      return s + ns.reduce((ss,n) => ss + minDiff(n.start,n.end), 0);
    }, 0) / arr.length;

    const recentWakes = avgNightWakes(recent3);
    const prevWakes   = avgNightWakes(prev4);
    const recentNaps  = avgNapMins(recent3);
    const prevNaps    = avgNapMins(prev4);

    const alerts = [];

    if (recentWakes > prevWakes + 1.2) {
      alerts.push({
        title: "More night wakes recently",
        body: "Night wakes have increased over the last 3 days. This can happen during developmental leaps or sleep regressions — most phases pass within 1–2 weeks. Keeping bedtime consistent really helps.",
        icon: "🌙"
      });
    }
    if (prevNaps > 30 && recentNaps < prevNaps * 0.65) {
      alerts.push({
        title: "Shorter naps this week",
        body: "Naps have been shorter than usual. Baby may be going through a developmental phase or nap transition. Consistent wake windows and a calming pre-nap routine can help.",
        icon: "😴"
      });
    }
    if (prevNaps > 0 && recentNaps > prevNaps * 1.5 && recentNaps - prevNaps > 40) {
      alerts.push({
        title: "Naps have lengthened",
        body: "Baby is sleeping more than usual during the day. This is often a growth spurt or recovery from overtiredness. Watch that long naps don't push bedtime too late.",
        icon: "📈"
      });
    }
    return alerts.length ? alerts : null;
  }

  // ── FEATURE 3: Suggested tomorrow schedule ──
  function tomorrowSchedule() {
    if (!age) return null;
    const w = age.totalWeeks;
    const ww = getWakeWindow(w);

    // Figure out expected wake time from recent data
    const dk = Object.keys(days).sort().slice(-7);
    const wakeMins = dk.map(d => {
      const e = (days[d]||[]).find(x => x.type==="wake" && !x.night);
      if (!e) return null;
      const [h,m] = e.time.split(":").map(Number);
      return h*60+m;
    }).filter(v => v !== null);
    const baseWake = wakeMins.length ? Math.round(avgArr(wakeMins)) : 7*60;

    // Nap count by age
    let napCount;
    if (w < 13) napCount = 4;
    else if (w < 26) napCount = 3;
    else if (w < 39) napCount = 2;
    else if (w < 65) napCount = 2;
    else napCount = 1;

    // Use personalised nap length from recent data if available
    const recentNapMins = dk.map(d => {
      const ns = (days[d]||[]).filter(e => e.type==="nap"&&!e.night);
      return ns.length ? ns.reduce((s,n) => s+minDiff(n.start,n.end),0)/ns.length : null;
    }).filter(v => v !== null);
    const avgNapLen = recentNapMins.length ? Math.round(avgArr(recentNapMins)) : 60;

    // Learn average bedtime
    const bedMins = dk.map(d => {
      const e = (days[d]||[]).find(x => x.type==="sleep"&&!x.night);
      if (!e) return null;
      const [h,m] = e.time.split(":").map(Number); return h*60+m;
    }).filter(v => v !== null);
    const avgBedtime = bedMins.length ? Math.round(avgArr(bedMins)) : 19*60;

    const mtp = m => {
      const h = Math.floor(m/60)%24, mm = m%60;
      return `${String(h).padStart(2,"0")}:${String(mm).padStart(2,"0")}`;
    };

    const schedule = [];
    schedule.push({ label: "Wake up", time: mtp(baseWake), icon: "☀️" });

    let cursor = baseWake + ww.min + Math.round((ww.max-ww.min)/2);
    for (let i = 0; i < napCount; i++) {
      const napEnd = cursor + Math.min(avgNapLen, i===0?120:90);
      schedule.push({ label: `Nap ${i+1}`, time: `${mtp(cursor)} – ${mtp(napEnd)}`, icon: "😴" });
      cursor = napEnd + ww.min + Math.round((ww.max-ww.min)/2);
      if (cursor >= avgBedtime - 30) break;
    }
    schedule.push({ label: "Bedtime", time: mtp(avgBedtime), icon: "🌙" });
    return schedule;
  }

  // ── FEEDS: Day vs total intake with NHS-aligned ranges + sleep-linked advice ──
  function feedCard() {
    if (!age) return null;
    const w = age.totalWeeks;
    const today = days[selDay] || [];

    const allMilkFeeds  = today.filter(e => e.type==="feed" && e.feedType!=="solids");
    const dayMilkFeeds  = allMilkFeeds.filter(e => !e.night);
    const nightMilkFeeds= allMilkFeeds.filter(e => e.night);
    const totalMl   = allMilkFeeds.reduce((s,f)  => s+(f.amount||0), 0);
    const dayMl     = dayMilkFeeds.reduce((s,f)  => s+(f.amount||0), 0);
    const nightMl   = nightMilkFeeds.reduce((s,f)=> s+(f.amount||0), 0);
    if (!totalMl) return null;

    // ── NHS-aligned age-based targets ──
    // Day target = portion of total expected during waking hours (typically ~70-80%)
    // Total target = full 24h recommended intake
    let totalMin, totalMax, totalLabel, totalTarget, dayTarget, dayMin, targetFeeds, nhsNote;
    if (w < 4) {
      totalMin=400; totalMax=700; totalTarget=550; dayTarget=400; dayMin=280;
      targetFeeds=8; totalLabel="400–700ml/day (NHS)";
      nhsNote="Newborns feed 8–12 times in 24h. Frequent feeding builds your supply and helps baby regain birth weight.";
    } else if (w < 8) {
      totalMin=500; totalMax=800; totalTarget=650; dayTarget=480; dayMin=350;
      targetFeeds=7; totalLabel="500–800ml/day (NHS)";
      nhsNote="At this age babies typically feed every 2.5–3.5h. Consistent day feeds help night stretches extend naturally.";
    } else if (w < 13) {
      totalMin=600; totalMax=900; totalTarget=750; dayTarget=560; dayMin=400;
      targetFeeds=6; totalLabel="600–900ml/day (NHS)";
      nhsNote="NHS recommends ~150ml per kg/day. Stronger day feeds often reduce hunger-driven night waking.";
    } else if (w < 26) {
      totalMin=700; totalMax=1000; totalTarget=850; dayTarget=650; dayMin=480;
      targetFeeds=5; totalLabel="700–1000ml/day (NHS)";
      nhsNote="Babies 3–6 months benefit from full day feeds. Low day intake is a common cause of frequent night waking at this age.";
    } else if (w < 39) {
      totalMin=500; totalMax=800; totalTarget=700; dayTarget=560; dayMin=380;
      targetFeeds=4; totalLabel="500–800ml/day + solids (NHS)";
      nhsNote="With solids introduced, milk remains the main nutrition. Offering milk before solids helps maintain day intake.";
    } else if (w < 52) {
      totalMin=400; totalMax=700; totalTarget=600; dayTarget=480; dayMin=320;
      targetFeeds=3; totalLabel="400–700ml/day + solids (NHS)";
      nhsNote="At 9–12 months, 3 milk feeds per day alongside meals is typical. Solids shouldn't displace milk entirely.";
    } else {
      totalMin=300; totalMax=500; totalTarget=400; dayTarget=320; dayMin=200;
      targetFeeds=2; totalLabel="300–500ml/day (NHS)";
      nhsNote="After 12 months, cow's milk can replace formula. 300–400ml/day supports calcium needs alongside a varied diet.";
    }

    // ── Night wake context from recent history ──
    const recentDays = Object.keys(days).sort().slice(-7);
    const avgNightWakes = recentDays.length
      ? Math.round((recentDays.reduce((s,d) => s+(days[d]||[]).filter(e=>e.night).length, 0) / recentDays.length)*10)/10
      : null;
    const hasFrequentNightWakes = avgNightWakes !== null && avgNightWakes >= 2;

    // ── Time-of-day pace (for day feeds) ──
    const nowMins = new Date().getHours()*60 + new Date().getMinutes();
    const wakeEntry = today.find(e=>e.type==="wake"&&!e.night);
    const bedEntry  = today.find(e=>e.type==="sleep"&&!e.night);
    const sugBed    = bedtimePrediction();
    const wakeMin   = wakeEntry ? timeVal(wakeEntry) : 7*60;
    const bedMin    = bedEntry  ? timeVal(bedEntry) : sugBed ? timeVal(sugBed.time) : 19*60;
    const dayLenMins = Math.max(bedMin - wakeMin, 60);
    const elapsedMins = Math.min(Math.max(nowMins - wakeMin, 0), dayLenMins);
    const dayFraction = elapsedMins / dayLenMins;
    const remainingMins = Math.max(bedMin - nowMins, 0);
    const remainingFeeds = Math.max(Math.round(remainingMins / (dayLenMins / targetFeeds)), 0);

    // ── Classify total and day intake independently ──
    const totalOk   = totalMl >= totalMin;
    const totalHigh = totalMl > totalMax;
    const dayOk     = dayMl >= dayMin;
    const dayShortfall = Math.max(dayTarget - dayMl, 0);
    const totalShortfall = Math.max(totalTarget - totalMl, 0);

    // ── Determine primary status and messages ──
    let status, color, bg, icon, statusMsg, sleepLink=null;

    if (dayFraction < 0.2) {
      status="early"; color=C.mint; bg="#f0faf6"; icon="☀️";
      statusMsg=`${dayMl}ml so far today — the day is just getting started.`;

    } else if (totalHigh) {
      status="high"; color="#b88a20"; bg="#fffbf0"; icon="📈";
      statusMsg=`Total intake is above average at ${totalMl}ml — common during growth spurts.`;

    } else if (totalOk && dayOk) {
      status="ok"; color=C.mint; bg="#f0faf6"; icon="✓";
      statusMsg=`Feeds are well balanced — ${dayMl}ml during the day and ${nightMl}ml overnight.`;

    } else if (totalOk && !dayOk && nightMl > 0) {
      // KEY SCENARIO: total is fine but too much shifted to night
      status="night-heavy"; color="#8a5cf6"; bg="#f5f0ff"; icon="🌙";
      const shift = Math.round(nightMl * 0.4); // suggest shifting some night intake to day
      statusMsg=`Total intake looks healthy (${totalMl}ml), but daytime feeds are lower than ideal — ${dayMl}ml of a ~${dayTarget}ml day target.`;
      if (hasFrequentNightWakes) {
        sleepLink = {
          icon:"💤",
          title:"May be linked to night waking",
          body:`Baby is averaging ${avgNightWakes} night wake${avgNightWakes!==1?"s":""}/night. When day feeds are lower, babies often compensate by feeding more at night to meet their calorie needs. Gradually increasing daytime feed amounts — even by ${shift}ml spread across feeds — can help shift calories to the day and reduce hunger-driven waking.`
        };
      } else {
        sleepLink = {
          icon:"💡",
          body:`Shifting more intake to daytime can help consolidate night sleep. Try offering slightly larger feeds earlier in the day when baby is most alert and hungry.`
        };
      }

    } else if (!totalOk && !dayOk) {
      // Both low
      const diff = Math.round((dayFraction > 0.3 ? dayTarget * dayFraction : 0) - dayMl);
      status="low"; color=C.ter; bg="#fff3f0"; icon="⚠️";
      if (remainingMins < 90) {
        statusMsg=`${totalShortfall}ml below daily target with bedtime approaching. If baby seems hungry, offer a feed now.`;
      } else if (dayFraction > 0.5) {
        statusMsg=`Day feeds are running low — ${dayMl}ml so far against a ~${dayTarget}ml daytime target.`;
      } else {
        statusMsg=`Intake is a little low (${totalMl}ml total). One quiet day isn't usually concerning — offer feeds when baby shows hunger cues.`;
      }
      if (hasFrequentNightWakes && totalShortfall > 100) {
        sleepLink = {
          icon:"💤",
          title:"Could affect night sleep",
          body:`With ${avgNightWakes} average night wakes and low day intake, hunger may be a factor. The NHS recommends ~${totalTarget}ml/day at this age — topping up during the day can help baby sleep longer stretches.`
        };
      }

    } else {
      status="ok"; color=C.mint; bg="#f0faf6"; icon="✓";
      statusMsg=`Milk intake is within the NHS recommended range for this age.`;
    }

    // ── Smart suggestions (timing/distribution — daytime only) ──
    const suggestions = [];
    if (dayMilkFeeds.length >= 2) {
      const sorted = [...dayMilkFeeds].sort((a,b)=>timeVal(a)-timeVal(b));
      const amounts = sorted.map(f=>f.amount||0);
      const avgFeed = dayMl / dayMilkFeeds.length;

      // Top-up suggestion if behind and feeds remain
      if ((status==="low" || status==="night-heavy") && remainingFeeds > 0 && dayShortfall > 80) {
        const topUp = Math.round(dayShortfall / remainingFeeds);
        suggestions.push({ icon:"🍼", body:`${remainingFeeds} day feed${remainingFeeds!==1?"s":""} left. Adding ~${topUp}ml to each could reach the daytime goal.` });
      }

      // Uneven distribution
      const maxF=Math.max(...amounts), minF=Math.min(...amounts);
      if (dayMilkFeeds.length>=3 && maxF>avgFeed*1.5 && minF<avgFeed*0.6) {
        const even = Math.round(dayMl/dayMilkFeeds.length/10)*10;
        suggestions.push({ icon:"⚖️", body:`Day feeds range from ${minF}ml to ${maxF}ml. More consistent feeds of ~${even}ml reduce wind and keep hunger steady.` });
      }

      // Long gap
      for (let i=1;i<sorted.length;i++){
        const gap=timeVal(sorted[i])-timeVal(sorted[i-1]);
        if(gap>(w<13?210:270)){
          const gH=Math.floor(gap/60),gM=gap%60;
          suggestions.push({ icon:"⏰", body:`${gH}h${gM>0?" "+gM+"m":""} gap between ${fmt12(sorted[i-1].time)} and ${fmt12(sorted[i].time)} — shorter gaps help maintain day intake.` });
          break;
        }
      }
    }

    return { totalMl, dayMl, nightMl, totalMin, totalMax, totalLabel, totalTarget, dayTarget, dayMin,
             status, color, bg, icon, statusMsg, sleepLink, suggestions, nhsNote, dayFraction, hasFrequentNightWakes };
  }

  function analyseTrends() {
    const dk = Object.keys(days).sort();
    if (dk.length < 3) return null;
    const recent = dk.slice(-7);

    const wakeTimes = recent.map(d=>{
      const w=(days[d]||[]).find(e=>e.type==="wake"&&!e.night);
      return w?timeVal(w):null;
    }).filter(v=>v!==null);
    const avgWake = wakeTimes.length ? Math.round(avgArr(wakeTimes)) : null;

    const bedTimes = recent.map(d=>{
      const s=(days[d]||[]).find(e=>e.type==="sleep"&&!e.night);
      return s?timeVal(s):null;
    }).filter(v=>v!==null);
    const avgBed = bedTimes.length ? Math.round(avgArr(bedTimes)) : null;

    const napCounts = recent.map(d=>(days[d]||[]).filter(e=>e.type==="nap"&&!e.night).length);
    const avgNaps = napCounts.length ? Math.round(avgArr(napCounts)*10)/10 : null;

    const napMinsArr = recent.map(d=>{
      const ns=(days[d]||[]).filter(e=>e.type==="nap"&&!e.night);
      return ns.reduce((s,n)=>s+minDiff(n.start,n.end),0);
    });
    const avgNapMins = Math.round(avgArr(napMinsArr));

    const nightWakes = recent.map(d=>(days[d]||[]).filter(e=>e.night).length);
    const avgNightWakes = Math.round(avgArr(nightWakes)*10)/10;

    const mlArr = recent.map(d=>(days[d]||[]).filter(e=>e.type==="feed").reduce((s,f)=>s+(f.amount||0),0));
    const avgMlRecent = Math.round(avgArr(mlArr));

    const bedStdDev = bedTimes.length>1 ? Math.round(Math.sqrt(bedTimes.reduce((s,v)=>s+Math.pow(v-avgBed,2),0)/bedTimes.length)) : null;

    const minsToTime = m => {
      const h = Math.floor(m/60)%24;
      const mm = m%60;
      return `${String(h).padStart(2,"0")}:${String(mm).padStart(2,"0")}`;
    };

    const ageWeeks = age ? age.totalWeeks : null;
    const ww = ageWeeks ? getWakeWindow(ageWeeks) : null;

    const insights = [];

    if (avgBed !== null) {
      const bedH = Math.floor(avgBed/60);
      const ideal = bedH < 18 || bedH > 20;
      insights.push({
        type: ideal?"warn":"good",
        icon: ideal?"🌙":"✅",
        title: "Bedtime",
        body: `Average bedtime is ${fmt12(minsToTime(avgBed))}. ${bedH<18?"This is quite early — an earlier bedtime can sometimes cause early morning waking.":bedH>20?"A bedtime after 8pm can make it harder for babies to fall and stay asleep. Aim for 6:30–7:30pm.":"This is in a great range. Consistent 6:30–7:30pm bedtimes help regulate the body clock."}`
      });
      if (bedStdDev !== null && bedStdDev > 30) {
        insights.push({
          type:"warn", icon:"⚠️", title:"Bedtime consistency",
          body:`Bedtime varies by about ${Math.round(bedStdDev)} minutes day to day. More consistency (within 15 minutes) helps baby's circadian rhythm and makes settling easier.`
        });
      }
    }

    if (avgWake !== null) {
      const wakeH = Math.floor(avgWake/60);
      insights.push({
        type: wakeH<6?"warn":wakeH>8?"info":"good",
        icon: wakeH<6?"🌅":"☀️",
        title:"Wake time",
        body:`Average wake-up is ${fmt12(minsToTime(avgWake))}. ${wakeH<6?"Waking before 6am is considered early rising — this could be linked to bedtime being too early, or an overtired baby.":wakeH>8?"A late wake time may push nap and bedtime schedules later. Gently waking by 7–7:30am helps set the day's rhythm.":"A consistent wake time is one of the best tools for improving night sleep."}`
      });
    }

    if (avgNightWakes !== null) {
      insights.push({
        type: avgNightWakes>3?"warn":avgNightWakes>1?"info":"good",
        icon: avgNightWakes>3?"😴":"🌟",
        title:"Night wakes",
        body:`Averaging ${avgNightWakes} night wake${avgNightWakes!==1?"s":""} per night. ${avgNightWakes>3?"Frequent waking can indicate overtiredness, undertiredness, hunger, or a sleep association. Consider reviewing the last awake window before bed.":avgNightWakes>1?"Some night waking is completely normal at this age. Focus on a consistent pre-sleep routine.":"Great night sleep! Fewer wakes suggest good sleep pressure and routine."}`
      });
    }

    if (avgNapMins > 0 && ww) {
      insights.push({
        type:"info", icon:"😴", title:"Nap totals",
        body:`Averaging ${hm(avgNapMins)} of day sleep across ${avgNaps} nap${avgNaps!==1?"s":""}. Appropriate wake windows for this age are ${ww.label}.`
      });
    }

    if (avgMlRecent > 0) {
      insights.push({
        type:"info", icon:"🍼", title:"Feeding",
        body:`Averaging ${avgMlRecent}ml per day over the last 7 days. ${avgMlRecent<400?"This seems low — if you're concerned about intake, speak to your health visitor.":avgMlRecent>1200?"High intake can sometimes indicate comfort feeding rather than hunger.":"Intake looks consistent."}`
      });
    }

    return { insights, avgWake: avgWake!==null?minsToTime(avgWake):null, avgBed: avgBed!==null?minsToTime(avgBed):null, avgNaps, avgNapMins, avgNightWakes, avgMlRecent, days: dk.length };
  }

  // ── SMART PASTE PARSER ──
  function parseTime(str, previousMinutes=null) {
    if (!str) return null;
    str = str.trim().toLowerCase();
    str = str.replace(/(\d+)(st|nd|rd|th)/g,"$1");

    let m = str.match(/(\d{1,2}):(\d{2})\s*(am|pm)?/);
    if (m) {
      let h = parseInt(m[1]), min = parseInt(m[2]);
      const suffix = m[3];
      if (suffix==="pm" && h<12) h+=12;
      if (suffix==="am" && h===12) h=0;
      let total = h*60 + min;
      if (!suffix && previousMinutes!==null && total <= previousMinutes) {
        while (total <= previousMinutes && total < 24*60) total += 12*60;
      }
      total = total % (24*60);
      return `${String(Math.floor(total/60)).padStart(2,"0")}:${String(total%60).padStart(2,"0")}`;
    }

    m = str.match(/(\d{1,2})\s*(am|pm)?/);
    if (m) {
      let h = parseInt(m[1]), min = 0;
      const suffix = m[2];
      if (suffix==="pm" && h<12) h+=12;
      if (suffix==="am" && h===12) h=0;
      let total = h*60 + min;
      if (!suffix && previousMinutes!==null && total <= previousMinutes) {
        while (total <= previousMinutes && total < 24*60) total += 12*60;
      }
      total = total % (24*60);
      return `${String(Math.floor(total/60)).padStart(2,"0")}:${String(total%60).padStart(2,"0")}`;
    }
    return null;
  }

  function parseAmount(str) {
    const m = str.match(/(\d+)\s*ml/i);
    return m ? parseInt(m[1]) : 0;
  }

  function parseTimeRange(str, previousMinutes=null) {
    const sep = str.match(/(.+?)\s*(?:-|–|to)\s*(.+)/i);
    if (!sep) return null;
    const start = parseTime(sep[1], previousMinutes);
    const startMins = start ? timeVal(start) : previousMinutes;
    const end = parseTime(sep[2], startMins);
    if (start && end) return { start, end };
    return null;
  }

  function smartParse(text) {
    const rawLines = text.split(/\n/).map(function(l){return l.trim();}).filter(Boolean);
    const entries = [];
    const warnings = [];
    let lastMinutes = null;

    // Seed lastMinutes from today's existing entries so "9 feed 120" knows 9 = 9am
    const todayEntries = (days[selDay]||[]).filter(e=>!e.night).sort((a,b)=>timeVal(a)-timeVal(b));
    if (todayEntries.length > 0) {
      const first = todayEntries[0];
      lastMinutes = timeVal(first);
    }

    let detectedDate = null;
    // Check for explicit date first
    if (rawLines.length > 0) {
      const dateMatch = rawLines[0].match(/(\d{1,2})[\/\-\.](\d{1,2})[\/\-\.](\d{2,4})/);
      if (dateMatch) {
        const d=dateMatch[1], mo=dateMatch[2], y=dateMatch[3];
        const yr = y.length===2 ? "20"+y : y;
        detectedDate = yr+"-"+mo.padStart(2,"0")+"-"+d.padStart(2,"0");
      }
    }
    // If someone says "today" anywhere in the text, use today's date
    if (!detectedDate && rawLines.some(l => /\btoday\b/i.test(l))) {
      detectedDate = todayStr();
    }
    // Strip "today" from lines before parsing so it doesn't confuse time detection
    const processedLines = rawLines.map(l => l.replace(/\btoday\b/gi, "").trim()).filter(Boolean);

    processedLines.forEach(function(raw) {
      const l = raw.toLowerCase().trim();
      if (/^\d{1,2}[\/\-\.]\d{1,2}[\/\-\.](\d{2,4})/.test(l)) return;
      if (/^(day|date)\s*:/.test(l)) return;

      // ── Dream feed ──
      if (/dream\s*feed/.test(l)) {
        const t = parseTime(raw.replace(/dream\s*feed/i,""), lastMinutes);
        const ml = parseAmount(raw);
        if (t) { entries.push({type:"feed",time:t,amount:ml,night:true,note:"Dream feed",id:uid(),feedType:"milk"}); lastMinutes = timeVal(t); }
        else warnings.push('Couldn\'t parse dream feed: "'+raw+'"');
        return;
      }

      // ── Night wakes ──
      if (/wake\s*\d|night\s*wake|woke\s*\d/.test(l)) {
        const t = parseTime(raw.replace(/wake\s*\d+|night\s*wake|woke\s*\d+/i,""), lastMinutes);
        const ml = parseAmount(raw);
        const hasNote = /self.settled|settled\s*without|no\s*milk|went\s*back|fussed|cried/i.test(raw);
        const note = hasNote ? raw.replace(/wake\s*\d+/i,"").replace(/^\s*[-–:\s]*/,"").trim() : "";
        if (t) { entries.push({type:ml>0?"feed":"wake",time:t,amount:ml||0,night:true,note:note,id:uid(),feedType:"milk"}); lastMinutes = timeVal(t); }
        else warnings.push('Couldn\'t parse night wake: "'+raw+'"');
        return;
      }

      // ── Morning wake up ──
      if (/woke?\s*up|wake\s*up|morning|got\s*up/.test(l)) {
        const t = parseTime(raw.replace(/woke?\s*up|wake\s*up|morning|got\s*up/i,""), lastMinutes);
        if (t) { entries.push({type:"wake",time:t,night:false,note:"",id:uid()}); lastMinutes = timeVal(t); }
        else warnings.push('Couldn\'t parse wake time: "'+raw+'"');
        return;
      }

      // ── Bedtime ──
      if (/\b(asleep|bedtime|bed time|went to sleep|down for bed|bed)\b/.test(l) && !/nap/.test(l)) {
        const t = parseTime(raw.replace(/asleep|bedtime|bed time|went to sleep|down for bed|bed/i,""), lastMinutes);
        if (t) { entries.push({type:"sleep",time:t,night:false,note:"",id:uid()}); lastMinutes = timeVal(t); }
        else warnings.push('Couldn\'t parse bedtime: "'+raw+'"');
        return;
      }

      // ── Nap ──
      if (/\bnap\b/.test(l)) {
        const rangeStr = raw.replace(/nap\s*\d*/i,"").replace(/^[\s:\-–]+/,"").trim();
        const range = parseTimeRange(rangeStr, lastMinutes);
        if (range) {
          entries.push({type:"nap",start:range.start,end:range.end,night:false,note:"",id:uid()}); lastMinutes = timeVal(range.end);
        } else {
          const t = parseTime(rangeStr, lastMinutes);
          if (t) warnings.push('Found nap but no end time: "'+raw+'" — add it manually');
          else warnings.push('Couldn\'t parse nap: "'+raw+'"');
        }
        return;
      }

      // ── Explicit feed keywords ──
      if (/feed|fed|bottle|milk|oz|\bml\b/.test(l) && !/sleep/.test(l)) {
        const ml = parseAmount(raw);
        const cleaned = raw.replace(/feed|fed|bottle|milk/i,"").replace(/\d+\s*ml/i,"").trim();
        const range = parseTimeRange(cleaned, lastMinutes);
        const t = range ? range.start : parseTime(cleaned, lastMinutes);
        if (t) { entries.push({type:"feed",time:t,amount:ml,night:false,note:"",id:uid(),feedType:"milk"}); lastMinutes = timeVal(t); }
        else warnings.push('Couldn\'t parse feed: "'+raw+'"');
        return;
      }

      // ── Context-aware shorthand: "9 120" or "9 feed 120" or "9am 150ml" ──
      // Pattern: hour + optional label + amount (number that looks like ml: 50–500)
      const shorthand = l.match(/^(\d{1,2}(?::\d{2})?\s*(?:am|pm)?)\s*(?:feed|bottle|fed|f)?\s*(\d{2,3})(?:\s*ml)?$/);
      if (shorthand) {
        const t = parseTime(shorthand[1], lastMinutes);
        const ml = parseInt(shorthand[2]);
        if (t && ml >= 10 && ml <= 500) {
          entries.push({type:"feed",time:t,amount:ml,night:false,note:"",id:uid(),feedType:"milk"});
          lastMinutes = timeVal(t);
          return;
        }
      }

      // ── Fallback: bare hour + number (e.g. "9 120") using context to decide am/pm ──
      const bare = l.match(/^(\d{1,2}(?::\d{2})?)\s+(\d{2,3})$/);
      if (bare) {
        const t = parseTime(bare[1], lastMinutes);
        const num = parseInt(bare[2]);
        if (t && num >= 10 && num <= 500) {
          entries.push({type:"feed",time:t,amount:num,night:false,note:"",id:uid(),feedType:"milk"});
          lastMinutes = timeVal(t);
          return;
        }
      }

      warnings.push('Couldn\'t understand: "'+raw+'" — skipped');
    });

    return { entries: entries, warnings: warnings, detectedDate: detectedDate };
  }

  // ── Auto-classify entries as night/day based on bedtime & morning wake ──
  // Any wake or feed logged after bedtime and before next morning's first wake → night:true
  function autoClassifyNight(entries) {
    const sorted = [...entries].sort((a,b) => timeVal(a) - timeVal(b));

    // Find bedtime (type==="sleep", the last one in the day)
    const bedtimes = sorted.filter(e => e.type === "sleep" && !e.night);
    const bedtime = bedtimes.length ? bedtimes[bedtimes.length-1].time : null;

    // Find morning wake (type==="wake", first one — usually before 10am)
    const wakes = sorted.filter(e => e.type === "wake");
    const morningWake = wakes.length ? wakes[0].time : null;

    if (!bedtime) return entries; // no bedtime logged yet — leave as-is

    return entries.map(e => {
      // Only auto-classify wake and feed entries (not naps, poops, sleep itself)
      if (e.type !== "wake" && e.type !== "feed") return e;
      // Don't override manually set entries that are already in daytime and clearly daytime
      const t = e.time;
      if (!t) return e;

      const afterBed = timeVal({time: t}) > timeVal({time: bedtime});
      // Before morning wake: either no morning wake, or entry is before first wake
      const beforeMorning = !morningWake || timeVal({time: t}) < timeVal({time: morningWake});
      // Also catch very early times (midnight to 6am) as night even without explicit bedtime
      const earlyMorning = parseInt(t.split(":")[0]) < 6;

      const shouldBeNight = afterBed || (earlyMorning && beforeMorning);

      // Don't flip daytime feeds that happen to be before a morning wake (e.g. 7am feed logged first)
      // Only mark as night if it's clearly after bed OR very early
      if (shouldBeNight && !e.night) return {...e, night: true};
      // If it was auto-night but now morning wake has been logged and it's after that — flip back to day
      if (e.night && morningWake && timeVal({time:t}) >= timeVal({time:morningWake}) && !afterBed) return {...e, night: false};
      return e;
    });
  }

                left:"50%",
                transform:"translateX(-50%)",
                width:"min(340px, calc(100vw - 32px))",
                background:"white",
                borderRadius:22,
                padding:"20px 18px 16px",
                boxShadow:"0 20px 60px rgba(0,0,0,0.4)",
                animation:"tutPop 0.3s ease",
                zIndex:1002,
                pointerEvents:"auto",
                maxHeight:"calc(100vh - 40px)",
                overflowY:"auto",
              };
              if (step.arrow==="bottom" || step.arrow==="bottom-right") {
                // Card sits above the bottom nav — anchor to bottom
                cardStyle.bottom = 140;
                cardStyle.top = "auto";
              } else if (step.arrow==="top-right") {
                // Card sits below the top element
                cardStyle.top = 80;
                cardStyle.bottom = "auto";
              } else {
                // Centered — use fixed centering
                cardStyle.top = "50%";
                cardStyle.transform = "translate(-50%, -50%)";
              }
              return (
                <div style={cardStyle}>
                  {/* Arrow pointer */}
                  {step.arrow==="bottom" && (
                    <div style={{position:"absolute",bottom:-10,left:"50%",transform:"translateX(-50%)",width:0,height:0,borderLeft:"10px solid transparent",borderRight:"10px solid transparent",borderTop:"10px solid white"}}/>
                  )}
                  {step.arrow==="bottom-right" && (
                    <div style={{position:"absolute",bottom:-10,right:24,width:0,height:0,borderLeft:"10px solid transparent",borderRight:"10px solid transparent",borderTop:"10px solid white"}}/>
                  )}
                  {step.arrow==="top-right" && (
                    <div style={{position:"absolute",top:-10,right:24,width:0,height:0,borderLeft:"10px solid transparent",borderRight:"10px solid transparent",borderBottom:"10px solid white"}}/>
                  )}

                  {/* Header row */}
                  <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",marginBottom:10}}>
                    <div style={{display:"flex",alignItems:"center",gap:10}}>
                      <div style={{width:38,height:38,borderRadius:12,background:"#fdf0eb",display:"flex",alignItems:"center",justifyContent:"center",fontSize:19,flexShrink:0}}>{step.icon}</div>
                      <div style={{fontFamily:"'Playfair Display',serif",fontSize:17,fontWeight:700,color:C.deep,lineHeight:1.2}}>{step.title}</div>
                    </div>
                    <button onClick={dismissTutorial} style={{background:"none",border:"none",color:C.lt,fontSize:18,cursor:"pointer",padding:"0 0 0 8px",lineHeight:1,flexShrink:0}}>&#x2715;</button>
                  </div>

                  <div style={{fontSize:15,color:C.mid,lineHeight:1.6,marginBottom:14}}>{step.bodyJSX || step.body}</div>

                  {/* Progress dots */}
                  <div style={{display:"flex",gap:4,justifyContent:"center",marginBottom:12}}>
                    {TUT_STEPS.map((_,i)=>(
                      <div key={i} onClick={()=>setTutStep(i)} style={{width:i===tutStep?18:6,height:6,borderRadius:99,background:i===tutStep?C.ter:C.blush,transition:"all 0.3s",cursor:"pointer"}}/>
                    ))}
                  </div>

                  {/* Buttons */}
                  <div style={{display:"flex",gap:8}}>
                    {tutStep > 0 && (
                      <button onClick={prevStep} style={{flex:1,padding:"9px",borderRadius:12,border:`1.5px solid ${C.blush}`,background:"white",color:C.mid,fontSize:15,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>
                        ← Back
                      </button>
                    )}
                    <button onClick={nextStep} style={{flex:2,padding:"10px",borderRadius:12,border:"none",background:`linear-gradient(135deg,#c9705a,#a85a44)`,color:"white",fontSize:15,fontWeight:700,cursor:"pointer",fontFamily:"inherit",boxShadow:"0 4px 14px rgba(201,112,90,0.35)"}}>
                      {isLast ? "Start Tracking!" : "Next →"}
                    </button>
                  </div>

                  {tutStep === 0 && (
                    <button onClick={dismissTutorial} style={{width:"100%",marginTop:8,background:"none",border:"none",color:C.lt,fontSize:14,cursor:"pointer",fontFamily:"inherit"}}>
                      Skip tutorial
                    </button>
                  )}
                </div>
              );
            })()}
          </div>
        );
      })()}

      {/* OFFLINE BANNER */}
      {!isOnline&&(
        <div style={{position:"fixed",top:0,left:0,right:0,zIndex:999,background:"#2c1f1a",color:"white",textAlign:"center",padding:"10px 16px",fontSize:14,fontWeight:600,display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
          <span>📵</span>
          <span>You're offline — entries are saved locally and will sync when you reconnect</span>
        </div>
      )}

      {/* HERO HEADER */}
      <div
        style={{background:theme.primary,padding:"52px 20px 24px",position:"relative",overflow:"hidden"}}
        onTouchStart={handleSwipeStart}
        onTouchEnd={handleSwipeEnd}
      >

        {/* ── NAP + BREAST TIMER (top-left) ── */}
        {tab === "day" && (
          <div style={{position:"absolute",top:14,left:16,zIndex:10,display:"flex",flexDirection:"column",gap:5}}>

            {/* Nap timer */}
            {!napOn ? (
              <button onClick={startNap} style={{background:"rgba(255,255,255,0.85)",border:"none",borderRadius:99,padding:"6px 14px",fontSize:14,color:C.mint,cursor:"pointer",fontWeight:700,backdropFilter:"blur(8px)",boxShadow:"0 2px 12px rgba(44,31,26,0.15)",display:"flex",alignItems:"center",gap:5}}>
                😴 <span>Start Nap</span>
              </button>
            ) : (
              <div style={{display:"flex",alignItems:"center",gap:6,background:"rgba(255,255,255,0.9)",borderRadius:99,padding:"5px 6px 5px 12px",boxShadow:"0 2px 12px rgba(44,31,26,0.15)",backdropFilter:"blur(8px)"}}>
                <span style={{fontSize:14,fontFamily:"monospace",fontWeight:700,color:C.mint}}>😴 {fmtSec(napSec)}</span>
                <button onClick={endNap} style={{background:C.mint,border:"none",borderRadius:99,padding:"4px 11px",fontSize:13,color:"white",cursor:"pointer",fontWeight:700}}>Save</button>
              </div>
            )}

            {/* Breast feed timer */}
            {!breastStartTime ? (
              <button onClick={()=>startBreastTimer("L")} style={{background:"rgba(255,255,255,0.85)",border:"none",borderRadius:99,padding:"6px 14px",fontSize:14,color:C.ter,cursor:"pointer",fontWeight:700,backdropFilter:"blur(8px)",boxShadow:"0 2px 12px rgba(44,31,26,0.15)",display:"flex",alignItems:"center",gap:5}}>
                🤱 <span>Start Feed</span>
              </button>
            ) : (
              <div style={{background:"rgba(255,255,255,0.95)",borderRadius:16,padding:"8px 10px",boxShadow:"0 2px 16px rgba(44,31,26,0.15)",backdropFilter:"blur(8px)",minWidth:170}}>
                {/* Side timers */}
                <div style={{display:"flex",gap:5,marginBottom:6}}>
                  {["L","R"].map(side=>(
                    <button key={side} onClick={()=>switchBreastSide(side)} style={{
                      flex:1,padding:"5px 4px",borderRadius:10,border:"none",cursor:"pointer",fontFamily:"monospace",fontWeight:700,fontSize:13,
                      background: breastSide===side&&breastActive ? C.ter : "#f5e8e4",
                      color: breastSide===side&&breastActive ? "white" : C.mid,
                      transition:"all 0.15s"
                    }}>
                      {side} {fmtSec(breastSec[side])}
                      {breastSide===side&&breastActive&&<span style={{marginLeft:3,fontSize:10}}>●</span>}
                    </button>
                  ))}
                </div>
                {/* Pause / save */}
                <div style={{display:"flex",gap:5}}>
                  <button onClick={breastActive?pauseBreastTimer:()=>startBreastTimer(breastSide||"L")} style={{flex:1,padding:"4px",borderRadius:8,border:`1px solid ${C.blush}`,background:"none",fontSize:12,color:C.mid,cursor:"pointer",fontWeight:600}}>
                    {breastActive?"⏸ Pause":"▶ Resume"}
                  </button>
                  <button onClick={saveBreastFeed} style={{flex:1,padding:"4px",borderRadius:8,border:"none",background:C.ter,color:"white",fontSize:12,cursor:"pointer",fontWeight:700}}>
                    Save ✓
                  </button>
                  <button onClick={cancelBreastTimer} style={{padding:"4px 7px",borderRadius:8,border:"none",background:"#f0e8e4",color:C.lt,fontSize:12,cursor:"pointer"}}>✕</button>
                </div>
              </div>
            )}
          </div>
        )}

        {/* ── NAP COUNTDOWN PILL (top-right corner) ── */}
        {(napCountdown !== null || bedCountdown !== null) && tab === "day" && (()=>{
          const isBed = bedCountdown !== null;
          const countdown = isBed ? bedCountdown : napCountdown;
          const isNeutral = napCountdown === -1; // nap mode but no active window
          const isNow = !isNeutral && countdown <= 0;
          const isUrgent = !isNeutral && countdown <= 300;
          return (
            <div style={{
              position:"absolute",top:14,right:16,zIndex:10,
              background: isNow ? (isBed ? C.sky : C.mint) : isUrgent ? C.ter : "rgba(255,255,255,0.85)",
              borderRadius:99,
              padding:"6px 12px",
              boxShadow:"0 2px 12px rgba(44,31,26,0.15)",
              display:"flex",alignItems:"center",gap:6,
              backdropFilter:"blur(8px)",
              border: isNow||isUrgent ? "none" : `1px solid rgba(255,255,255,0.6)`,
              minWidth:90,justifyContent:"center"
            }}>
              <span style={{fontSize:14}}>{isBed ? "🌙" : "⏱️"}</span>
              <div style={{textAlign:"center"}}>
                <div style={{fontSize:9,fontFamily:"monospace",color:isNow||isUrgent?"rgba(255,255,255,0.8)":C.lt,textTransform:"uppercase",letterSpacing:"0.06em",lineHeight:1,marginBottom:1}}>
                  {isBed ? "Bedtime" : "Next Nap"}
                </div>
                <div style={{fontSize:15,fontFamily:"monospace",fontWeight:700,color:isNow||isUrgent?"white":isBed?C.sky:C.ter,lineHeight:1}}>
                  {isNeutral ? "–" : isNow ? "Now" : fmtCountdown(countdown)}
                </div>
              </div>
            </div>
          );
        })()}
        <div style={{position:"relative",zIndex:1}}>
          {/* Child switcher dots */}
          {childIds.length > 0 && (
            <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:10}}>
              {childIds.map((cid,i) => (
                <button key={cid} onClick={()=>setActiveChildId(cid)} style={{
                  width: cid===resolvedActiveId ? 22 : 8,
                  height: 8, borderRadius:99, border:"none", cursor:"pointer",
                  background: cid===resolvedActiveId ? C.ter : "rgba(255,255,255,0.5)",
                  transition:"all 0.25s", padding:0
                }}/>
              ))}
              <button onClick={()=>setShowAddChild(true)} style={{
                width:24,height:24,borderRadius:99,border:"1.5px dashed rgba(255,255,255,0.6)",
                background:"transparent",color:C.mid,cursor:"pointer",fontSize:14,
                display:"flex",alignItems:"center",justifyContent:"center",marginLeft:2
              }}>+</button>
            </div>
          )}
          {!nameEdit?(
            <div onClick={()=>{setNameIn(babyName);setNameEdit(true);}}>
              <div style={{fontFamily:"'Playfair Display',serif",fontSize:34,color:C.deep,fontWeight:700,lineHeight:1.1,cursor:"pointer"}}>
                {babyName ? `${possessive(babyName)} Tracker` : "Baby Tracker"}
                <span style={{fontSize:18,marginLeft:8,opacity:0.5}}>✦</span>
              </div>
              {(()=>{
                if (!age && !babyUnborn) return (
                  <div onClick={e=>{e.stopPropagation();setTab("growth");}} style={{fontSize:15,color:C.lt,marginTop:8,fontFamily:"monospace",cursor:"pointer"}}>
                    Add date of birth in Growth tab →
                  </div>
                );
                if (babyUnborn && babyDob) {
                  const daysUntil = Math.ceil((new Date(babyDob) - new Date()) / (1000*60*60*24));
                  return (
                    <div style={{marginTop:10,display:"flex",alignItems:"center",gap:8}}>
                      <div style={{background:"rgba(255,255,255,0.5)",borderRadius:20,padding:"6px 16px",display:"inline-flex",alignItems:"center",gap:6}}>
                        <span style={{fontSize:15}}>🤰</span>
                        <span style={{fontSize:14,color:C.deep,fontWeight:600}}>{daysUntil > 0 ? `Due in ${daysUntil} days` : "Due any day!"}</span>
                      </div>
                      <button onClick={e=>{e.stopPropagation();setTutStep(0);try{localStorage.removeItem("tut_v1");}catch{}}} style={{background:"rgba(255,255,255,0.35)",border:"none",borderRadius:99,padding:"6px 14px",fontSize:14,color:C.mid,cursor:"pointer",fontFamily:"monospace",fontWeight:600}}>? Tour</button>
                      <button onClick={e=>{e.stopPropagation();setShowFamilyModal(true);}} style={{background:"rgba(255,255,255,0.35)",border:"none",borderRadius:99,padding:"6px 14px",fontSize:14,color:C.mid,cursor:"pointer",fontFamily:"monospace",fontWeight:600}}>
                        {familyCode ? (syncStatus==="synced"?"🔄 Synced":syncStatus==="syncing"?"⏳":syncStatus==="error"?"⚠️ Sync":"👨‍👩‍👧 "+(familyUsername||"Synced")) : "👨‍👩‍👧 Share"}
                      </button>
                    </div>
                  );
                }
                const parts = [];
                if (age.months > 0) parts.push(`${age.months} month${age.months!==1?"s":""}`);
                if (age.weeksAfterMonths > 0) parts.push(`${age.weeksAfterMonths} week${age.weeksAfterMonths!==1?"s":""}`);
                return (
                  <div style={{marginTop:10,display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
                    <div style={{background:"rgba(255,255,255,0.5)",borderRadius:20,padding:"6px 16px",display:"inline-flex",alignItems:"center",gap:6}}>
                      <span style={{fontSize:15}}>🎂</span>
                      <span style={{fontSize:14,color:C.deep,fontWeight:600}}>{parts.join(" & ")} · {age.totalWeeks} weeks</span>
                    </div>
                    <button onClick={e=>{e.stopPropagation();setTutStep(0);try{localStorage.removeItem("tut_v1");}catch{}}} style={{background:"rgba(255,255,255,0.35)",border:"none",borderRadius:99,padding:"6px 14px",fontSize:14,color:C.mid,cursor:"pointer",fontFamily:"monospace",fontWeight:600}}>? Tour</button>
                    <button onClick={e=>{e.stopPropagation();setShowFamilyModal(true);}} style={{background:"rgba(255,255,255,0.35)",border:"none",borderRadius:99,padding:"6px 14px",fontSize:14,color:C.mid,cursor:"pointer",fontFamily:"monospace",fontWeight:600}}>
                      {familyCode ? (syncStatus==="synced"?"🔄 Synced":syncStatus==="syncing"?"⏳":syncStatus==="error"?"⚠️ Sync":"👨‍👩‍👧 "+(familyUsername||"Synced")) : "👨‍👩‍👧 Share"}
                    </button>
                  </div>
                );
              })()}
            </div>
          ):(
            <div>
              <div style={{fontSize:15,fontFamily:"monospace",color:C.mid,textTransform:"uppercase",letterSpacing:"0.15em",marginBottom:8}}>Enter baby's name</div>
              <form onSubmit={e=>{e.preventDefault();setBabyName(nameIn.trim());setNameEdit(false);}} style={{display:"flex",gap:8,alignItems:"center"}}>
                <input autoFocus value={nameIn} onChange={e=>setNameIn(e.target.value)} placeholder="e.g. Oliver" style={{flex:1,fontSize:18,padding:"10px 14px",borderRadius:12,border:"none",background:"rgba(255,255,255,0.6)",color:C.deep,outline:"none",fontFamily:"inherit"}}/>
                <button type="submit" style={{background:C.ter,border:"none",borderRadius:10,color:"white",fontSize:14,padding:"10px 16px",cursor:"pointer",fontWeight:700}}>Save</button>
                {babyName&&<button type="button" onClick={()=>setNameEdit(false)} style={{background:"rgba(255,255,255,0.4)",border:"none",borderRadius:10,color:C.mid,fontSize:14,padding:"10px 12px",cursor:"pointer"}}>✕</button>}
              </form>
            </div>
          )}
        </div>

        {/* Date strip */}
        <div style={{position:"relative",zIndex:1,marginTop:20,display:"flex",gap:6,overflowX:"auto",scrollbarWidth:"none",paddingBottom:2}}>
          <div style={{flexShrink:0,display:"flex",alignItems:"center",gap:4}}>
            <button onClick={()=>{setNewDate(todayStr());setModal("addDay");}} style={{background:"rgba(255,255,255,0.5)",border:`1px dashed ${C.lt}`,borderRadius:20,padding:"5px 12px",color:C.mid,fontSize:14,fontWeight:600,cursor:"pointer",whiteSpace:"nowrap"}}>+ Past Date</button>
          </div>
          {displayDayKeys.map(d=>(
            <div key={d} style={{flexShrink:0,display:"flex",alignItems:"center",gap:2,background:d===selDay?"white":"rgba(255,255,255,0.35)",borderRadius:20,padding:"4px 4px 4px 11px",border:d===selDay?"none":`1px solid rgba(255,255,255,0.5)`}}>
              <button onClick={()=>setSelDay(d)} style={{background:"none",border:"none",color:d===selDay?C.ter:C.mid,fontSize:14,fontFamily:"monospace",cursor:"pointer",padding:"1px 0",whiteSpace:"nowrap",fontWeight:d===selDay?700:400}}>{fmtDate(d)}</button>
              <button onClick={e=>{setMenuDay(d);setEditDate(d);setModal("dayMenu");e.stopPropagation();}} style={{background:d===selDay?"#f2d9cc":"rgba(255,255,255,0.4)",border:"none",borderRadius:"50%",width:18,height:18,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",fontSize:9,color:d===selDay?C.mid:C.lt}}>✎</button>
            </div>
          ))}
          {!displayDayKeys.length&&<span style={{color:C.lt,fontSize:14,fontFamily:"monospace",alignSelf:"center"}}>No days yet</span>}
        </div>
      </div>

      <div style={{padding:"16px 14px 20px",maxWidth:520,margin:"0 auto",animation:"fadeIn 0.3s ease"}}>

        {/* DAY TAB */}
        {tab==="day"&&(
          !selDay||!days[selDay]?(
            <div style={{textAlign:"center",padding:"60px 20px",color:C.lt}}>
              <div style={{fontFamily:"'Playfair Display',serif",fontSize:22,color:C.mid,marginBottom:8}}>No day selected</div>
              <div style={{fontSize:15,fontFamily:"monospace"}}>Tap + Day to get started</div>
            </div>
          ):(
            <div>
              {/* ══ 1. AGE TIP ════════════════════════════════════ */}
              {ageStage&&(
                <div style={{background:`linear-gradient(135deg,${C.warm},#fff4ee)`,border:`1px solid ${C.blush}`,borderLeft:`4px solid ${C.ter}`,borderRadius:16,padding:"12px 14px",marginBottom:14}}>
                  <div style={{flex:1}}>
                    <div style={{fontSize:14,fontFamily:"monospace",color:C.lt,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:3}}>{ageStage.label}</div>
                    <div style={{fontSize:14,color:C.mid,lineHeight:1.5}}>{ageStage.tip}</div>
                    <div style={{display:"flex",flexWrap:"wrap",gap:5,marginTop:7}}>
                      {[{icon:"😴",val:ageStage.napGoal},{icon:"🍼",val:ageStage.feedGoal},{icon:"🌙",val:ageStage.nightNote}].map((x,i)=>(
                        <span key={i} style={{fontSize:14,fontFamily:"monospace",background:"rgba(201,112,90,0.1)",color:C.ter,padding:"2px 8px",borderRadius:99}}>{x.icon} {x.val}</span>
                      ))}
                    </div>
                  </div>
                </div>
              )}

              {/* ══ 2. STATS ROW ══════════════════════════════════ */}
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:6,marginBottom:18}}>
                {[
                  {big:totalMl||dayE.filter(e=>e.type==="feed"&&e.feedType==="solids").length,unit:totalMl?"ml":"meals",label:totalMl?"Milk":"Solids",color:C.ter,bg:"#fdf0eb"},
                  {big:naps.length,unit:"naps",label:"Day Sleep",color:C.mint,bg:"#eaf6f3"},
                  {big:hm(napMins),unit:"",label:"Nap Time",color:C.sky,bg:"#eaf3f8"},
                  {big:dayE.filter(e=>e.type==="poop").length,unit:"💩",label:"Nappies",color:"#8a7060",bg:"#f0ece6"}
                ].map((s,i)=>(
                  <div key={i} style={{background:s.bg,borderRadius:16,padding:"12px 4px",textAlign:"center",boxShadow:"0 2px 8px rgba(0,0,0,0.04)"}}>
                    <div style={{fontFamily:"'Playfair Display',serif",fontSize:20,fontWeight:700,color:s.color,lineHeight:1}}>{s.big}</div>
                    {s.unit&&<div style={{fontSize:14,fontFamily:"monospace",color:s.color,opacity:0.7,marginTop:1}}>{s.unit}</div>}
                    <div style={{fontSize:8,color:C.mid,marginTop:3,textTransform:"uppercase",letterSpacing:"0.08em",fontFamily:"monospace"}}>{s.label}</div>
                  </div>
                ))}
              </div>

              {/* ══ NEW LOG BAR ════════════════════════════════ */}
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:8,marginBottom:16}}>
                {[
                  {id:"feed",  icon:"🍼", label:"Feed"},
                  {id:"nappy", icon:"💩", label:"Nappy"},
                  {id:"sleep", icon:"😴", label:"Sleep"},
                  {id:"paste", icon:"📋", label:"Notes"},
                ].map(({id,icon,label})=>(
                  <button key={id} onClick={()=>id==="paste"?openPaste():openLogPanel(id)}
                    style={{display:"flex",flexDirection:"column",alignItems:"center",gap:4,padding:"12px 6px",borderRadius:16,border:`2px solid ${logPanel===id?C.ter:C.blush}`,background:logPanel===id?"#fdf0eb":C.warm,cursor:"pointer",fontFamily:"inherit",transition:"all 0.15s"}}>
                    <span style={{fontSize:24}}>{icon}</span>
                    <span style={{fontSize:12,fontWeight:700,color:logPanel===id?C.ter:C.mid,letterSpacing:"0.02em"}}>{label}</span>
                  </button>
                ))}
              </div>

              {/* ══ 3. TODAY'S LOG ════════════════════════════════ */}
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
                <div style={{width:3,height:16,background:C.gold,borderRadius:99}}/>
                <div style={{fontSize:14,fontFamily:"monospace",color:C.lt,textTransform:"uppercase",letterSpacing:"0.12em",fontWeight:700}}>Today's Log</div>
              </div>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
                <span style={{fontFamily:"'Playfair Display',serif",fontStyle:"italic",color:C.mid,fontSize:15}}>Daytime</span>
              </div>
              <div style={{display:"flex",flexDirection:"column",gap:7,marginBottom:13}}>
                {dayE.length===0&&(
                  <div style={{textAlign:"center",padding:"22px 12px",background:C.warm,borderRadius:14,border:`1px dashed ${C.blush}`}}>
                    <div style={{fontSize:28,marginBottom:8}}>👆</div>
                    <div style={{fontSize:15,fontWeight:600,color:C.mid,marginBottom:4}}>Nothing logged yet today</div>
                    <div style={{fontSize:13,color:C.lt,lineHeight:1.5}}>
                      Tap 🍼 Feed, 💩 Nappy or 😴 Sleep above to log an entry.
                    </div>
                  </div>
                )}
                {dayE.map(e=>{
                  const isDragging=dragId===e.id;
                  const isOver=dragOver===e.id;
                  const borderCol=e.type==="feed"?(e.feedType==="solids"?"#b8860b":C.ter):e.type==="nap"?C.mint:e.type==="sleep"?C.sky:e.type==="poop"?"#8a7060":C.gold;
                  return(
                    <div key={e.id}
                      draggable
                      onDragStart={()=>setDragId(e.id)}
                      onDragOver={ev=>{ev.preventDefault();setDragOver(e.id);}}
                      onDragEnd={()=>{if(dragId&&dragOver&&dragId!==dragOver)reorderEntry(dragId,dragOver);setDragId(null);setDragOver(null);}}
                      onDrop={ev=>{ev.preventDefault();}}
                      style={{background:isOver?"#f5ede8":C.warm,borderRadius:14,padding:"11px 12px",border:`1px solid ${isOver?C.ter:C.blush}`,borderLeft:`3px solid ${borderCol}`,opacity:isDragging?0.45:1,transition:"opacity 0.15s,background 0.15s",cursor:"grab"}}>
                      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                        <div style={{display:"flex",alignItems:"center",gap:9}}>
                          <span style={{fontSize:14,cursor:"grab",color:C.lt,letterSpacing:-1}}>&#x2261;</span>
                          <span style={{fontSize:17}}>{ICONS[e.type]}</span>
                          <div>
                            <div style={{fontSize:14,fontWeight:500}}>
                              {e.type==="feed"?(e.feedType==="solids"?"Solids":e.feedType==="breast"?"Breast Feed":"Bottle Feed"):NAMES[e.type]}
                            </div>
                            {e.type==="feed"&&e.feedType==="breast"&&(
                              <div style={{fontSize:15,color:C.lt,fontFamily:"monospace"}}>
                                {e.breastL>0?`L: ${e.breastL}m`:""}{e.breastL>0&&e.breastR>0?" · ":""}{e.breastR>0?`R: ${e.breastR}m`:""}
                              </div>
                            )}
                            {e.type==="nap"&&<div style={{fontSize:15,color:C.lt,fontFamily:"monospace"}}>{minDiff(e.start,e.end)} min</div>}
                            {e.type==="poop"&&e.poopType&&<div style={{fontSize:15,color:"#8a7060",fontFamily:"monospace"}}>{e.poopType}</div>}
                            {e.note&&e.type!=="feed"&&<div style={{fontSize:15,color:C.mid,fontStyle:"italic",marginTop:1}}>{e.note}</div>}
                            {e.note&&e.type==="feed"&&e.feedType==="solids"&&<div style={{fontSize:15,color:C.mid,fontStyle:"italic",marginTop:1}}>{e.note}</div>}
                          </div>
                        </div>
                        <div style={{display:"flex",alignItems:"center",gap:7}}>
                          <Badge type={e.type}>
                            {e.type==="feed"
                              ? (e.feedType==="breast"
                                  ? `${(e.breastL||0)+(e.breastR||0)}m`
                                  : e.feedType==="solids"
                                    ? fmt12(e.time)
                                    : `${e.amount}ml`)
                              : e.type==="nap"
                                ? `${fmt12(e.start)}-${fmt12(e.end)}`
                                : fmt12(e.time)}
                          </Badge>
                          <button onClick={()=>openEdit(e)} style={{background:"#f0e8e0",border:"none",borderRadius:"50%",width:23,height:23,color:C.mid,cursor:"pointer",fontSize:15,display:"flex",alignItems:"center",justifyContent:"center"}}>✎</button>
                          <button onClick={()=>delEntry(e.id)} style={{background:"#f0e5e0",border:"none",borderRadius:"50%",width:23,height:23,color:C.lt,cursor:"pointer",fontSize:14,display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button>
                        </div>
                      </div>
                    </div>
                  );
                })}
              </div>

              {/* Night wakes */}
              <div style={{background:"#1a1228",borderRadius:20,padding:"14px 17px",marginBottom:18}}>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
                  <div style={{display:"flex",alignItems:"center",gap:7}}>
                    <div style={{width:3,height:18,background:"#8878a8",borderRadius:99}}/>
                    <span style={{fontFamily:"'Playfair Display',serif",fontStyle:"italic",color:"#a898c8",fontSize:16}}>Night Wakes</span>
                  </div>
                  <button onClick={()=>{openLogPanel("feed");}} style={{background:"rgba(255,255,255,0.1)",border:"none",borderRadius:99,padding:"4px 11px",fontSize:15,color:"#a898c8",cursor:"pointer",fontWeight:600}}>+ add</button>
                </div>
                {nightE.length===0&&<div style={{textAlign:"center",color:"#6a5880",fontSize:14,fontFamily:"monospace",padding:"6px 0"}}>No night wakes logged</div>}
                {(()=>{
                  const sleepEv=dayE.find(e=>e.type==="sleep");
                  const pts=[];
                  if(sleepEv) pts.push({label:"Bedtime",time:sleepEv.time});
                  nightE.forEach((e,i)=>pts.push({label:`Wake ${i+1}`,time:e.time,id:e.id,amount:e.amount,note:e.note}));
                  return nightE.map((e,i)=>{
                    const fromPt=pts[i];const toPt=pts[i+1];
                    let strMins=fromPt&&toPt?minDiff(fromPt.time,toPt.time):0;
                    if(strMins<=0&&strMins!=null&&fromPt&&toPt) strMins+=720;
                    return(
                      <div key={e.id}>
                        {fromPt&&toPt&&strMins>0&&(
                          <div style={{display:"flex",alignItems:"center",gap:6,padding:"3px 4px 5px",opacity:0.7}}>
                            <div style={{flex:1,height:1,background:"#3a2e50"}}/>
                            <span style={{fontSize:14,fontFamily:"monospace",color:strMins>=180?"#6fa898":strMins>=120?"#d4a855":"#8878a8"}}>{hm(strMins)}</span>
                            <div style={{flex:1,height:1,background:"#3a2e50"}}/>
                          </div>
                        )}
                        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"7px 10px",background:"rgba(255,255,255,0.04)",borderRadius:10,border:"1px solid #3a2e50",marginBottom:5}}>
                          <div>
                            <span style={{color:"#d8cce8",fontSize:15}}>🌟 Wake {i+1}</span>
                            {e.note&&<div style={{fontSize:15,color:"#6a5880",fontStyle:"italic",marginTop:1}}>{e.note}</div>}
                          </div>
                          <div style={{display:"flex",alignItems:"center",gap:7}}>
                            {e.amount>0&&<span style={{background:"rgba(212,168,85,0.2)",color:C.gold,fontFamily:"monospace",fontSize:15,padding:"2px 7px",borderRadius:99}}>{e.amount} ml</span>}
                            <span style={{color:"#8878a8",fontFamily:"monospace",fontSize:15}}>{fmt12(e.time)}</span>
